<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chilagu Legacy Cinema - Pro Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root { --bg:#000; --gradient:linear-gradient(90deg,#A855F7,#EC4899); --green:#25D366; --card:#111; }
  *{box-sizing:border-box}
  html,body{margin:0;font-family:'Montserrat',sans-serif;background:var(--bg);color:#fff;height:100%;overflow-y:auto;overflow-x:hidden}
.header{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 15px;background:#000;border-bottom:1px solid #111;position:sticky;top:0;z-index:10}
.header-left{display:flex;align-items:center;gap:8px}
.header img{width:32px;height:32px;}
.header h1{margin:0;font-size:20px;font-weight:900;font-family:'Orbitron',sans-serif;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}

/* ICON YA SIRI YA ADMIN */
.admin-icon{
  width:18px;
  height:18px;
  background:var(--gradient);
  border-radius:4px;
  cursor:pointer;
  opacity:0.4;
  transition:0.3s;
  -webkit-tap-highlight-color: transparent;
}
.admin-icon:active{opacity:1; transform:scale(1.2);} /* IKIWABONGEZA INANG'ARA ZAIDI */

.search-icon-btn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:5px}
.search-wrap{display:none;padding:10px 15px;position:absolute;top:55px;left:0;right:0;background:#000;z-index:9}
.search-wrap.active{display:block}
.search input{width:100%;padding:11px 40px 11px 14px;border-radius:25px;border:none;background:#1a1a1a;color:#fff;font-size:13px}
.search-close{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:18px;color:#666;cursor:pointer}
.main-tabs{display:flex;gap:8px;padding:10px 15px;overflow-x:auto}
.main-tab{flex:0 0 auto;padding:9px 16px;border-radius:20px;background:#1a1a1a;font-size:13px;cursor:pointer;font-weight:600;color:#aaa}
.main-tab.active{background:var(--gradient);color:#fff}
.banner-section{margin:10px 0}
.banner-title{padding:0 15px;font-size:14px;font-weight:700;color:#A855F7;margin-bottom:8px;letter-spacing:1px}
.banner-slider{display:flex;overflow-x:auto;gap:10px;padding:0 15px;scroll-snap-type:x mandatory}
.banner-card{flex:0 0 85%;aspect-ratio:16/9;border-radius:10px;overflow:hidden;cursor:pointer;position:relative;scroll-snap-align:start}
.banner-card img{width:100%;height:100%;object-fit:cover}
.banner-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.9));padding:10px}
.banner-overlay.watching{font-size:10px;color:#A855F7;font-weight:700}
.banner-overlay.title{font-size:13px;font-weight:700}
.cat-wrap{padding:15px 15px 18px;overflow-x:auto;white-space:nowrap}
.cat-row{display:flex;gap:6px}
.cat-box{padding:7px 12px;border-radius:16px;background:#1a1a1a;font-size:11px;cursor:pointer;font-weight:600;color:#aaa;display:inline-block}
.cat-box.active{background:var(--gradient);color:#fff}
.section-title{padding:0 15px;font-size:18px;font-weight:700;margin:15px 0 10px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 15px}
.card{background:transparent;border-radius:6px;overflow:hidden;cursor:pointer;position:relative}
.thumb-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#111;border-radius:6px;overflow:hidden}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.star-badge{position:absolute;top:4px;right:4px;width:18px;height:18px;background:var(--gradient);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700;z-index:2}
.trending-badge{position:absolute;top:4px;left:4px;background:var(--gradient);font-size:9px;padding:2px 5px;border-radius:4px;font-weight:700}
.episode-count{position:absolute;bottom:4px;right:4px;background:#000a;color:#fff;font-size:9px;padding:2px 5px;border-radius:4px}
.card-body{padding:4px 2px 0}
.card p{margin:0;font-size:11px;font-weight:500;line-height:1.3;color:#ddd;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-align:left}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:999;align-items:center;justify-content:center;padding:15px}
.box{background:#181818;padding:20px;border-radius:12px;width:100%;max-width:500px;text-align:center;max-height:90vh;overflow-y:auto}
.box h2{margin:0 0 10px;font-size:18px;font-family:'Orbitron',sans-serif;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.box input,.box select,.box textarea{width:100%;padding:12px;border-radius:8px;border:1px solid #333;background:#222;color:#fff;margin:8px 0;font-size:14px}
.box button{width:100%;padding:12px;margin-top:8px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.btn-green{background:var(--green);color:#fff}
.btn-grad{background:var(--gradient);color:#fff}
.btn-gray{background:#333;color:#fff}
.btn-red{background:#ff3333;color:#fff}
.btn-blue{background:#007AFF;color:#fff}
.error{color:#ff4d4d;font-size:12px;margin-top:5px;display:none}
.payment-alert{background:var(--gradient);padding:15px;border-radius:10px;margin-bottom:12px;text-align:center;border:2px solid #fff}
.payment-alert.namba{font-size:22px;letter-spacing:2px;font-weight:900}
.networks{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.net-btn{background:#222;border:1px solid #333;padding:12px;border-radius:8px;color:#fff;font-size:13px;cursor:pointer;font-weight:600}
.whatsapp-step{display:none;margin-top:10px}
.btn-whatsapp{background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;gap:8px}
  table{width:100%;border-collapse:collapse;font-size:11px}
  th,td{padding:6px;border-bottom:1px solid #333;text-align:left}
.admin-movie-item{background:var(--card);padding:10px;border-radius:8px;margin-bottom:8px;text-align:left;display:flex;gap:10px;align-items:center}
.admin-movie-item img{width:80px;height:45px;border-radius:4px;object-fit:cover}
.admin-movie-info{flex:1}
.admin-movie-info b{font-size:13px}
.admin-movie-info small{color:#aaa;font-size:10px}
.admin-btns{display:flex;gap:5px}
.admin-btns button{width:auto;padding:6px 10px;font-size:11px}
.admin-tabs{display:flex;gap:8px;margin-bottom:15px;flex-wrap:wrap}
.admin-tab-btn{flex:1;padding:10px;border:none;border-radius:8px;background:#222;color:#aaa;font-weight:600;cursor:pointer}
.admin-tab-btn.active{background:var(--gradient);color:#fff}
.episode-list{max-height:400px;overflow-y:auto;text-align:left}
.episode-item{display:flex;justify-content:space-between;align-items:center;padding:8px;background:#222;margin-bottom:5px;border-radius:6px}
.empty-state{color:#666;text-align:center;padding:20px;font-size:12px}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <img src="https://i.postimg.cc/LXYGQT8w/In-Shot-20260523-092931092-removebg-preview.png" alt="Logo">
    <h1>Chilagu Cinema</h1>
    <div class="admin-icon" onclick="openAdmin()"></div> <!-- HAPA NDIO SIRI: NIMEWEKA ONCLICK MOJA KWA MOJA -->
  </div>
  <button class="search-icon-btn" onclick="toggleSearch()">🔍</button>
</div>

<div class="search-wrap" id="searchWrap"><div class="search"><input type="text" id="searchInput" placeholder="Search movie..." onkeyup="loadMovies()"><span class="search-close" onclick="toggleSearch()">×</span></div></div>
<div class="main-tabs"><div class="main-tab active" onclick="filterMain('all',this)">All</div><div class="main-tab" onclick="filterMain('series',this)">Series</div><div class="main-tab" onclick="filterMain('singo',this)">Movies</div></div>

<div class="banner-section">
  <div class="banner-title">WATCHING NOW</div>
  <div class="banner-slider" id="bannerSlider"></div>
</div>

<div class="cat-wrap"><div class="cat-row"><div class="cat-box active" onclick="filterCat('all',this)">All</div><div class="cat-box" onclick="filterCat('action',this)">Action</div><div class="cat-box" onclick="filterCat('love',this)">Love</div><div class="cat-box" onclick="filterCat('drama',this)">Drama</div><div class="cat-box" onclick="filterCat('thriller',this)">Thriller</div></div></div>

<h2 class="section-title">TRENDING NOW</h2><div class="grid" id="trendingGrid"></div>
<h2 class="section-title">HOME</h2><div class="grid" id="homeGrid"></div>

<div class="overlay" id="keyBox"><div class="box"><h2>Enter Access Key</h2><input type="text" id="keyInput" placeholder="Ex: CHILAGU-F1K"><p class="error" id="keyError">❌ Wrong Key</p><button class="btn-grad" onclick="checkKey()">UNLOCK MOVIE</button><button class="btn-green" onclick="showPayment()">BUY KEY Tsh 2000</button><button class="btn-gray" onclick="closeOverlay('keyBox')">Cancel</button></div></div>
<div class="overlay" id="payBox"><div class="box"><h2>Choose Network</h2><div class="payment-alert"><p>Pay Tsh 2000 to</p><p class="namba">0686436004</p><p>Moshi Idd</p></div><div class="networks" id="networkButtons"><div class="net-btn" onclick="pay('airtel')">Airtel Money</div><div class="net-btn" onclick="pay('mpesa')">M-Pesa</div><div class="net-btn" onclick="pay('tigo')">Tigo Pesa</div><div class="net-btn" onclick="pay('halo')">HaloPesa</div></div><div class="whatsapp-step" id="whatsappStep"><button class="btn-whatsapp" onclick="goToWhatsapp()">💬 SEND PAYMENT VIA WHATSAPP</button></div><button class="btn-gray" onclick="closeOverlay('payBox')">Go Back</button></div></div>
<div class="overlay" id="playerBox"><div class="box" style="max-width:100vw;max-height:100vh;padding:0"><span style="position:absolute;top:10px;right:10px;font-size:35px;cursor:pointer;z-index:1001" onclick="closePlayer()">×</span><iframe id="videoFrame" src="" style="width:100vw;height:100vh;border:none" allowfullscreen></iframe></div></div>
<div class="overlay" id="episodeBox"><div class="box"><h2 id="episodeTitle"></h2><div class="episode-list" id="episodeList"></div><button class="btn-gray" onclick="closeOverlay('episodeBox')">Close</button></div></div>

<div class="overlay" id="adminBox"><div class="box">
  <h2>👑 Pro Admin Panel</h2>
  <div class="admin-tabs">
    <button class="admin-tab-btn active" onclick="showAdminTab('analytics',this)">Analytics</button>
    <button class="admin-tab-btn" onclick="showAdminTab('upload',this)">Upload</button>
    <button class="admin-tab-btn" onclick="showAdminTab('control',this)">Control</button>
    <button class="admin-tab-btn" onclick="showAdminTab('settings',this)">Settings</button>
  </div>
  <div id="adminAnalytics"></div>
  <div id="adminUpload" style="display:none;text-align:left">
    <input type="text" id="mTitle" placeholder="Movie Title. Ex: Love and Destiny Ep 1">
    <select id="mType"><option value="singo">Single Movie</option><option value="series">Series Episode</option></select>
    <select id="mCat"><option value="drama">Drama</option><option value="action">Action</option><option value="love">Love</option><option value="thriller">Thriller</option></select>
    <select id="mPrice"><option value="0">Free Episode</option><option value="2000">Paid Episode Tsh 2000</option></select>
    <input type="text" id="mThumb" placeholder="Thumbnail Link">
    <input type="text" id="mLink" placeholder="Video Link">
    <label><input type="checkbox" id="mTrending"> Add to Trending Now</label>
    <label><input type="checkbox" id="mBanner"> Add to Watching Now Banner</label>
    <button class="btn-green" id="saveMovieBtn" onclick="saveMovie()">SAVE EPISODE/MOVIE</button>
  </div>
  <div id="adminControl" style="display:none;text-align:left"><h3>Manage All Movies & Episodes</h3><div id="manageList"></div></div>
  <div id="adminSettings" style="display:none;text-align:left">
    <h3>Settings</h3>
    <input type="text" id="settingKey" placeholder="New Weekly Key">
    <input type="text" id="settingPass" placeholder="New Admin Password">
    <button class="btn-grad" id="saveSettingsBtn" onclick="saveSettings()">SAVE SETTINGS</button>
  </div>
  <button class="btn-gray" onclick="closeOverlay('adminBox')">Close</button>
</div></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-analytics.js";
  import { getFirestore, collection, addDoc, serverTimestamp, getDocs, onSnapshot, doc, deleteDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCVDXKkOYlhr5ez_dfA-jOQ8Ve_UXw5qWk",
    authDomain: "chilagu-update.firebaseapp.com",
    projectId: "chilagu-update",
    storageBucket: "chilagu-update.firebasestorage.app",
    messagingSenderId: "1007502056082",
    appId: "1:1007502056082:web:c20c43601cdae50059244b"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = getFirestore(app);
  window.db = db;
</script>

<script>
let WEEKLY_KEY = "Chilagu-F1K";
let ADMIN_PASS = "CHILAGU2026";
let SETTINGS_DOC_ID = "main";

let movies = [];
let mainType='all', activeCat='all', currentMovie=null;

async function loadSettings(){
  const docSnap = await getDoc(doc(window.db, "settings", SETTINGS_DOC_ID));
  if(docSnap.exists()){
    const d = docSnap.data();
    if(d.key) WEEKLY_KEY = d.key;
    if(d.pass) ADMIN_PASS = d.pass;
  }
}

onSnapshot(collection(window.db, "movies"), (snapshot) => {
  movies = [];
  snapshot.forEach(doc => { movies.push({id: doc.id,...doc.data()}) });
  loadMovies();
  loadBanner();
  loadManageList();
});

function loadBanner(){
  const bannerSlider = document.getElementById("bannerSlider");
  bannerSlider.innerHTML = "";
  const bannerMovies = movies.filter(m => m.banner === true);
  if(bannerMovies.length === 0){ bannerSlider.innerHTML = `<div class="empty-state">No Banner Set</div>`; return; }
  bannerMovies.forEach(m => {
    const div = document.createElement("div");
    div.className = "banner-card";
    div.innerHTML = `<img src="${m.thumbnail}"><div class="banner-overlay"><div class="watching">WATCHING NOW</div><div class="title">${m.title}</div></div>`;
    div.onclick = () => openMovie(m);
    bannerSlider.appendChild(div);
  });
}

function toggleSearch(){document.getElementById("searchWrap").classList.toggle("active");}
function loadMovies(){
  const homeGrid=document.getElementById("homeGrid");homeGrid.innerHTML="";
  let filtered=movies.filter(m=>(mainType==='all'||m.type===mainType)&&(activeCat==='all'||m.cat===activeCat));
  filtered.forEach(m=>homeGrid.appendChild(makeCard(m)));
}
function makeCard(m){
  const div=document.createElement("div");div.className="card";
  div.innerHTML=`<div class="thumb-wrap"><img src="${m.thumbnail}"></div><div class="card-body"><p>${m.title}</p></div>`;
  div.onclick=()=>openMovie(m);
  return div
}
function openMovie(m){currentMovie=m;if(m.price>0){document.getElementById("keyBox").style.display="flex"}else{playMovie(m.link)}}
function checkKey(){if(document.getElementById("keyInput").value.trim()===WEEKLY_KEY){closeOverlay('keyBox');playMovie(currentMovie.link)}else{document.getElementById("keyError").style.display="block"}}
function playMovie(link){document.getElementById("videoFrame").src = link;document.getElementById("playerBox").style.display="flex";}
function closePlayer(){document.getElementById("playerBox").style.display="none";document.getElementById("videoFrame").src="";}
function closeOverlay(id){document.getElementById(id).style.display="none"}
function filterMain(type,el){mainType=type;document.querySelectorAll(".main-tab").forEach(c=>c.classList.remove("active"));el.classList.add("active");loadMovies()}
function filterCat(cat,el){activeCat=cat;document.querySelectorAll(".cat-box").forEach(c=>c.classList.remove("active"));el.classList.add("active");loadMovies()}

async function openAdmin(){
  await loadSettings();
  const pass = prompt("Enter Admin Password:");
  if(pass!== ADMIN_PASS){ alert("Wrong Password!"); return; }
  document.getElementById("adminBox").style.display="flex";
  loadAnalytics();
  loadManageList();
}

function showAdminTab(tab,el){
  document.querySelectorAll('.admin-tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  ['adminAnalytics','adminUpload','adminControl','adminSettings'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('admin'+tab.charAt(0).toUpperCase()+tab.slice(1)).style.display='block';
  if(tab==='settings'){
    document.getElementById("settingKey").value = WEEKLY_KEY;
    document.getElementById("settingPass").value = ADMIN_PASS;
  }
}

async function loadAnalytics(){
  const snapshot = await getDocs(collection(window.db, "chilagu_events"));
  let plays = {};
  snapshot.forEach(doc=>{const d = doc.data(); if(d.event === "play_movie") plays[d.title] = (plays[d.title]||0)+1; });
  let html = `<h3>Analytics</h3>`;
  if(Object.keys(plays).length === 0){ html += `<div class="empty-state">No Analytics Data Yet</div>`; }
  else { html += `<table><tr><th>Movie</th><th>Plays</th></tr>`; movies.forEach(m=>{html += `<tr><td>${m.title}</td><td>${plays[m.title]||0}</td></tr>`;}); html += `</table>`; }
  document.getElementById("adminAnalytics").innerHTML = html;
}

async function saveMovie(){
  const btn = document.getElementById("saveMovieBtn");
  btn.innerText = "SAVING..."; btn.disabled = true;
  const title = document.getElementById("mTitle").value.trim();
  const thumb = document.getElementById("mThumb").value.trim();
  const link = document.getElementById("mLink").value.trim();
  if(!title ||!thumb ||!link){ alert("❌ Jaza Title, Thumbnail na Video Link"); btn.innerText = "SAVE EPISODE/MOVIE"; btn.disabled = false; return; }
  await addDoc(collection(window.db, "movies"), { title: title, type: document.getElementById("mType").value, cat: document.getElementById("mCat").value, price: parseInt(document.getElementById("mPrice").value), thumbnail: thumb, link: link, trending: document.getElementById("mTrending").checked, banner: document.getElementById("mBanner").checked });
  alert("✅ Movie Uploaded Successfully!");
  document.getElementById("mTitle").value = ""; document.getElementById("mThumb").value = ""; document.getElementById("mLink").value = "";
  btn.innerText = "SAVE EPISODE/MOVIE"; btn.disabled = false;
}

function loadManageList(){
  const list = document.getElementById("manageList");
  if(movies.length === 0){ list.innerHTML = `<div class="empty-state">No Movies Uploaded Yet</div>`; return; }
  list.innerHTML = "";
  movies.forEach(m=>{ list.innerHTML += `<div class="admin-movie-item"><img src="${m.thumbnail}"><div class="admin-movie-info"><b>${m.title}</b></div><div class="admin-btns"><button class="btn-red" onclick='deleteMovie("${m.id}")'>Delete</button></div></div>`; });
}

async function deleteMovie(id){if(confirm("Delete this movie?")){await deleteDoc(doc(window.db, "movies", id)); alert("✅ Deleted!");}}

async function saveSettings(){
  const btn = document.getElementById("saveSettingsBtn");
  btn.innerText = "SAVING..."; btn.disabled = true;
  const newKey = document.getElementById("settingKey").value.trim();
  const newPass = document.getElementById("settingPass").value.trim();
  if(!newKey ||!newPass){ alert("❌ Jaza Key na Password zote mbili"); btn.innerText = "SAVE SETTINGS"; btn.disabled = false; return; }
  await setDoc(doc(window.db, "settings", SETTINGS_DOC_ID), { key: newKey, pass: newPass }, { merge: true });
  WEEKLY_KEY = newKey;
  ADMIN_PASS = newPass;
  alert("✅ Settings Updated Successfully!");
  closeOverlay('adminBox');
  btn.innerText = "SAVE SETTINGS"; btn.disabled = false;
}
</script>
</body>
</html>
