<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="appTitle">Chilagu Cinema</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<style>
  :root { --gradient:linear-gradient(90deg,#A855F7,#EC4899); --green:#25D366; --red:#FF3B30; }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Montserrat',sans-serif;background:#0a0a0a;color:#fff}
  .header{display:flex;align-items:center;gap:10px;padding:12px 15px;background:#000;border-bottom:1px solid #111}
  .header img{width:32px;height:32px;cursor:pointer}
  .header h1{margin:0;font-size:20px;font-weight:900;font-family:'Orbitron';background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:15px}
  .card{cursor:pointer}
  .thumb-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#111;border-radius:6px;overflow:hidden}
  .thumb-wrap img{width:100%;height:100%;object-fit:cover}
  .quality-badge{position:absolute;bottom:4px;left:4px;background:#000;padding:2px 5px;border-radius:3px;font-size:9px;font-weight:700;color:#25D366}
  .card-stats{display:flex;gap:10px;padding:4px 0;font-size:10px;color:#aaa}
  .stat-item{display:flex;align-items:center;gap:4px}
  .stat-icon{width:12px;height:12px;fill:#aaa}
  .stat-item.like .stat-icon{fill:#FF3B30}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.98);z-index:999;align-items:center;justify-content:center;padding:15px}
  .box{background:#111;padding:20px;border-radius:12px;width:100%;max-width:500px}
  input,select,button{width:100%;padding:12px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#fff;margin:8px 0}
  button{background:var(--gradient);border:none;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<div class="header">
  <img id="logoBtn" src="https://i.postimg.cc/LXYGQT8w/In-Shot-20260523-092931092-removebg-preview.png">
  <h1 id="appNameHeader">Chilagu Cinema</h1>
</div>

<h2 style="padding:0 15px">HOME</h2>
<div class="grid" id="homeGrid"></div>

<div class="overlay" id="adminBox"><div class="box">
  <h2 id="studioName">Admin</h2>
  <div id="passSection">
    <input type="password" id="adminPass" placeholder="Password">
    <button onclick="loginAdmin()">LOGIN</button>
  </div>
  <div id="adminForm" style="display:none">
    <input type="text" id="title" placeholder="Jina la Movie">
    <input type="text" id="thumbnail" placeholder="Link ya Picha">
    <input type="text" id="link" placeholder="Link ya Video">
    <select id="quality"><option value="HD">HD 720p</option><option value="FHD">1080p</option><option value="4K">4K HQ</option></select>
    <select id="cat">
      <option value="action">Action</option><option value="thriller">Thriller</option><option value="love">Love</option><option value="drama">Drama</option>
    </select>
    <select id="price"><option value="0">FREE</option><option value="1500">VIP 1500</option></select>
    <button onclick="saveMovie()">HIFADHI</button>
    <button onclick="closeAdmin()">Funga</button>
  </div>
</div></div>

<div class="overlay" id="playerBox"><div style="width:100%;background:#000"><span style="position:absolute;top:10px;right:10px;font-size:35px;cursor:pointer" onclick="closePlayer()">×</span><iframe id="videoFrame" src="" style="width:100%;aspect-ratio:16/9;border:none" allowfullscreen></iframe></div></div><script>
let appSettings = {};let movies = [];let logoClicks = 0;let editingDocId = null;
var firebaseConfig = {apiKey: "AIzaSyCVDXKkOYlhr5ez_dfA-jOQ8Ve_UXw5qWk",authDomain: "chilagu-update.firebaseapp.com",projectId: "chilagu-update",storageBucket: "chilagu-update.firebasestorage.app",messagingSenderId: "1007502056082",appId: "1:1007502056082:web:c20c43601cdae50059244b"};
firebase.initializeApp(firebaseConfig);var db = firebase.firestore();

function loadSettings(){
  db.collection("chilagu_settings").doc("main").get().then(doc=>{
    if(doc.exists){appSettings = doc.data();}else{
      appSettings = {appName:"Chilagu Cinema", appLogo:"https://i.postimg.cc/LXYGQT8w/In-Shot-20260523-092931092-removebg-preview.png", adminPassword:"1234"}
      db.collection("chilagu_settings").doc("main").set(appSettings);
    }
    document.getElementById('appTitle').innerText = appSettings.appName;
    document.getElementById('appNameHeader').innerText = appSettings.appName;
    document.getElementById('logoBtn').src = appSettings.appLogo;
    loadMovies();
  });
}

document.getElementById('logoBtn').onclick = function(){logoClicks++;if(logoClicks >= 5){document.getElementById('adminBox').style.display='flex';logoClicks = 0;}setTimeout(()=>{logoClicks=0}, 3000);}
function loginAdmin(){if(document.getElementById('adminPass').value === appSettings.adminPassword){document.getElementById('passSection').style.display='none';document.getElementById('adminForm').style.display='block';}}

function makeCard(m){
  let quality = `<div class="quality-badge">${m.quality||'HD'}</div>`;
  let views = m.views || 0;let likes = m.likes || 0;
  let eyeIcon = `<svg class="stat-icon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>`;
  let heartIcon = `<svg class="stat-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
  return `<div class="card" onclick='playMovie("${m.docId}", "${m.link}")'>
    <div class="thumb-wrap"><img src="${m.thumbnail}">${quality}</div>
    <p>${m.title}</p>
    <div class="card-stats">
      <div class="stat-item">${eyeIcon} ${views}</div>
      <div class="stat-item like" onclick="event.stopPropagation(); likeMovie('${m.docId}')">${heartIcon} ${likes}</div>
    </div>
  </div>`
}

function likeMovie(docId){let movie = movies.find(m=>m.docId==docId);movie.likes = (movie.likes||0) + 1;db.collection("chilagu_movies").doc(docId).update({likes: movie.likes});loadMovies();}
function renderMovies(){let homeGrid = document.getElementById('homeGrid');homeGrid.innerHTML = '';movies.forEach(m=>homeGrid.innerHTML += makeCard(m));}
function loadMovies(){db.collection("chilagu_movies").get().then(snapshot=>{movies = [];snapshot.forEach(doc=>{let d=doc.data(); d.docId=doc.id; movies.push(d);});renderMovies();});}
function saveMovie(){const movie = {title: document.getElementById('title').value,thumbnail: document.getElementById('thumbnail').value,link: document.getElementById('link').value,quality: document.getElementById('quality').value,cat: document.getElementById('cat').value,price: parseInt(document.getElementById('price').value),views:0,likes:0}db.collection("chilagu_movies").add(movie).then(()=>{document.querySelectorAll('#adminForm input').forEach(i=>i.value='');loadMovies();});}
function playMovie(docId, link){
  let movie = movies.find(m=>m.docId==docId);
  movie.views = (movie.views||0) + 1;
  db.collection("chilagu_movies").doc(docId).update({views: movie.views});
  document.getElementById("videoFrame").src = link+"?autoplay=1";
  document.getElementById("playerBox").style.display="flex";
}
function closePlayer(){document.getElementById("playerBox").style.display="none";document.getElementById("videoFrame").src=""}
function closeAdmin(){document.getElementById('adminBox').style.display='none';}
loadSettings();
</script>
</body>
</html>
