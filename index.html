<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chilagu Movies</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0f0f0f; color: #fff; }
     .header { display: flex; align-items: center; padding: 14px 16px; background: #1a1a1a; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
     .logo { width: 36px; height: 36px; margin-right: 12px; cursor: pointer; }
     .brand { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
     .search-bar { flex: 1; background: #222; border: 1px solid #333; border-radius: 8px; padding: 10px 14px; color: #fff; margin: 0 16px; font-size: 14px; }
     .search-bar:focus { outline: none; border-color: #a855f7; }
     .hero-slider { position: relative; width: 100%; height: 220px; overflow: hidden; margin-bottom: 20px; }
     .slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 0.8s; background-size: cover; background-position: center; cursor: pointer; }
     .slide.active { opacity: 1; }
     .slide-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(15,15,15,0.95)); padding: 20px 16px; }
     .slide-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
     .slide-desc { font-size: 13px; color: #aaa; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
     .btn-watch { background: linear-gradient(135deg, #a855f7, #ec4899); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
     .categories { padding: 0 16px; margin-bottom: 20px; }
     .cat-tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; }
     .cat-tabs::-webkit-scrollbar { display: none; }
     .cat-tab { background: #1a1a1a; border: 1px solid #2a2a2a; color: #aaa; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; white-space: nowrap; cursor: pointer; transition: all 0.2s; }
     .cat-tab.active { background: linear-gradient(135deg, #a855f7, #ec4899); color: #fff; border-color: transparent; }
     .section-title { padding: 0 16px; font-size: 17px; font-weight: 700; margin-bottom: 14px; }
     .movie-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 16px 40px; }
     .movie-card { background: #1a1a1a; border-radius: 10px; overflow: hidden; cursor: pointer; position: relative; border: 1px solid #222; transition: transform 0.2s; }
     .movie-card:active { transform: scale(0.97); }
     .thumbnail { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #222; }
     .card-info { padding: 8px; }
     .card-title { font-size: 12px; font-weight: 600; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 32px; }
     .star-badge { position: absolute; top: 8px; right: 8px; background: linear-gradient(135deg, #f59e0b, #f97316); color: #000; width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; box-shadow: 0 2px 8px rgba(245,158,11,0.4); }
     .modal,.admin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 1000; overflow-y: auto; }
     .modal-content,.admin-content { background: #1a1a1a; width: 95%; max-width: 600px; margin: 20px auto; border-radius: 16px; padding: 0; position: relative; border: 1px solid #2a2a2a; }
     .modal-content { max-width: 900px; }
     .close-btn { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; font-size: 24px; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; }
     .video-frame { width: 100%; aspect-ratio: 16/9; border: none; border-radius: 16px 16px 0 0; }
     .modal-info { padding: 20px; }
     .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
     .modal-desc { font-size: 14px; color: #aaa; line-height: 1.6; margin-bottom: 16px; }
     .price-box { background: #222; padding: 14px; border-radius: 10px; margin-bottom: 14px; border: 1px solid #2a2a2a; }
     .price-label { font-size: 12px; color: #888; margin-bottom: 4px; }
     .price-value { font-size: 22px; font-weight: 700; color: #10b981; }
     .btn-buy { background: linear-gradient(135deg, #10b981, #059669); color: #fff; border: none; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; margin-bottom: 20px; }
     .free-badge { background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; padding: 14px; border-radius: 10px; text-align: center; font-weight: 600; margin-bottom: 20px; }
     .comment-section { border-top: 1px solid #2a2a2a; padding-top: 20px; margin-top: 20px; }
     .comment-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
     .comment-form { background: #222; padding: 16px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #2a2a2a; }
     .comment-form input { width: 100%; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 10px; color: #fff; font-size: 14px; margin-bottom: 10px; }
     .comment-form textarea { width: 100%; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 10px; color: #fff; font-size: 14px; min-height: 80px; resize: vertical; margin-bottom: 10px; }
     .comment-form input:focus,.comment-form textarea:focus { outline: none; border-color: #a855f7; }
     .btn-comment { background: linear-gradient(135deg, #a855f7, #ec4899); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
     .comment-list { display: flex; flex-direction: column; gap: 12px; }
     .comment-item { background: #222; padding: 14px; border-radius: 10px; border: 1px solid #2a2a2a; }
     .comment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
     .comment-name { font-size: 14px; font-weight: 600; color: #a855f7; }
     .comment-date { font-size: 11px; color: #666; }
     .comment-text { font-size: 13px; color: #ccc; line-height: 1.5; }
     .comment-delete { background: #ef4444; color: #fff; border: none; padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; margin-top: 8px; }
     .admin-content { padding: 24px; }
     .admin-title { font-size: 22px; font-weight: 700; margin-bottom: 24px; text-align: center; }
     .tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid #2a2a2a; }
     .tab-btn { background: none; border: none; color: #666; padding: 12px 16px; font-size: 14px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; }
     .tab-btn.active { color: #a855f7; border-bottom-color: #a855f7; }
     .tab-content { display: none; }
     .tab-content.active { display: block; }
     .form-group { margin-bottom: 16px; }
     .form-group label { display: block; font-size: 13px; margin-bottom: 8px; color: #aaa; font-weight: 500; }
     .form-group input,.form-group select,.form-group textarea { width: 100%; background: #222; border: 1px solid #2a2a2a; border-radius: 8px; padding: 12px; color: #fff; font-size: 14px; font-family: 'Inter', sans-serif; }
     .form-group input:focus,.form-group select:focus,.form-group textarea:focus { outline: none; border-color: #a855f7; }
     .form-group textarea { resize: vertical; min-height: 80px; }
     .form-row { display: flex; gap: 12px; }
     .form-row.form-group { flex: 1; }
     .checkbox-group { display: flex; align-items: center; gap: 10px; background: #222; padding: 12px; border-radius: 8px; border: 1px solid #2a2a2a; }
     .checkbox-group input { width: auto; }
     .admin-buttons { display: flex; gap: 12px; margin-top: 24px; }
     .btn-save { flex: 1; background: linear-gradient(135deg, #a855f7, #ec4899); color: #fff; border: none; padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 15px; }
     .btn-cancel { flex: 1; background: #2a2a2a; color: #fff; border: none; padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 15px; }
     .movie-list { margin-top: 20px; }
     .movie-list-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
     .admin-movie-item { background: #222; padding: 14px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #2a2a2a; }
     .admin-movie-name { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
     .admin-movie-meta { font-size: 12px; color: #888; margin-bottom: 10px; }
     .admin-movie-actions { display: flex; gap: 8px; }
     .btn-edit { background: #3b82f6; color: #fff; border: none; padding: 8px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; flex: 1; font-weight: 500; }
     .btn-delete { background: #ef4444; color: #fff; border: none; padding: 8px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; flex: 1; font-weight: 500; }
     .empty-state { text-align: center; padding: 50px 20px; color: #666; }
     .login-box { background: #1a1a1a; width: 90%; max-width: 380px; margin: 100px auto; border-radius: 16px; padding: 30px; border: 1px solid #2a2a2a; }
     .login-title { font-size: 22px; font-weight: 700; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://i.postimg.cc/LXYGQT8w/In-Shot-20260523-092931092-removebg-preview.png" alt="Logo" class="logo" id="logo">
        <div class="brand">CHILAGU</div>
        <input type="text" class="search-bar" placeholder="Tafuta movie..." id="searchInput">
    </div>
    <div class="hero-slider" id="heroSlider"></div>
    <div class="categories">
        <div class="cat-tabs" id="catTabs">
            <button class="cat-tab active" data-cat="all">Zote</button>
            <button class="cat-tab" data-cat="Series">Series</button>
            <button class="cat-tab" data-cat="Singo">Singo</button>
            <button class="cat-tab" data-cat="Action">Action</button>
            <button class="cat-tab" data-cat="Drama">Drama</button>
            <button class="cat-tab" data-cat="Love">Love Story</button>
        </div>
    <h2 class="section-title">Movies Zote</h2>
    <div class="movie-grid" id="movieGrid"></div>
    <div class="modal" id="videoModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <iframe class="video-frame" id="videoFrame" allowfullscreen></iframe>
            <div class="modal-info">
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-desc" id="modalDesc"></div>
                <div id="priceSection"></div>
                <div class="comment-section">
                    <div class="comment-title">Maoni (<span id="commentCount">0</span>)</div>
                    <div class="comment-form">
                        <input type="text" id="commentName" placeholder="Jina lako">
                        <textarea id="commentText" placeholder="Andika maoni yako hapa..."></textarea>
                        <button class="btn-comment" onclick="addComment()">Tuma Maoni</button>
                    </div>
                    <div class="comment-list" id="commentList"></div>
                </div>
            </div>
        </div>
    <div class="admin-modal" id="loginModal">
        <div class="login-box">
            <div class="login-title">Admin Login</div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="adminPassword" placeholder="Weka password">
            </div>
            <button class="btn-save" onclick="checkPassword()" style="width: 100%;">Ingia</button>
        </div>
    </div>
    <div class="admin-modal" id="adminModal">
        <div class="admin-content">
            <button class="close-btn" onclick="closeAdmin()">&times;</button>
            <div class="admin-title">Admin Panel</div>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('movies')">Movies Zote</button>
                <button class="tab-btn" onclick="switchTab('add')">Ongeza Mpya</button>
            </div>
            <div class="tab-content active" id="moviesTab">
                <div class="movie-list">
                    <div class="movie-list-title">Movies Zote:</div>
                    <div id="adminMovieList"></div>
                </div>
            </div>
            <div class="tab-content" id="addTab">
                <input type="hidden" id="editMovieId">
                <div class="form-group">
                    <label>Jina la Movie *</label>
                    <input type="text" id="movieTitle" placeholder="Mfano: Safari ya Giza">
                </div>
                <div class="form-group">
                    <label>Link ya Thumbnail *</label>
                    <input type="text" id="movieThumbnail" placeholder="https://i.postimg.cc/...">
                </div>
                <div class="form-group">
                    <label>Link ya Video *</label>
                    <input type="text" id="movieVideo" placeholder="https://streamable.com/e/abc123">
                </div>
                <div class="form-group">
                    <label>Maelezo ya Movie *</label>
                    <textarea id="movieDesc" placeholder="Andika maelezo mafupi ya movie..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Category</label>
                        <select id="movieCat">
                            <option value="Series">Series</option>
                            <option value="Singo">Singo</option>
                            <option value="Action">Action</option>
                            <option value="Drama">Drama</option>
                            <option value="Love">Love Story</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Bei (Tsh) - 0 = Bure</label>
                        <input type="number" id="moviePrice" value="0">
                    </div>
                </div>
                <div class="form-group">
                    <label>Payhip Link - Kwa ajili ya malipo</label>
                    <input type="text" id="moviePayhip" placeholder="https://payhip.com/b/xxx">
                </div>
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="movieFeatured">
                        <label for="movieFeatured">Weka kwenye Banner Kuu</label>
                    </div>
                </div>
                <div class="admin-buttons">
                    <button class="btn-cancel" onclick="clearForm()">Futa</button>
                    <button class="btn-save" onclick="saveMovie()">Hifadhi Movie</button>
                </div>
            </div>
        </div>
    </div>
<script>
let movies = JSON.parse(localStorage.getItem('chilagu_movies') || '[]');
let comments = JSON.parse(localStorage.getItem('chilagu_comments') || '{}');
let currentMovieId = null;
let logoClickCount = 0;
let logoClickTimer = null;
const ADMIN_PASSWORD = 'ChilaguCinemaPro';

document.addEventListener('DOMContentLoaded', () => {
    if(movies.length === 0) initDefault();
    renderMovies();
    renderHeroSlider();
    setupLogoClick();
    document.getElementById('searchInput').addEventListener('input', filterMovies);
    document.querySelectorAll('.cat-tab').forEach(btn => btn.addEventListener('click', (e) => selectCategory(e.target.dataset.cat)));
});

function saveData() {
    localStorage.setItem('chilagu_movies', JSON.stringify(movies));
    localStorage.setItem('chilagu_comments', JSON.stringify(comments));
}

function initDefault() {
    movies = [
        {id:1,title:"KIFO CHA MUME WANGU",thumbnail:"https://i.ytimg.com/vi/dQw4w9WgXcQ/maxresdefault.jpg",video:"https://www.youtube.com/embed/dQw4w9WgXcQ",desc:"Hadithi ya kusisimua ya mke aliyepoteza mume wake ghafla. Siri nzito zinafichuka.",cat:"Drama",price:0,featured:true,payhip:""},
        {id:2,title:"SALA ZA USIKU",thumbnail:"https://i.ytimg.com/vi/dQw4w9WgXcQ/maxresdefault.jpg",video:"https://www.youtube.com/embed/dQw4w9WgXcQ",desc:"Movie ya kuogofya ya usiku. Kila anayeomba sala hii hapati amani.",cat:"Action",price:3000,featured:true,payhip:"https://payhip.com/b/test"}
    ];
    saveData();
}

function setupLogoClick() {
    document.getElementById('logo').addEventListener('click', () => {
        logoClickCount++;
        clearTimeout(logoClickTimer);
        if (logoClickCount >= 5) {
            logoClickCount = 0;
            document.getElementById('loginModal').style.display = 'block';
        } else {
            logoClickTimer = setTimeout(() => { logoClickCount = 0; }, 2000);
        }
    });
}

function checkPassword() {
    const pass = document.getElementById('adminPassword').value;
    if(pass === ADMIN_PASSWORD) {
        document.getElementById('loginModal').style.display = 'none';
        document.getElementById('adminModal').style.display = 'block';
        renderAdminMovies();
        document.getElementById('adminPassword').value = '';
    } else {
        alert('Password sio sahihi');
    }
}

function renderMovies(filter = '', category = 'all') {
    const grid = document.getElementById('movieGrid');
    let filtered = movies;
    if (category!== 'all') {
        filtered = filtered.filter(m => m.cat === category);
    }
    if (filter) {
        filtered = filtered.filter(m =>
            m.title.toLowerCase().includes(filter.toLowerCase()) ||
            m.desc.toLowerCase().includes(filter.toLowerCase())
        );
    }
    if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;">Hakuna movies</div>';
        return;
    }
    grid.innerHTML = filtered.map(m => `
        <div class="movie-card" onclick="openMovie(${m.id})">
            ${m.price > 0? '<div class="star-badge">⭐</div>' : ''}
            <img src="${m.thumbnail}" class="thumbnail" onerror="this.src='https://via.placeholder.com/400x600/222/666?text=No+Image'">
            <div class="card-info">
                <div class="card-title">${m.title}</div>
            </div>
        </div>
    `).join('');
}

function renderHeroSlider() {
    const slider = document.getElementById('heroSlider');
    const featured = movies.filter(m => m.featured).slice(0, 5);
    if (featured.length === 0) {
        slider.innerHTML = '<div class="slide active" style="background:#1a1a1a;display:flex;align-items:center;justify-content:center;"><div style="color:#666;">Hakuna Banner Movies</div></div>';
        return;
    }
    slider.innerHTML = featured.map((m, i) => `
        <div class="slide ${i === 0? 'active' : ''}" style="background-image:url('${m.thumbnail}')" onclick="openMovie(${m.id})">
            <div class="slide-overlay">
                <div class="slide-title">${m.title}</div>
                <div class="slide-desc">${m.desc}</div>
                <button class="btn-watch" onclick="event.stopPropagation(); openMovie(${m.id})">▶ Tazama Sasa</button>
            </div>
        </div>
    `).join('');
    let currentSlide = 0;
    setInterval(() => {
        const slides = slider.querySelectorAll('.slide');
        if(slides.length > 0) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }
    }, 5000);
}

function filterMovies() {
    const term = document.getElementById('searchInput').value;
    const activeCat = document.querySelector('.cat-tab.active').dataset.cat;
    renderMovies(term, activeCat);
}

function selectCategory(cat) {
    document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    const term = document.getElementById('searchInput').value;
    renderMovies(term, cat);
}

function openMovie(id) {
    const movie = movies.find(m => m.id === id);
    if (!movie) return;
    currentMovieId = id;
    document.getElementById('videoModal').style.display = 'block';
    document.getElementById('videoFrame').src = movie.video;
    document.getElementById('modalTitle').textContent = movie.title;
    document.getElementById('modalDesc').textContent = movie.desc;
    const priceSection = document.getElementById('priceSection');
    if (movie.price > 0) {
        priceSection.innerHTML = `
            <div class="price-box">
                <div class="price-label">Bei ya Movie</div>
                <div class="price-value">Tsh ${movie.price.toLocaleString()}</div>
            </div>
            <button class="btn-buy" onclick="buyMovie(${movie.id})">Nunua Sasa</button>
        `;
    } else {
        priceSection.innerHTML = `<div class="free-badge">✓ Movie ya Bure - Tazama Sasa</div>`;
    }
    renderComments(id);
}

function closeModal() {
    document.getElementById('videoModal').style.display = 'none';
    document.getElementById('videoFrame').src = '';
    currentMovieId = null;
}

function buyMovie(id) {
    const movie = movies.find(m => m.id === id);
    if (!movie) return;
    if (movie.payhip) {
        window.open(movie.payhip, '_blank');
    } else {
        alert(`Tuma Tsh ${movie.price.toLocaleString()} kwa M-Pesa 0686436004\n\nBaada ya kulipa, tuma screenshot WhatsApp kwa 0686436004 upate link ya kutazama.`);
    }
}

function renderComments(movieId) {
    const list = document.getElementById('commentList');
    const movieComments = comments[movieId] || [];
    document.getElementById('commentCount').textContent = movieComments.length;
    if (movieComments.length === 0) {
        list.innerHTML = '<div style="text-align:center;color:#666;padding:20px;">Hakuna maoni bado. Kuwa wa kwanza!</div>';
        return;
    }
    list.innerHTML = movieComments.map((c, index) => `
        <div class="comment-item">
            <div class="comment-header">
                <div class="comment-name">${c.name}</div>
                <div class="comment-date">${c.date}</div>
            </div>
            <div class="comment-text">${c.text}</div>
        </div>
    `).join('');
}

function addComment() {
    if (!currentMovieId) return;
    const name = document.getElementById('commentName').value.trim();
    const text = document.getElementById('commentText').value.trim();
    if (!name ||!text) {
        alert('Jaza jina na maoni yako');
        return;
    }
    if (!comments[currentMovieId]) comments[currentMovieId] = [];
    comments[currentMovieId].push({
        name: name,
        text: text,
        date: new Date().toLocaleDateString('sw-TZ', { day: 'numeric', month: 'short', year: 'numeric' })
    });
    saveData();
    document.getElementById('commentName').value = '';
    document.getElementById('commentText').value = '';
    renderComments(currentMovieId);
}

function closeAdmin() {
    document.getElementById('adminModal').style.display = 'none';
}

function switchTab(tab) {
    document.querySelectorAll('#adminModal.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('#adminModal.tab-content').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById(tab + 'Tab').classList.add('active');
    if(tab === 'movies') renderAdminMovies();
}

function renderAdminMovies() {
    const list = document.getElementById('adminMovieList');
    if (movies.length === 0) {
        list.innerHTML = '<div class="empty-state">Hakuna movies bado</div>';
        return;
    }
    list.innerHTML = movies.map(m => `
        <div class="admin-movie-item">
            <div class="admin-movie-name">${m.title}</div>
            <div class="admin-movie-meta">Bei: ${m.price > 0? 'Tsh ' + m.price.toLocaleString() : 'Bure'} | Category: ${m.cat} | ${m.featured? 'Banner' : 'Kawaida'}</div>
            <div class="admin-movie-actions">
                <button class="btn-edit" onclick="editMovie(${m.id})">Hariri</button>
                <button class="btn-delete" onclick="deleteMovie(${m.id})">Futa</button>
            </div>
        </div>
    `).join('');
}

function saveMovie() {
    const id = document.getElementById('editMovieId').value;
    const movieData = {
        title: document.getElementById('movieTitle').value.trim(),
        thumbnail: document.getElementById('movieThumbnail').value.trim(),
        video: document.getElementById('movieVideo').value.trim(),
        desc: document.getElementById('movieDesc').value.trim(),
        cat: document.getElementById('movieCat').value,
        price: parseInt(document.getElementById('moviePrice').value) || 0,
        payhip: document.getElementById('moviePayhip').value.trim(),
        featured: document.getElementById('movieFeatured').checked
    };
    if (!movieData.title ||!movieData.thumbnail ||!movieData.video ||!movieData.desc) {
        alert('Jaza sehemu zote zenye *');
        return;
    }
    if (id) {
        const index = movies.findIndex(m => m.id == id);
        movies[index] = {...movies[index],...movieData};
    } else {
        movies.push({ id: Date.now(),...movieData });
    }
    saveData();
    renderMovies();
    renderHeroSlider();
    renderAdminMovies();
    clearForm();
    alert('Movie imehifadhiwa!');
    switchTab('movies');
    document.querySelectorAll('.tab-btn')[0].click();
}

function editMovie(id) {
    const movie = movies.find(m => m.id === id);
    if (!movie) return;
    document.getElementById('editMovieId').value = id;
    document.getElementById('movieTitle').value = movie.title;
    document.getElementById('movieThumbnail').value = movie.thumbnail;
    document.getElementById('movieVideo').value = movie.video;
    document.getElementById('movieDesc').value = movie.desc;
    document.getElementById('movieCat').value = movie.cat;
    document.getElementById('moviePrice').value = movie.price;
    document.getElementById('moviePayhip').value = movie.payhip || '';
    document.getElementById('movieFeatured').checked = movie.featured;
    switchTab('add');
    document.querySelectorAll('.tab-btn')[1].click();
}

function deleteMovie(id) {
    if (!confirm('Una uhakika unataka kufuta movie hii?')) return;
    movies = movies.filter(m => m.id!== id);
    delete comments[id];
    saveData();
    renderMovies();
    renderHeroSlider();
    renderAdminMovies();
}

function clearForm() {
    document.getElementById('editMovieId').value = '';
    document.getElementById('movieTitle').value = '';
    document.getElementById('movieThumbnail').value = '';
    document.getElementById('movieVideo').value = '';
    document.getElementById('movieDesc').value = '';
    document.getElementById('moviePrice').value = '0';
    document.getElementById('moviePayhip').value = '';
    document.getElementById('movieFeatured').checked = false;
}

window.onclick = function(event) {
    if (event.target.classList.contains('modal') || event.target.classList.contains('admin-modal')) {
        event.target.style.display = 'none';
        if(event.target.id === 'videoModal') document.getElementById('videoFrame').src = '';
    }
}
</script>
</body>
</html>
