<!doctype html>
<html lang="sw">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHILAGU LEGACY</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
    }
    /* HEADER */
   .header {
      background: linear-gradient(135deg, #1a0b2e 0%, #000 100%);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2d1b4e;
    }
   .logo {
      font-size: 24px;
      font-weight: 900;
      background: linear-gradient(45deg, #a855f7, #d946ef);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
   .logo-sub {
      font-size: 10px;
      color: #888;
      letter-spacing: 2px;
    }

    /* HERO */
   .hero {
      background: #000;
      padding: 30px 20px;
      text-align: center;
      position: relative;
    }
   .play-btn {
      width: 70px;
      height: 70px;
      background: #a855f7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 0 30px #a855f7;
    }
   .hero-title {
      font-size: 28px;
      font-weight: 900;
      margin-bottom: 10px;
    }
   .badge {
      background: #a855f7;
      color: #fff;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      display: inline-block;
    }

    /* CATEGORY BUTTONS */
   .categories {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      padding: 20px;
    }
   .cat-btn {
      background: #1a1a1a;
      border: 2px solid #2d1b4e;
      border-radius: 15px;
      padding: 25px 10px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
    }
   .cat-btn.active {
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      border-color: #a855f7;
      box-shadow: 0 0 20px #a855f733;
    }
   .cat-btn.icon { font-size: 30px; margin-bottom: 8px; }
   .cat-btn.text { font-weight: bold; font-size: 14px; }

    /* FILTER TAGS */
   .filters {
      padding: 0 20px 20px;
      display: flex;
      gap: 10px;
      overflow-x: auto;
    }
   .filter {
      background: #1a1a1a;
      border: 1px solid #2d1b4e;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
    }
   .filter.active { background: #a855f7; border-color: #a855f7; }

    /* CONTENT GRID */
   .section-title {
      color: #a855f7;
      font-size: 18px;
      font-weight: 900;
      padding: 0 20px 15px;
    }
   .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
      padding: 0 20px 40px;
    }
   .card {
      background: #1a1a1a;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #2d1b4e;
    }
   .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }
   .card-body { padding: 10px; }
   .card-tag {
      background: transparent;
      border: 1px solid #a855f7;
      color: #a855f7;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 5px;
      display: inline-block;
      margin-bottom: 5px;
    }
   .card-title { font-size: 13px; font-weight: bold; margin-bottom: 5px; }
   .card-price { color: #0f0; font-size: 12px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="logo">CHILAGU<br>LEGACY</div>
    </div>
    <div class="logo-sub">STREAM • LIKE • A • BOSS</div>
  </div>

  <div class="hero">
    <div class="play-btn">▶</div>
    <div class="hero-title" id="hero-title">LOVE AND DESTINY</div>
    <div class="badge">🔥 SERIES MPYA</div>
  </div>

  <div class="categories">
    <div class="cat-btn active" data-cat="series">
      <div class="icon">📺</div>
      <div class="text">SERIES</div>
    </div>
    <div class="cat-btn" data-cat="singo">
      <div class="icon">🎬</div>
      <div class="text">SINGO MOVIE</div>
    </div>
  </div>

  <div class="filters">
    <div class="filter active" data-genre="zote">🔥 Zote</div>
    <div class="filter" data-genre="Drama">😢 Drama</div>
    <div class="filter" data-genre="Action">💥 Action</div>
    <div class="filter" data-genre="Love">💖 Love</div>
    <div class="filter" data-genre="Comedy">😂 Comedy</div>
  </div>

  <div class="section-title" id="section-title">SERIES ZOTE</div>
  <div class="grid" id="content-grid"></div>

  <script>
    let allContent = [];
    let currentCat = 'series';
    let currentGenre = 'zote';

    async function loadContent() {
      try {
        // Hii inasoma files zote kwenye _content
        const res = await fetch('/.netlify/functions/content');
        if (!res.ok) throw new Error('Function bado');
        allContent = await res.json();
      } catch (e) {
        // Fallback: jaribu kusoma moja kwa moja
        console.log('Tumia sample data');
        allContent = [];
      }
      renderContent();
    }

    function renderContent() {
      const grid = document.getElementById('content-grid');
      let filtered = allContent.filter(item => item.category === currentCat);

      if (currentGenre!== 'zote') {
        filtered = filtered.filter(item => item.genre === currentGenre);
      }

      if (filtered.length > 0) {
        document.getElementById('hero-title').textContent = filtered[0].title;
      }

      document.getElementById('section-title').textContent =
        currentCat === 'series'? 'SERIES ZOTE' : 'SINGO MOVIE ZOTE';

      grid.innerHTML = filtered.map(item => `
        <div class="card">
          <img src="${item.thumbnail}" alt="${item.title}">
          <div class="card-body">
            <div class="card-tag">${item.type.toUpperCase()}</div>
            <div class="card-title">${item.title}</div>
            <div class="card-price">${item.is_free? 'BURE' : 'TSh ' + item.price}</div>
          </div>
        </div>
      `).join('') || '<p style="grid-column:1/-1;text-align:center;color:#666;">Hakuna content bado. Ingia /admin</p>';
    }

    // Category buttons
    document.querySelectorAll('.cat-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCat = btn.dataset.cat;
        renderContent();
      }
    });

    // Genre filters
    document.querySelectorAll('.filter').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentGenre = btn.dataset.genre;
        renderContent();
      }
    });

    // Netlify Identity
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }

    loadContent();
  </script>
</body>
</html>
