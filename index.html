<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chilagu Legacy Cinema</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { 
    --bg: #000; 
    --card: #121212; 
    --gradient: linear-gradient(90deg, #8A2BE2, #FF1493); /* Purple to Pink kama yako */
    --star: #FFD700; 
    --green: #25D366; 
  }
  body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--bg); color: #fff; padding-bottom: 40px; }
  
  /* HEADER YAKO */
  .header { display: flex; align-items: center; gap: 12px; padding: 15px; background: #0a0a2a; } /* Bulu kama yako */
  .header img { width: 40px; height: 40px; border-radius: 50%; }
  .header h1 { margin: 0; font-size: 20px; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .sub-text { padding: 0 15px; font-size: 14px; color: #aaa; margin-top: 8px; }

  /* SEARCH BAR JUU */
  .search-wrap { padding: 15px; }
  .search { position: relative; }
  .search input { width: 100%; padding: 12px 40px 12px 15px; border-radius: 25px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 15px; box-sizing: border-box; }
  .search-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 18px; color: #888; }

  /* TABS KUBWA 3 */
  .main-tabs { display: flex; gap: 10px; padding: 0 15px 15px; } 
  .main-tab { flex: 1; padding: 12px; border-radius: 25px; background: #1a1a1a; font-size: 14px; text-align: center; cursor: pointer; font-weight: 600; color: #aaa; }
  .main-tab.active { background: var(--gradient); color: #fff; }

  /* CATEGORY NDOGO ZENYE BOX */
  .cat-wrap { padding: 0 15px 20px; }
  .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .cat-box { background: #1a1a1a; border-radius: 50px; padding: 12px 5px; text-align: center; cursor: pointer; font-size: 13px; font-weight: 600; color: #aaa; }
  .cat-box.active { background: var(--gradient); color: #fff; }

  /* MOVIE GRID */
  .section-title { padding: 0 15px; font-size: 20px; font-weight: 700; margin: 15px 0 10px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px; } 
  .card { background: var(--card); border-radius: 8px; overflow: hidden; position: relative; cursor: pointer; }
  .card .thumb { width: 100%; aspect-ratio: 2/3; background: #222; } 
  .star { position: absolute; top: 8px; right: 8px; width: 26px; height: 26px; background: var(--star); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #000; font-weight: 700; }
  .card p { margin: 0; padding: 8px; font-size: 13px; font-weight: 600; }

  /* POPUP YA SUBSCRIPTION */
  #subBox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 999; align-items: center; justify-content: center; }
  .sub-card { background: #181818; padding: 25px 20px; border-radius: 12px; width: 90%; max-width: 380px; text-align: center; }
  .sub-card h2 { margin: 0 0 10px; font-size: 22px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .sub-card .price { font-size: 32px; font-weight: 800; margin: 10px 0; }
  .sub-card .airtel { font-size: 20px; color: #e60000; font-weight: 800; margin: 8px 0; }
  .sub-card button { width: 100%; padding: 14px; margin-top: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Montserrat', sans-serif; background: var(--gradient); color: #fff; }
  .sub-card button.whatsapp { background: var(--green); }
</style>
</head>
<body>

<!-- HEADER YAKO -->
<div class="header">
  <img src="https://i.postimg.cc/LXYGQT8w/In-Shot-20260523-092931092-removebg-preview.png" alt="Logo">
  <h1>Chilagu Legacy Cinema</h1>
</div>
<p class="sub-text">Tunaweka movie mpya...</p>

<!-- SEARCH JUU KABISA -->
<div class="search-wrap">
  <div class="search"><input type="text" id="searchInput" placeholder="Tafuta movie hapa..." onkeyup="loadMovies()"><span class="search-icon">🔍</span></div>
</div>

<!-- TAB KUBWA 3 -->
<div class="main-tabs">
  <div class="main-tab active" onclick="filterMain('all', this)">📁 All Movies</div>
  <div class="main-tab" onclick="filterMain('series', this)">💻 Series</div>
  <div class="main-tab" onclick="filterMain('singo', this)">🎞️ Singo</div>
</div>

<!-- CATEGORY NDOGO 4 NDANI YA BOX -->
<div class="cat-wrap">
  <div class="cat-grid">
    <div class="cat-box active" onclick="filterCat('all', this)">Zote</div>
    <div class="cat-box" onclick="filterCat('action', this)">Action</div>
    <div class="cat-box" onclick="filterCat('love', this)">Love</div>
    <div class="cat-box" onclick="filterCat('drama', this)">Drama</div>
    <div class="cat-box" onclick="filterCat('thriller', this)">Thriller</div>
  </div>
</div>

<h2 class="section-title">Trending Now 🔥</h2>
<div class="grid" id="homeGrid"></div>

<h2 class="section-title">HOME</h2>
<p class="sub-text" style="text-align:center;">Tunaweka movie mpya...</p>

<h2 class="section-title">Watched ✓</h2>

<!-- POPUP YA SUBSCRIPTION -->
<div id="subBox"><div class="sub-card">
  <h2>Ingia VIP</h2>
  <p>Fungua Movies zote za ★ kwa Wiki 1</p>
  <p class="price">Tsh <span id="subPrice">2000</span></p>
  <p>Lipa kwa: <span class="airtel">0686436004</span></p> 
  <p>Jina: Moshi Idd</p>
  <a id="waLink" href="#" target="_blank" style="text-decoration:none;">
    <button class="whatsapp">NIMELIPA - PATA ACCESS</button>
  </a>
  <button onclick="closeSub()" style="background:#333; margin-top:8px;">Cancel</button>
</div></div>

<script>
/* ================== WEKA HAPA TU MZEE ================== */
const WEEKLY_KEY = "CHILAGU-WK43"; // <-- BADILISHA HII KILA JUMAPILI
const WEEKLY_PRICE = 2000;         // <-- BEI YA WIKI
const YOUR_WHATSAPP_LINK = "https://wa.me/255686436004?text=KEY " + WEEKLY_KEY; 
/* ======================================================= */

const movies = [
  {id: 1, title: "Movie Bure", type: "all", cat: "drama", price: 0, link: "https://drive.google.com/file/d/FREE/view"},
  {id: 2, title: "John Wick 4", type: "all", cat: "action", price: WEEKLY_PRICE, link: "https://drive.google.com/file/d/VIP1/view"},
  {id: 3, title: "Love Again", type: "all", cat: "love", price: 0, link: "https://drive.google.com/file/d/FREE2/view"},
  {id: 4, title: "The Conjuring", type: "all", cat: "thriller", price: WEEKLY_PRICE, link: "https://drive.google.com/file/d/VIP2/view"},
  {id: 5, title: "Money Heist", type: "series", cat: "action", price: WEEKLY_PRICE, link: "https://drive.google.com/file/d/SERIES1/view"},
];

let mainType = 'all', activeCat = 'all';

function loadMovies() {
  const grid = document.getElementById("homeGrid"); grid.innerHTML = "";
  let filtered = movies.filter(m => 
    (mainType === 'all' || m.type === mainType) && 
    (activeCat === 'all' || m.cat === activeCat) && 
    m.title.toLowerCase().includes(document.getElementById("searchInput").value.toLowerCase())
  );
  filtered.forEach(m => {
    const div = document.createElement("div"); div.className = "card";
    let star = m.price > 0 ? '<div class="star">★</div>' : ''; 
    div.innerHTML = `<div class="thumb"></div> ${star} <p>${m.title}</p>`;
    div.onclick = () => openMovie(m); grid.appendChild(div);
  });
}

function openMovie(m) {
  if(m.price === 0){ 
    window.open(m.link, "_blank"); 
  } else {
    // Movie ya ★ - Fungua Subscription
    document.getElementById("subPrice").innerText = WEEKLY_PRICE;
    document.getElementById("waLink").href = YOUR_WHATSAPP_LINK; 
    document.getElementById("subBox").style.display = "flex";
  }
}

function closeSub() { document.getElementById("subBox").style.display = "none"; }

function filterMain(type, el) { 
  mainType = type; 
  document.querySelectorAll(".main-tab").forEach(c => c.classList.remove("active")); 
  el.classList.add("active"); 
  loadMovies(); 
}
function filterCat(cat, el) { 
  activeCat = cat; 
  document.querySelectorAll(".cat-box").forEach(c => c.classList.remove("active")); 
  el.classList.add("active"); 
  loadMovies(); 
}
loadMovies();
</script>
</body>
</html>
