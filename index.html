<!doctype html>
<html lang="sw">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHILAGU LEGACY CINEMA</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
    }

    /* HEADER KAMA PICHA YA 2 */
 .header {
      background: #0a0a0a;
      padding: 16px 20px 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 1px solid #1a1a1a;
      position: relative;
      z-index: 10;
    }
 .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
 .logo-img {
      width: 38px;
      height: 38px;
      border-radius: 6px;
    }
 .logo-text {
      color: #a855f7;
      font-size: 19px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: 0.5px;
    }
 .logo-sub {
      font-size: 9px;
      color: #666;
      letter-spacing: 1.5px;
      text-align: right;
      line-height: 1.4;
      padding-top: 2px;
    }

    /* HERO AUTO SLIDE + THUMBNAIL KUBWA */
 .hero {
      position: relative;
      height: 450px;
      overflow: hidden;
      background: #000;
    }
 .hero-slide {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 1.2s ease-in-out;
      background-size: cover;
      background-position: center top;
    }
 .hero-slide.active { opacity: 1; }
 .hero-overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.95) 100%);
    }
 .hero-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 50px 20px 35px;
      text-align: center;
      z-index: 5;
    }
 .play-btn {
      width: 90px;
      height: 90px;
      background: #a855f7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 25px;
      box-shadow: 0 0 50px #a855f7, 0 0 80px #a855f733;
      font-size: 38px;
      cursor: pointer;
      transition: 0.3s;
    }
 .play-btn:hover { transform: scale(1.1); }
 .hero-title {
      font-size: 34px;
      font-weight: 900;
      margin-bottom: 18px;
      letter-spacing: 1.5px;
      text-shadow: 0 2px 10px #000;
    }
 .badge {
      background: #a855f7;
      color: #fff;
      padding: 9px 22px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: bold;
      display: inline-block;
    }
 .slide-dots {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 6;
    }
 .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: 0.3s;
      cursor: pointer;
    }
 .dot.active { background: #a855f7; width: 24px; border-radius: 4px; }

    /* CATEGORY KUBWA: SERIES vs SINGO */
 .categories {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 30px 20px 22px;
    }
 .cat-btn {
      background: #141414;
      border: 2px solid #2a2a2a;
      border-radius: 16px;
      padding: 32px 10px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
    }
 .cat-btn.active {
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      border-color: #a855f7;
      box-shadow: 0 0 30px #a855f744;
    }
 .cat-btn.icon { font-size: 36px; margin-bottom: 12px; }
 .cat-btn.text { font-weight: 900; font-size: 17px; letter-spacing: 1.2px; }

    /* CATEGORY NDOGO: Action, Love Story, Drama, Horror */
 .filters {
      padding: 0 20px 28px;
      display: flex;
      gap: 12px;
      overflow-x: auto;
    }
 .filters::-webkit-scrollbar { display: none; }
 .filter {
      background: #141414;
      border: 1px solid #2a2a2a;
      padding: 11px 20px;
      border-radius: 30px;
      font-size: 14px;
      white-space: nowrap;
      cursor: pointer;
      font-weight: 700;
    }
 .filter.active {
      background: #a855f7;
      border-color: #a855f7;
      box-shadow: 0 0 15px #a855f733;
    }

    /* GRID STYLE YA MOVIEBOX KAMA PICHA YA 3 */
 .section-title {
      color: #a855f7;
      font-size: 21px;
      font-weight: 900;
      padding: 0 20px 18px;
      letter-spacing: 1.2px;
    }
 .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 12px;
      padding: 0 20px 50px;
    }
 .card {
      background: #141414;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
      position: relative;
    }
 .card:hover { transform: scale(1.08); z-index: 5; }
 .card img {
      width: 100%;
      height: 165px;
      object-fit: cover;
    }
 .card-body { padding: 8px; }
 .card-title {
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
 .card-episode {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.8);
      color: #a855f7;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 6px;
      font-weight: bold;
    }
 .card-tag {
      position: absolute;
      top: 8px;
      left: 8px;
      background: #a855f7;
      color: #fff;
      font-size: 9px;
      padding: 3px 7px;
      border-radius: 5px;
      font-weight: bold;
    }

    /* MODAL YA ALBUM/PLAYLIST */
 .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 100;
      overflow-y: auto;
    }
 .modal-content {
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
    }
 .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
 .modal-close {
      font-size: 30px;
      cursor: pointer;
      color: #a855f7;
    }
 .episode-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
 .episode {
      background: #141414;
      padding: 15px;
      border-radius: 10px;
      display: flex;
      gap: 12px;
      align-items: center;
      cursor: pointer;
      border: 1px solid #2a2a2a;
    }
 .episode:hover { border-color: #a855f7; }
 .episode-num {
      width: 40px;
      height: 40px;
      background: #a855f7;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <img src="https://i.postimg.cc/LXYGQT8w/In-Shot-20260523-092931092-removebg-preview.png" alt="Logo" class="logo-img">
      <div class="logo-text">CHILAGU<br>LEGACY</div>
    </div>
    <div class="logo-sub">STREAM • LIKE • A •<br>BOSS</div>
  </div>

  <!-- HERO AUTO SLIDE -->
  <div class="hero" id="hero"></div>

  <!-- CATEGORY KUBWA -->
  <div class="categories">
    <div class="cat-btn active" data-cat="series">
      <div class="icon">📺</div>
      <div class="text">SERIES</div>
    </div>
    <div class="cat-btn" data-cat="singo">
      <div class="icon">🎬</div>
      <div class="text">SINGO MOVIE</div>
    </div>
  </div>

  <!-- CATEGORY NDOGO -->
  <div class="filters">
    <div class="filter active" data-genre="zote">🔥 Zote</div>
    <div class="filter" data-genre="Action">💥 Action</div>
    <div class="filter" data-genre="Love Story">💖 Love Story</div>
    <div class="filter" data-genre="Drama">😢 Drama</div>
    <div class="filter" data-genre="Horror">👻 Horror</div>
    <div class="filter" data-genre="Comedy">😂 Comedy</div>
  </div>

  <!-- CONTENT GRID -->
  <div class="section-title" id="section-title">SERIES ZOTE</div>
  <div class="grid" id="content-grid"></div>

  <!-- MODAL YA ALBUM/EPISODES -->
  <div class="modal" id="album-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">SERIES TITLE</h2>
        <div class="modal-close" onclick="closeModal()">&times;</div>
      </div>
      <div class="episode-list" id="episode-list"></div>
    </div>
  </div>

  <script>
    let allContent = [];
    let currentCat = 'series';
    let currentGenre = 'zote';
    let currentSlide = 0;
    let slideInterval;

    async function loadContent() {
      try {
        const res = await fetch('/.netlify/functions/content');
        if (!res.ok) throw new Error('Function bado');
        allContent = await res.json();
      } catch (e) {
        // SAMPLE DATA - ONDOA UKISHA POST KWELI
        allContent = [
          {
            title: "LOVE AND DESTINY",
            thumbnail: "https://i.postimg.cc/placeholder1.jpg",
            category: "series",
            genre: "Love Story",
            type: "series",
            episodes: 10,
            episodeList: Array.from({length: 10}, (_, i) => ({title: `Episode ${i+1}`, video: "#"}))
          },
          {
            title: "WARRIOR KING",
            thumbnail: "https://i.postimg.cc/placeholder2.jpg",
            category: "singo",
            genre: "Action",
            type: "singo"
          },
          {
            title: "CHEKA TU",
            thumbnail: "https://i.postimg.cc/placeholder3.jpg",
            category: "series",
            genre: "Comedy",
            type: "series",
            episodes: 8,
            episodeList: Array.from({length: 8}, (_, i) => ({title: `Sehemu ${i+1}`, video: "#"}))
          }
        ];
      }
      initHeroSlider();
      renderContent();
    }

    function initHeroSlider() {
      const hero = document.getElementById('hero');
      const featured = allContent.filter(item => item.episodes >= 5 || item.type === 'singo').slice(0, 5);

      if (featured.length === 0) return;

      hero.innerHTML = `
        <div class="hero-overlay"></div>
        ${featured.map((item, i) => `
          <div class="hero-slide ${i === 0? 'active' : ''}" style="background-image: url('${item.thumbnail}')"></div>
        `).join('')}
        <div class="hero-content">
          <div class="play-btn" onclick="playFeatured()">▶</div>
          <div class="hero-title" id="hero-title">${featured[0].title}</div>
          <div class="badge" id="hero-badge">🔥 ${featured[0].type.toUpperCase()} MPYA</div>
        </div>
        <div class="slide-dots" id="slide-dots">
          ${featured.map((_, i) => `<div class="dot ${i === 0? 'active' : ''}" data-slide="${i}"></div>`).join('')}
        </div>
      `;

      slideInterval = setInterval(() => {
        currentSlide = (currentSlide + 1) % featured.length;
        showSlide(currentSlide, featured);
      }, 4000);

      document.querySelectorAll('.dot').forEach(dot => {
        dot.onclick = () => {
          clearInterval(slideInterval);
          currentSlide = parseInt(dot.dataset.slide);
          showSlide(currentSlide, featured);
          slideInterval = setInterval(() => {
            currentSlide = (currentSlide + 1) % featured.length;
            showSlide(currentSlide, featured);
          }, 4000);
        }
      });
    }

    function showSlide(index, items) {
      document.querySelectorAll('.hero-slide').forEach((slide, i) => {
        slide.classList.toggle('active', i === index);
      });
      document.querySelectorAll('.dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === index);
      });
      document.getElementById('hero-title').textContent = items[index].title;
      document.getElementById('hero-badge').textContent = `🔥 ${items[index].type.toUpperCase()} MPYA`;
    }

    function playFeatured() {
      const featured = allContent.filter(item => item.episodes >= 5 || item.type === 'singo');
      const item = featured[currentSlide];
      if (item.episodes) {
        openAlbum(item);
      } else {
        alert(`Inacheza: ${item.title}`);
      }
    }

    function renderContent() {
      const grid = document.getElementById('content-grid');
      let filtered = allContent.filter(item => item.category === currentCat);

      if (currentGenre!== 'zote') {
        filtered = filtered.filter(item => item.genre === currentGenre);
      }

      document.getElementById('section-title').textContent =
        currentCat === 'series'? 'SERIES ZOTE' : 'SINGO MOVIE ZOTE';

      grid.innerHTML = filtered.map(item => `
        <div class="card" onclick="${item.episodes? `openAlbum(${JSON.stringify(item).replace(/"/g, '&quot;')})` : `alert('Inacheza: ${item.title}')`}">
          <img src="${item.thumbnail}" alt="${item.title}">
          ${item.episodes? `<div class="card-episode">EP ${item.episodes}</div>` : ''}
          <div class="card-tag">${item.type.toUpperCase()}</div>
          <div class="card-body">
            <div class="card-title">${item.title}</div>
          </div>
        </div>
      `).join('') || '<p style="grid-column:1/-1;text-align:center;color:#555;padding:50px 0;">Hakuna content bado. Ingia /admin post movie</p>';
    }

    function openAlbum(item) {
      document.getElementById('modal-title').textContent = item.title;
      const list = document.getElementById('episode-list');
      list.innerHTML = item.episodeList.map((ep, i) => `
        <div class="episode" onclick="alert('Inacheza: ${ep.title}')">
          <div class="episode-num">${i + 1}</div>
          <div>
            <div style="font-weight:bold;">${ep.title}</div>
            <div style="font-size:12px;color:#888;">${item.title}</div>
          </div>
        </div>
      `).join('');
      document.getElementById('album-modal').style.display = 'block';
    }

    function closeModal() {
      document.getElementById('album-modal').style.display = 'none';
    }

    document.querySelectorAll('.cat-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCat = btn.dataset.cat;
        renderContent();
      }
    });

    document.querySelectorAll('.filter').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentGenre = btn.dataset.genre;
        renderContent();
      }
    });

    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }

    loadContent();
  </script>
</body>
</html>
