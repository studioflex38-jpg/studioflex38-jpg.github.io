<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chilagu Movies</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #fff;
        }

        /* HEADER */
    .header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #111;
            position: sticky;
            top: 0;
            z-index: 100;
        }

    .logo {
            width: 40px;
            height: 40px;
            margin-right: 12px;
        }

    .search-bar {
            flex: 1;
            background: #222;
            border: none;
            border-radius: 20px;
            padding: 10px 16px;
            color: #fff;
            font-size: 14px;
        }

        /* HERO SLIDER - AUTOMATIC + BUTTONS JUU TU */
    .hero-slider {
            position: relative;
            width: 100%;
            height: 200px;
            overflow: hidden;
            margin-bottom: 16px;
        }

    .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            background-size: cover;
            background-position: center;
        }

    .slide.active {
            opacity: 1;
        }

    .slide-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            padding: 16px;
        }

    .slide-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 4px;
        }

    .slide-desc {
            font-size: 12px;
            color: #ccc;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

    .hero-buttons {
            display: flex;
            gap: 8px;
        }

    .btn-watch,.btn-details,.btn-buy {
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

    .btn-watch {
            background: #8b5cf6;
            color: #fff;
        }

    .btn-details {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }

    .btn-buy {
            background: #10b981;
            color: #fff;
        }

        /* CATEGORIES */
    .categories {
            padding: 0 16px;
            margin-bottom: 16px;
        }

    .main-cats,.sub-cats {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }

    .main-cats::-webkit-scrollbar,.sub-cats::-webkit-scrollbar {
            display: none;
        }

    .cat-btn {
            background: #222;
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
        }

    .cat-btn.active {
            background: #8b5cf6;
        }

    .sub-cats {
            margin-top: 10px;
        }

    .sub-cat-btn {
            background: #1a1a1a;
            border: none;
            color: #fff;
            padding: 10px;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            font-size: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

    .sub-cat-btn.active {
            background: #8b5cf6;
        }

        /* MOVIE GRID - CARD NDOGO ZA ULALO 3 KWA SAFU */
    .section-title {
            padding: 0 16px;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }

    .movie-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 0 16px 30px;
        }

    .movie-card {
            background: #111;
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

    .movie-card:hover {
            transform: scale(1.05);
        }

    .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: #222;
        }

    .card-info {
            padding: 6px;
        }

    .card-title {
            font-size: 11px;
            font-weight: 600;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 26px;
        }

    .price-tag {
            font-size: 10px;
            color: #10b981;
            font-weight: bold;
            margin-top: 3px;
        }

    .free-tag {
            font-size: 10px;
            color: #8b5cf6;
            font-weight: bold;
            margin-top: 3px;
        }

        /* MODAL */
    .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

    .modal-content {
            width: 95%;
            max-width: 900px;
            position: relative;
        }

    .close-btn {
            position: absolute;
            top: -40px;
            right: 0;
            background: none;
            border: none;
            color: #fff;
            font-size: 30px;
            cursor: pointer;
        }

    .video-frame {
            width: 100%;
            aspect-ratio: 16/9;
            border: none;
            border-radius: 8px;
        }

    .modal-info {
            padding: 16px 0;
        }

    .modal-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }

    .modal-desc {
            font-size: 13px;
            color: #ccc;
            line-height: 1.5;
            margin-bottom: 12px;
        }

    .modal-buy {
            background: #10b981;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="header">
        <img src="https://i.postimg.cc/LXYGQT8w/In-Shot-20260523-092931092-removebg-preview.png" alt="Chilagu" class="logo">
        <input type="text" class="search-bar" placeholder="Tafuta movie, series..." id="searchInput">
    </div>

    <!-- HERO SLIDER - BUTTON ZIPO HAPA TU -->
    <div class="hero-slider" id="heroSlider"></div>

    <!-- CATEGORIES -->
    <div class="categories">
        <div class="main-cats" id="mainCats">
            <button class="cat-btn active" data-cat="all">🎬 All Movies</button>
            <button class="cat-btn" data-cat="Series">📺 Series</button>
            <button class="cat-btn" data-cat="singo">🎬 Singo</button>
        </div>
        <div class="sub-cats" id="subCats">
            <button class="sub-cat-btn active" data-sub="all">🔥<br>Zote</button>
            <button class="sub-cat-btn" data-sub="Action">💥<br>Action</button>
            <button class="sub-cat-btn" data-sub="Love Story">❤️<br>Love</button>
            <button class="sub-cat-btn" data-sub="Drama">😢<br>Drama</button>
            <button class="sub-cat-btn" data-sub="Clips & Comedy">😂<br>Comedy</button>
        </div>
    </div>

    <!-- TRENDING SECTION - CARD TU, HAKUNA BUTTON -->
    <h2 class="section-title">TRENDING SASA</h2>
    <div class="movie-grid" id="movieGrid"></div>

    <!-- MODAL -->
    <div class="modal" id="videoModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <iframe class="video-frame" id="videoFrame" allowfullscreen></iframe>
            <div class="modal-info">
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-desc" id="modalDesc"></div>
                <button class="modal-buy" id="modalBuyBtn" style="display:none;">Nunua Sasa - Tsh <span id="modalPrice"></span></button>
            </div>
        </div>
    </div>

    <script>
        const movies = [
            {
                title: "TRAILER: Yellow RECKONING Full Power",
                thumbnail: "https://i.postimg.cc/YSnrwTCg/file-000000007ed871f49b545ab627e53b0d.png",
                videoUrl: "https://streamable.com/e/02hbc4?",
                price: 0,
                isFree: true,
                mainCategory: "Series",
                subCategory: "Drama",
                featured: true,
                payhipLink: "",
                description: "Kisasi cha Binti, alie poteza familia yake kwa Mr Bad Ghost. The Yellow Reckoning imeanza."
            },
            {
                title: "MPANDA MNAZI KWA MKONO MMOJA",
                thumbnail: "https://i.postimg.cc/HLJg2GPL/file-0000000001e471f481a5cc83ddc746bd.png",
                videoUrl: "https://streamable.com/e/83261w?",
                price: 0,
                isFree: true,
                mainCategory: "singo",
                subCategory: "Clips & Comedy",
                featured: true,
                payhipLink: "",
                description: "Mpanda Mnazi Kwa Mkono Mmoja - Comedy kali ya mtaani."
            },
            {

         ];
                

        let currentSlide = 0;
        let activeMainCat = 'all';
        let activeSubCat = 'all';

        // HERO SLIDER - BUTTON ZIPO HAPA TU
        function renderHero() {
            const featured = movies.filter(m => m.featured);
            const slider = document.getElementById('heroSlider');

            slider.innerHTML = featured.map((movie, index) => `
                <div class="slide ${index === 0? 'active' : ''}" style="background-image: url('${movie.thumbnail}')">
                    <div class="slide-overlay">
                        <div class="slide-title">${movie.title}</div>
                        <div class="slide-desc">${movie.description}</div>
                        <div class="hero-buttons">
                            ${movie.isFree? 
                                `<button class="btn-watch" onclick="openModal(${JSON.stringify(movie).replace(/"/g, '&quot;')})">▶ Watch Now</button>
                                 <button class="btn-details" onclick="openModal(${JSON.stringify(movie).replace(/"/g, '&quot;')})">ℹ Details</button>` 
                                : 
                                `<button class="btn-buy" onclick="window.open('${movie.payhipLink}', '_blank')">💰 Nunua Tsh ${movie.price}</button>
                                 <button class="btn-details" onclick="openModal(${JSON.stringify(movie).replace(/"/g, '&quot;')})">ℹ Details</button>`
                            }
                        </div>
                    </div>
                </div>
            `).join('');

            // AUTO SLIDE KILA SEKUNDE 4
            setInterval(() => {
                const slides = document.querySelectorAll('.slide');
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
            }, 4000);
        }

        // MOVIE GRID - CARD NDOGO 3 KWA SAFU, HAKUNA BUTTON
        function renderMovies() {
            const grid = document.getElementById('movieGrid');
            let filtered = movies;

            if (activeMainCat!== 'all') {
                filtered = filtered.filter(m => m.mainCategory === activeMainCat);
            }
            if (activeSubCat!== 'all') {
                filtered = filtered.filter(m => m.subCategory === activeSubCat);
            }

            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(m =>
                    m.title.toLowerCase().includes(searchTerm) ||
                    m.description.toLowerCase().includes(searchTerm)
                );
            }

            grid.innerHTML = filtered.map(movie => `
                <div class="movie-card" onclick="handleCardClick(${JSON.stringify(movie).replace(/"/g, '&quot;')})">
                    <img src="${movie.thumbnail}" alt="${movie.title}" class="thumbnail">
                    <div class="card-info">
                        <div class="card-title">${movie.title}</div>
                        ${movie.isFree? 
                            `<div class="free-tag">FREE</div>` : 
                            `<div class="price-tag">Tsh ${movie.price}</div>`
                        }
                    </div>
                </div>
            `).join('');
        }

        // HANDLE CARD CLICK - FREE = PLAY, PAID = PAYHIP
        function handleCardClick(movie) {
            if (movie.isFree) {
                openModal(movie);
            } else {
                window.open(movie.payhipLink, '_blank');
            }
        }

        // MODAL
        function openModal(movie) {
            if (!movie.isFree) {
                document.getElementById('videoFrame').style.display = 'none';
                document.getElementById('modalBuyBtn').style.display = 'block';
                document.getElementById('modalPrice').textContent = movie.price;
                document.getElementById('modalBuyBtn').onclick = () => window.open(movie.payhipLink, '_blank');
            } else {
                document.getElementById('videoFrame').style.display = 'block';
                document.getElementById('videoFrame').src = movie.videoUrl;
                document.getElementById('modalBuyBtn').style.display = 'none';
            }
            document.getElementById('modalTitle').textContent = movie.title;
            document.getElementById('modalDesc').textContent = movie.description;
            document.getElementById('videoModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('videoFrame').src = '';
            document.getElementById('videoModal').style.display = 'none';
        }

        // CATEGORY FILTERS
        document.getElementById('mainCats').addEventListener('click', (e) => {
            if (e.target.classList.contains('cat-btn')) {
                document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                activeMainCat = e.target.dataset.cat;
                renderMovies();
            }
        });

        document.getElementById('subCats').addEventListener('click', (e) => {
            if (e.target.classList.contains('sub-cat-btn')) {
                document.querySelectorAll('.sub-cat-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                activeSubCat = e.target.dataset.sub;
                renderMovies();
            }
        });

        // SEARCH
        document.getElementById('searchInput').addEventListener('input', renderMovies);

        // CLOSE MODAL
        document.getElementById('videoModal').addEventListener('click', (e) => {
            if (e.target.id === 'videoModal') closeModal();
        });

        // INIT
        renderHero();
        renderMovies();
    </script>
</body>
</html>
