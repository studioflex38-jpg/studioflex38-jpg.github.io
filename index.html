<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; color:#fff; font-family:Arial; }
.container { padding:15px; overflow-y:auto; height:100vh; }

  /* HEADER NA LOGO YAKO */
.header {
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:15px;
  }
.logo {
    width:40px;
    height:40px;
  }
.app-name {
    font-size:14px;
    color:#fff;
    font-weight:600;
  }

  /* HERO BANNER KAMA PICHA YAKO */
.hero-banner {
    position:relative;
    border-radius:12px;
    overflow:hidden;
    margin-bottom:20px;
  }
.hero-banner img {
    width:100%;
    height:230px;
    object-fit:cover;
  }
.hero-overlay {
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    padding:15px;
    background:linear-gradient(transparent, #000 80%);
  }
.hero-title {
    font-size:26px;
    font-weight:bold;
    margin:0 0 8px 0;
    line-height:1.2;
  }
.hero-desc {
    font-size:13px;
    color:#ccc;
    margin:0 0 12px 0;
    line-height:1.4;
  }

  /* BUTTON TAZAMA - PINK/PURPLE KAMA YAKO */
.btn-tazama {
    background:linear-gradient(90deg, #C44569, #F8B500);
    color:#fff;
    border:none;
    padding:10px 25px;
    border-radius:25px;
    font-weight:bold;
    font-size:15px;
    display:flex;
    align-items:center;
    gap:8px;
  }

  /* TABS ZA JUU */
.tabs {
    display:flex;
    gap:10px;
    margin:20px 0;
    overflow-x:auto;
  }
.tab {
    background:#1a1a1a;
    color:#ccc;
    padding:10px 18px;
    border-radius:25px;
    border:none;
    font-size:14px;
    display:flex;
    align-items:center;
    gap:6px;
    white-space:nowrap;
  }
.tab.active {
    background:linear-gradient(90deg, #C44569, #F8B500);
    color:#fff;
  }

  /* ICON ZA CATEGORY KAMA PICHA YAKO */
.genre-icons {
    display:flex;
    gap:25px;
    margin:15px 0 25px 0;
    justify-content:center;
  }
.genre {
    text-align:center;
  }
.genre-circle {
    width:60px;
    height:60px;
    border-radius:50%;
    background:#1a1a1a;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 5px auto;
    font-size:28px;
  }
.genre.active.genre-circle {
    background:linear-gradient(135deg, #C44569, #F8B500);
  }
.genre p {
    margin:0;
    font-size:12px;
    color:#888;
  }
.genre.active p {
    color:#fff;
  }

  /* TRENDING */
.section-title {
    font-size:18px;
    font-weight:bold;
    margin:25px 0 12px 0;
    display:flex;
    align-items:center;
    gap:5px;
  }

  /* CARD ZAKO ZILE ZILE */
.movie-row {
    display:flex;
    gap:12px;
    overflow-x:auto;
    padding-bottom:15px;
  }
.movie-card {
    min-width:150px;
    background:#1a1a1a;
    border-radius:10px;
    overflow:hidden;
  }
.movie-card img {
    width:150px;
    height:210px;
    object-fit:cover;
    display:block;
  }
.movie-card p {
    padding:8px;
    margin:0;
    font-size:13px;
    font-weight:500;
  }

  /* COMMENT SECTION */
.comment-section {
    margin-top:30px;
    padding-top:20px;
    border-top:1px solid #222;
  }
.comment-box {
    background:#1a1a1a;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
  }
.comment-input {
    width:100%;
    padding:10px;
    background:#1a1a1a;
    border:1px solid #333;
    color:#fff;
    border-radius:8px;
    margin:5px 0;
  }
.btn-comment {
    width:100%;
    padding:12px;
    background:linear-gradient(90deg, #C44569, #F8B500);
    border:none;
    color:#fff;
    border-radius:8px;
    font-weight:bold;
    margin-top:8px;
  }
</style>
</head>
<body>
<div class="container">

  <!-- HEADER NA LOGO YAKO -->
  <div class="header">
    <img class="logo" src="https://i.postimg.cc/LXYGQT8w/In-Shot-20260523-092931092-removebg-preview.png">
    <div class="app-name">CHILAGU LEGACY CINEMA</div>
  </div>

  <!-- HERO BANNER KAMA YAKO -->
  <div class="hero-banner">
    <img id="heroImage" src="https://i.postimg.cc/7Yr5rR8L/yellow-poster.jpg">
    <div class="hero-overlay">
      <h1 class="hero-title" id="heroTitle">TRAILER | YELLOW RECKONING FULL POWER</h1>
      <p class="hero-desc" id="heroDesc">kisasi cha Binti Ida, kupoteza family yake, je ataweza kulipa kisasi Kwa huyu shetani Ambae hatazamiki??</p>
      <button class="btn-tazama" onclick="tazamaMovie()">▶ Tazama</button>
    </div>
  </div>

  <!-- TABS ZA JUU -->
  <div class="tabs">
    <button class="tab active">🎬 All Movies</button>
    <button class="tab">📺 Series</button>
    <button class="tab">🎞️ Singo</button>
  </div>

  <!-- ICON ZA CATEGORY -->
  <div class="genre-icons">
    <div class="genre active">
      <div class="genre-circle">🔥</div>
      <p>Zote</p>
    </div>
    <div class="genre">
      <div class="genre-circle">⚡</div>
      <p>Action</p>
    </div>
    <div class="genre">
      <div class="genre-circle">❤️</div>
      <p>Love</p>
    </div>
    <div class="genre">
      <div class="genre-circle">🎭</div>
      <p>Drama</p>
    </div>
  </div>

  <!-- TRENDING -->
  <h2 class="section-title">TRENDING 🔥</h2>
  <div class="movie-row" id="trendingRow">
    <div class="movie-card">
      <img src="https://i.postimg.cc/7Yr5rR8L/yellow-poster.jpg">
      <p>TRAILER | Yellow...</p>
    </div>
    <div class="movie-card">
      <img src="https://i.postimg.cc/3J4k6Q2B/love-destiny.jpg">
      <p>LOVE AND DESTINY</p>
    </div>
  </div>

  <!-- COMMENT SECTION - LIVE -->
  <div class="comment-section">
    <h3 style="margin-bottom:15px;">Comments</h3>
    <div id="commentList" style="max-height:250px; overflow-y:auto;"></div>

    <input class="comment-input" id="nameInput" placeholder="Jina lako">
    <textarea class="comment-input" id="commentInput" placeholder="Andika comment yako..." rows="3"></textarea>
    <button class="btn-comment" onclick="tumaComment()">Tuma Comment</button>
  </div>

</div>

<script>
// ======= URL YA GOOGLE SHEET YAKO =======
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxdUjSRj9jp-ZJvpYdGAtelC4yuTkD5azCOE2FPVdBBMGlSeNO6_ZhzjJ67LMfGfZUr/exec";
const movieId = "yellow1"; // ID ya movie hii

// ======= FUNCTION YA TAZAMA =======
function tazamaMovie() {
  alert("Unafungua: YELLOW RECKONING");
  // Weka code yako ya kufungua video hapa
}

// ======= SOMA COMMENT KUTOKA GOOGLE SHEET =======
async function loadComments() {
  try {
    const res = await fetch(SCRIPT_URL + "?movieId=" + movieId);
    const data = await res.json();

    const commentList = document.getElementById("commentList");
    commentList.innerHTML = "";

    if(data.length === 0) {
      commentList.innerHTML = "<p style='color:#666; text-align:center'>Kuwa wa kwanza ku-comment</p>";
      return;
    }

    data.reverse().forEach(c => {
      commentList.innerHTML += `
        <div class="comment-box">
          <b style="color:#F8B500">${c.name}</b>
          <span style="color:#666; font-size:11px; float:right">${c.date}</span>
          <p style="margin:5px 0 0 0; font-size:13px;">${c.comment}</p>
        </div>
      `;
    });
  } catch(e) {
    console.log("Error:", e);
  }
}

// ======= TUMA COMMENT KWENDA SHEET =======
async function tumaComment() {
  const name = document.getElementById("nameInput").value.trim() || "Anonymous";
  const comment = document.getElementById("commentInput").value.trim();

  if(!comment) {
    alert("Andika comment kwanza mzee");
    return;
  }

  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        Content_ID: movieId,
        Name: name,
        Comment: comment,
        Date: new Date().toLocaleString()
      })
    });

    document.getElementById("commentInput").value = "";
    loadComments();
    alert("Comment imetumwa!");
  } catch(e) {
    alert("Imeshindikana kutuma comment");
  }
}

// LOAD COMMENTS APP INAPOFUNGUKA
loadComments();
</script>
</body>
</html>
