<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CHILAGU Legacy Cinema</title>
<style>
:root{--bg:#060610;--card:#121220;--accent:#8b5cf6;--accent2:#a855f7;--text:#fff;--muted:#999}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,system-ui;background:var(--bg);color:var(--text);padding-bottom:80px}
header{position:sticky;top:0;z-index:100;background:rgba(6,6,16,.95);backdrop-filter:blur(12px);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1a2e}
.logo{height:32px;cursor:pointer;user-select:none}
.header-right{display:flex;gap:12px;align-items:center}
.icon-btn{width:36px;height:36px;border-radius:50%;background:#1a1a2e;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;border:none;color:var(--text)}
.container{max-width:1200px;margin:0 auto;padding:14px}
.banner{position:relative;height:45vh;min-height:320px;border-radius:16px;overflow:hidden;margin-bottom:20px}
.banner img{width:100%;height:100%;object-fit:cover}
.banner .shade{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(6,6,16,1) 100%)}
.banner .content{position:absolute;bottom:0;left:0;right:0;padding:20px}
.banner h1{font-size:28px;margin-bottom:6px}
.banner p{color:#ccc;font-size:14px;margin-bottom:12px;max-width:600px;line-height:1.5}
.btn{padding:10px 20px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-weight:700;cursor:pointer}
.btn:hover{opacity:.9}
.section{margin:24px 0}
.section h2{margin-bottom:12px;font-size:18px;font-weight:700}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.card{position:relative;background:var(--card);border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid #1e1e2f}
.card img{width:100%;aspect-ratio:16/9;object-fit:cover}
.card .info{padding:8px}
.card .title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .meta{font-size:10px;color:var(--muted);margin-top:3px}
.paid-badge{position:absolute;top:6px;right:6px;background:#f59e0b;color:#000;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:800}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:200;display:none;align-items:center;justify-content:center;padding:12px}
.modal.active{display:flex}
.modal .box{background:var(--card);border-radius:14px;max-width:700px;width:100%;max-height:95vh;overflow-y:auto}
.modal .player{width:100%;aspect-ratio:16/9;background:#000}
.modal .player iframe{width:100%;height:100%;border:none}
.modal .body{padding:16px}
.modal .title{font-size:20px;margin-bottom:6px}
.modal .desc{color:#ccc;margin:10px 0;line-height:1.6;font-size:14px}
.comment-box{margin-top:16px;border-top:1px solid #222;padding-top:12px}
.comment-box textarea{width:100%;padding:8px;border-radius:6px;border:1px solid #333;background:#0a0a16;color:var(--text);min-height:60px}
.comment{margin-top:8px;padding:8px;background:#0a0a16;border-radius:6px;font-size:13px}
.admin,.creator{position:fixed;inset:0;background:var(--bg);z-index:300;display:none;overflow-y:auto}
.admin.active,.creator.active{display:block}
.admin header,.creator header{position:sticky}
.wrap{max-width:850px;margin:0 auto;padding:18px}
.input-group{margin-bottom:14px}
.input-group label{display:block;margin-bottom:5px;font-size:12px;color:var(--muted)}
.input-group input,.input-group textarea,.input-group select{width:100%;padding:10px;border-radius:6px;border:1px solid #333;background:#0a0a16;color:var(--text);outline:none;font-size:14px}
.input-group textarea{min-height:70px;resize:vertical}
.movie-item{background:var(--card);padding:12px;border-radius:8px;margin-bottom:10px;border:1px solid #222}
.checkbox-group{display:flex;align-items:center;gap:8px;margin:12px 0}
.checkbox-group input{width:18px;height:18px}
.password-modal{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:400;display:none;align-items:center;justify-content:center}
.password-modal.active{display:flex}
.password-box{background:var(--card);padding:24px;border-radius:12px;width:300px}
.password-box input{width:100%;padding:10px;margin:10px 0;border-radius:6px;border:1px solid #333;background:#0a0a16;color:var(--text)}
@media(max-width:600px){.grid{grid-template-columns:repeat(3,1fr)}.banner h1{font-size:22px}}
.hidden{display:none!important}
</style>
</head>
<body>
<header>
<img src="https://i.postimg.cc/LXYGQT8w/In-Shot-20260523-092931092-removebg-preview.png" class="logo" id="logoBtn" alt="CHILAGU">
<div class="header-right">
<button class="icon-btn" onclick="openCreator()">🎥</button>
</div>
</header>
<div class="container">
<div id="banner" class="banner hidden">
<img id="bannerImg" src="">
<div class="shade"></div>
<div class="content">
<h1 id="bannerTitle"></h1>
<p id="bannerDesc"></p>
<button class="btn" onclick="playBanner()">▶ Cheza Sasa</button>
</div>
</div>
<div class="section">
<h2>Movies Mpya</h2>
<div id="moviesGrid" class="grid"></div>
</div>
</div>
<div id="modal" class="modal" onclick="closeModal(event)">
<div class="box" onclick="event.stopPropagation()">
<div class="player"><iframe id="playerFrame" allowfullscreen></iframe></div>
<div class="body">
<div class="title" id="modalTitle"></div>
<div class="desc" id="modalDesc"></div>
<button class="btn" id="watchBtn" onclick="watchMovie()">Cheza</button>
<div class="comment-box">
<strong>Maoni:</strong>
<textarea id="commentInput" placeholder="Andika maoni yako hapa..."></textarea>
<button class="btn" style="margin-top:8px" onclick="addComment()">Tuma Maoni</button>
<div id="commentsList"></div>
</div>
</div>
</div>
</div>
<div id="creator" class="creator">
<header>
<div style="font-size:18px;font-weight:700">Creator Dashboard</div>
<button class="btn" onclick="closeCreator()">Funga</button>
</header>
<div class="wrap">
<h2>Tuma Movie Yako</h2>
<div class="input-group"><label>Jina la Channel/Studio</label><input id="cStudio" placeholder="CHILAGU Studios"></div>
<div class="input-group"><label>Namba ya Simu - Malipo</label><input id="cPhone" placeholder="0677xxxxxx"></div>
<div class="input-group"><label>Email</label><input id="cEmail" type="email" placeholder="email@example.com"></div>
<div class="input-group"><label>Link ya Streamable</label><input id="cStream" placeholder="https://streamable.com/e/xxx"></div>
<div class="input-group"><label>Link ya Thumbnail</label><input id="cThumb" placeholder="https://..."></div>
<div class="input-group"><label>Maelezo ya Movie</label><textarea id="cDesc" placeholder="Andika maelezo ya movie yako"></textarea></div>
<div class="input-group"><label>Bei Unayopendekeza TZS</label><input id="cPrice" type="number" placeholder="500"></div>
<div class="input-group"><label>Nataka Promotion Banner?</label><input id="cPromoPrice" type="number" placeholder="Bei ya promotion"></div>
<div class="checkbox-group">
<input type="checkbox" id="cTerms">
<label for="cTerms">Nakubali: Hakuna matusi/content isiyohusiana na app</label>
</div>
<button class="btn" onclick="submitCreator()">Tuma Maombi kwa Admin</button>
</div>
</div>
<div id="passwordModal" class="password-modal" onclick="closePass(event)">
<div class="password-box" onclick="event.stopPropagation()">
<h3>Admin Login</h3>
<input type="password" id="passInput" placeholder="Weka password">
<button class="btn" onclick="checkPass()">Ingia</button>
</div>
</div>

<div id="admin" class="admin">
<header>
<div style="font-size:18px;font-weight:700">Admin Panel</div>
<button class="btn" onclick="closeAdmin()">Toka</button>
</header>
<div class="wrap">
<h2>Maombi ya Creators</h2>
<div id="pendingList"></div>
<h2 style="margin-top:30px">Movies Zilizo Pitishwa</h2>
<div id="approvedList"></div>
</div>
</div>

<script>
let movies=JSON.parse(localStorage.getItem('chilagu_movies')||'[]');
let pending=JSON.parse(localStorage.getItem('chilagu_pending')||'[]');
let currentMovie=null;
let logoClicks=0;
let logoTimer=null;

function saveMovies(){localStorage.setItem('chilagu_movies',JSON.stringify(movies))}
function savePending(){localStorage.setItem('chilagu_pending',JSON.stringify(pending))}

function renderMovies(){
const grid=document.getElementById('moviesGrid');
grid.innerHTML='';
movies.forEach(m=>{
grid.innerHTML+=`<div class="card" onclick="openModal(${m.id})">
${m.payhip?'<div class="paid-badge">⭐</div>':''}
<img src="${m.thumb}" loading="lazy">
<div class="info">
<div class="title">${m.title}</div>
<div class="meta">TZS ${m.price}</div>
</div></div>`;
});
if(movies.length>0){
const b=movies[movies.length-1];
document.getElementById('banner').classList.remove('hidden');
document.getElementById('bannerImg').src=b.banner||b.thumb;
document.getElementById('bannerTitle').textContent=b.title;
document.getElementById('bannerDesc').textContent=b.desc||'';
}
}

function openModal(id){
currentMovie=movies.find(x=>x.id==id);
document.getElementById('modal').classList.add('active');
document.getElementById('playerFrame').src='';
document.getElementById('modalTitle').textContent=currentMovie.title;
document.getElementById('modalDesc').textContent=currentMovie.desc||'';
document.getElementById('watchBtn').textContent=currentMovie.payhip?'Nunua TZS '+currentMovie.price:'▶ Cheza Bure';
loadComments(id);
}

function closeModal(e){if(!e||e.target.id=='modal')document.getElementById('modal').classList.remove('active')}

function watchMovie(){
if(currentMovie.payhip){
window.open(currentMovie.payhip,'_blank');
alert('Lipa Payhip kwanza, kisha rudi hapa bonyeza Cheza');
}else{
document.getElementById('playerFrame').src=currentMovie.stream;
}
}

function playBanner(){if(movies.length>0)openModal(movies[movies.length-1].id)}

function addComment(){
const txt=document.getElementById('commentInput').value.trim();
if(!txt||!currentMovie)return;
let comments=JSON.parse(localStorage.getItem('comments_'+currentMovie.id)||'[]');
comments.push({txt,date:new Date().toLocaleString()});
localStorage.setItem('comments_'+currentMovie.id,JSON.stringify(comments));
document.getElementById('commentInput').value='';
loadComments(currentMovie.id);
}

function loadComments(id){
const list=document.getElementById('commentsList');
let comments=JSON.parse(localStorage.getItem('comments_'+id)||'[]');
list.innerHTML=comments.map(c=>`<div class="comment">${c.txt}<br><small style="color:#666">${c.date}</small></div>`).join('');
}
function openCreator(){document.getElementById('creator').classList.add('active')}
function closeCreator(){document.getElementById('creator').classList.remove('active')}

function submitCreator(){
if(!document.getElementById('cTerms').checked){alert('Kubali masharti kwanza');return}
const req={
id:Date.now(),
studio:document.getElementById('cStudio').value,
phone:document.getElementById('cPhone').value,
email:document.getElementById('cEmail').value,
stream:document.getElementById('cStream').value,
thumb:document.getElementById('cThumb').value,
desc:document.getElementById('cDesc').value,
price:document.getElementById('cPrice').value,
promo:document.getElementById('cPromoPrice').value
};
if(!req.studio||!req.stream||!req.thumb){alert('Jaza sehemu muhimu');return}
pending.push(req);savePending();
['cStudio','cPhone','cEmail','cStream','cThumb','cDesc','cPrice','cPromoPrice'].forEach(i=>document.getElementById(i).value='');
document.getElementById('cTerms').checked=false;
alert('Maombi yametumwa kwa Admin!');
closeCreator();
}

document.getElementById('logoBtn').onclick=()=>{
logoClicks++;
clearTimeout(logoTimer);
logoTimer=setTimeout(()=>logoClicks=0,3000);
if(logoClicks>=5){
document.getElementById('passwordModal').classList.add('active');
logoClicks=0;
}
}

function closePass(e){if(!e||e.target.id=='passwordModal')document.getElementById('passwordModal').classList.remove('active')}
function checkPass(){
if(document.getElementById('passInput').value=='ChilaguCinemaPro'){
document.getElementById('passwordModal').classList.remove('active');
document.getElementById('admin').classList.add('active');
loadAdmin();
}else{alert('Password si sahihi')}
}

function closeAdmin(){document.getElementById('admin').classList.remove('active')}
