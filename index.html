<!doctype html>
<html lang="sw">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHILAGU LEGACY</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
    }
    /* HEADER SAHI KAMA PICHA */
 .header {
      background: linear-gradient(180deg, #1a0b2e 0%, #0a0a0a 100%);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2d1b4e;
    }
 .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
 .logo-img {
      width: 40px;
      height: 40px;
      border-radius: 8px;
    }
 .logo-text {
      color: #a855f7;
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: 1px;
    }
 .logo-sub {
      font-size: 10px;
      color: #888;
      letter-spacing: 1px;
      text-align: right;
    }

    /* HERO SECTION KUBWA */
 .hero {
      background: #000;
      padding: 40px 20px 30px;
      text-align: center;
    }
 .play-btn {
      width: 80px;
      height: 80px;
      background: #a855f7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 0 40px #a855f7;
      font-size: 35px;
      cursor: pointer;
    }
 .hero-title {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 15px;
      letter-spacing: 1px;
    }
 .badge {
      background: #a855f7;
      color: #fff;
      padding: 8px 20px;
      border-radius: 25px;
      font-size: 13px;
      font-weight: bold;
      display: inline-block;
    }

    /* CATEGORY BUTTONS */
 .categories {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      padding: 25px 20px 20px;
    }
 .cat-btn {
      background: #1a1a1a;
      border: 2px solid #2d1b4e;
      border-radius: 15px;
      padding: 30px 10px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
    }
 .cat-btn.active {
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      border-color: #a855f7;
      box-shadow: 0 0 25px #a855f733;
    }
 .cat-btn.icon { font-size: 35px; margin-bottom: 10px; }
 .cat-btn.text { font-weight: 900; font-size: 16px; letter-spacing: 1px; }

    /* FILTER TAGS */
 .filters {
      padding: 0 20px 25px;
      display: flex;
      gap: 10px;
      overflow-x: auto;
    }
 .filters::-webkit-scrollbar { display: none; }
 .filter {
      background: #1a1a1a;
      border: 1px solid #2d1b4e;
      padding: 10px 18px;
      border-radius: 25px;
      font-size: 14px;
      white-space: nowrap;
      cursor: pointer;
      font-weight: 600;
    }
 .filter.active { background: #a855f7; border-color: #a855f7; }

    /* CONTENT GRID */
 .section-title {
      color: #a855f7;
      font-size: 20px;
      font-weight: 900;
      padding: 0 20px 15px;
      letter-spacing: 1px;
    }
 .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 15px;
      padding: 0 20px 40px;
    }
 .card {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #2d1b4e;
    }
 .card img {
      width: 100%;
      height: 230px;
      object-fit: cover;
    }
 .card-body { padding: 12px; }
 .card-tag {
      background: transparent;
      border: 1px solid #a855f7;
      color: #a855f7;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      display: inline-block;
      margin-bottom: 8px;
      font-weight: bold;
    }
 .card-title { font-size: 14px; font-weight: bold; margin-bottom: 6px; }
 .card-price { color: #0f0; font-size: 13px; font-weight: bold; }
  </style>
</head>
<body>
  <!-- HEADER KAMILI -->
  <div class="header">
    <div class="header-left">
      <img src="https://i.postimg.cc/LXYGQT8w/In-Shot-20260523-092931092-removebg-preview.png" alt="Logo" class="logo-img">
      <div class="logo-text">CHILAGU<br>LEGACY</div>
    </div>
    <div class="logo-sub">STREAM • LIKE • A •<br>BOSS</div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="play-btn">▶</div>
    <div class="hero-title" id="hero-title">LOVE AND DESTINY</div>
    <div class="badge">🔥 SERIES MPYA</div>
  </div>

  <!-- CATEGORIES -->
  <div class="categories">
    <div class="cat-btn active" data-cat="series">
      <div class="icon">📺</div>
      <div class="text">SERIES</div>
    </div>
    <div class="cat-btn" data-cat="singo">
      <div class="icon">🎬</div>
      <div class="text">SINGO MOVIE</div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <div class="filter active" data-genre="zote">🔥 Zote</div>
    <div class="filter" data-genre="Drama">😢 Drama</div>
    <div class="filter" data-genre="Action">💥 Action</div>
    <div class="filter" data-genre="Love">💖 Love</div>
    <div class="filter" data-genre="Comedy">😂 Comedy</div>
  </div>

  <!-- CONTENT -->
  <div class="section-title" id="section-title">SERIES ZOTE</div>
  <div class="grid" id="content-grid"></div>

  <script>
    let allContent = [];
    let currentCat = 'series';
    let currentGenre = 'zote';

    async function loadContent() {
      try {
        const res = await fetch('/.netlify/functions/content');
        if (!res.ok) throw new Error('Function bado');
        allContent = await res.json();
      } catch (e) {
        allContent = [];
      }
      renderContent();
    }

    function renderContent() {
      const grid = document.getElementById('content-grid');
      let filtered = allContent.filter(item => item.category === currentCat);

      if (currentGenre!== 'zote') {
        filtered = filtered.filter(item => item.genre === currentGenre);
      }

      if (filtered.length > 0) {
        document.getElementById('hero-title').textContent = filtered[0].title;
      }

      document.getElementById('section-title').textContent =
        currentCat === 'series'? 'SERIES ZOTE' : 'SINGO MOVIE ZOTE';

      grid.innerHTML = filtered.map(item => `
        <div class="card">
          <img src="${item.thumbnail}" alt="${item.title}">
          <div class="card-body">
            <div class="card-tag">${item.type.toUpperCase()}</div>
            <div class="card-title">${item.title}</div>
            <div class="card-price">${item.is_free? 'BURE' : 'TSh ' + item.price}</div>
          </div>
        </div>
      `).join('') || '<p style="grid-column:1/-1;text-align:center;color:#666;padding:40px 0;">Hakuna content bado. Ingia /admin post movie</p>';
    }

    document.querySelectorAll('.cat-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCat = btn.dataset.cat;
        renderContent();
      }
    });

    document.querySelectorAll('.filter').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentGenre = btn.dataset.genre;
        renderContent();
      }
    });

    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }

    loadContent();
  </script>
</body>
</html>
