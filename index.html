<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chilagu Legacy Cinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0A0A0F;
            font-family: 'Poppins', sans-serif;
            color: #FFFFFF;
        }
        
        /* HEADER NA LOGO TRANSPARENT */
        .header {
            background: #0A0A0F;
            text-align: center;
            padding: 20px 16px 12px 16px;
            border-bottom: 1px solid #1E1E2E;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            max-width: 180px;
            height: auto;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 25px #8A2BE2) 
                    drop-shadow(0 0 50px #BF40BF);
            background: none;
            border: none;
        }
        
        .tagline {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 11px;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #8A2BE2, #BF40BF, #FF00FF, #8A2BE2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
        }
        
        /* TRAILER SLIDER */
        .trailer-slider {
            position: relative;
            width: 100%;
            height: 230px;
            overflow: hidden;
            background: #000;
        }
        
        .slider-container {
            display: flex;
            transition: transform 0.5s ease;
            height: 100%;
        }
        
        .slide {
            min-width: 100%;
            height: 100%;
            position: relative;
            cursor: pointer;
        }
        
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .slide-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(10,10,15,0.95) 70%);
            padding: 40px 16px 16px 16px;
        }
        
        .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 65px;
            height: 65px;
            background: rgba(138, 43, 226, 0.95);
            border: 3px solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 35px rgba(138, 43, 226, 0.9);
        }
        
        .slide-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 22px;
            margin-bottom: 6px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
        }
        
        .slide-tag {
            font-size: 12px;
            color: #E0AAFF;
            font-weight: 700;
            background: rgba(138, 43, 226, 0.4);
            display: inline-block;
            padding: 5px 14px;
            border-radius: 12px;
            border: 1px solid #BF40BF;
        }
        
        .slider-dots {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .dot.active {
            background: #BF40BF;
            width: 24px;
            border-radius: 4px;
        }
        
        /* CATEGORY KUBWA */
        .main-categories {
            background: #121212;
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            border-bottom: 1px solid #1E1E2E;
        }
        
        .cat-main {
            padding: 24px 12px;
            border-radius: 18px;
            border: 2px solid transparent;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .cat-main.active {
            background: linear-gradient(135deg, #7B2CBF 0%, #9D4EDD 50%, #C77DFF 100%);
            color: white;
            box-shadow: 0 0 30px rgba(157, 78, 221, 0.6);
            border: 2px solid #E0AAFF;
            transform: scale(1.02);
        }
        
        .cat-main.inactive {
            background: #1A1A24;
            color: #E0E0E0;
            border: 2px solid #2A2A3A;
        }
        
        .cat-icon {
            font-size: 34px;
            display: block;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }
        
        /* TRENDING */
        .trending-section {
            background: #0A0A0F;
            padding: 16px;
        }
        
        .section-header {
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: 16px;
            color: #E0AAFF;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .trending-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        
        .trending-card {
            min-width: 140px;
            background: #1A1A24;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2A2A3A;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .trending-card:active { transform: scale(0.95); }
        
        .trending-poster {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        
        .trending-title {
            padding: 10px 8px;
            font-size: 11px;
            font-weight: 700;
            text-align: center;
            color: #FFF;
        }
        
        /* CATEGORY NDOGO */
        .sub-categories {
            background: #121212;
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            border-bottom: 1px solid #1E1E2E;
        }
        
        .cat-sub {
            background: #1A1A24;
            border: 1px solid #2A2A3A;
            color: #B0B0B0;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
        }
        
        .cat-sub.active {
            background: #2D1B4E;
            border: 1px solid #8A2BE2;
            color: #E0AAFF;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.3);
        }
        
        /* MOVIE GRID */
        .section-title {
            background: #0A0A0F;
            padding: 20px 16px 12px 16px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: 16px;
            color: #E0AAFF;
            letter-spacing: 1px;
        }
        
        .movie-grid {
            background: #0A0A0F;
            padding: 0 16px 20px 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .movie-card {
            background: #1A1A24;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid #2A2A3A;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .movie-card:active {
            transform: scale(0.96);
            box-shadow: 0 0 25px rgba(138, 43, 226, 0.5);
        }
        
        .movie-poster {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }
        
        .movie-title {
            padding: 12px 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 12px;
            text-align: center;
            color: #FFFFFF;
            text-transform: uppercase;
        }
        
        /* TRAILER MODAL - SAFI KABISA */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.97);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            width: 92%;
            max-width: 500px;
            background: #1A1A24;
            border-radius: 18px;
            padding: 16px;
            border: 2px solid #8A2BE2;
            box-shadow: 0 0 50px rgba(138, 43, 226, 0.7);
        }
        
        .close-modal {
            float: right;
            font-size: 36px;
            color: #BF40BF;
            cursor: pointer;
            line-height: 20px;
            font-weight: 300;
        }
        
        #modalTitle {
            color: #E0AAFF;
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            margin-bottom: 12px;
            font-weight: 800;
        }
        
        #trailerFrame {
            width: 100%;
            height: 260px;
            border-radius: 12px;
            border: none;
            background: #000;
        }
    </style>
</head>
<body>

    <!-- HEADER NA LOGO TRANSPARENT -->
    <div class="header">
        <img src="https://i.postimg.cc/LXYGQT8w/In-Shot-20260523-092931092-removebg-preview.png" 
             alt="Chilagu Legacy Cinema" 
             class="logo">
        <div class="tagline">STREAM • LIKE • A • BOSS</div>
    </div>

    <!-- TRAILER SLIDER -->
    <div class="trailer-slider">
        <div class="slider-container" id="slider">
            <div class="slide" onclick="openTrailer('SHADOW CODE', 'dQw4w9WgXcQ')">
                <img src="https://picsum.photos/800/400?random=11" alt="Trailer">
                <div class="play-btn">▶</div>
                <div class="slide-overlay">
                    <div class="slide-title">SHADOW CODE</div>
                    <div class="slide-tag">💥 ACTION MPYA</div>
                </div>
            </div>
            <div class="slide" onclick="openTrailer('DAKIKA 90 ZA JOTO', 'dQw4w9WgXcQ')">
                <img src="https://picsum.photos/800/400?random=10" alt="Trailer">
                <div class="play-btn">▶</div>
                <div class="slide-overlay">
                    <div class="slide-title">DAKIKA 90 ZA JOTO</div>
                    <div class="slide-tag">🔥 TRENDING SASA</div>
                </div>
            </div>
        </div>
        <div class="slider-dots" id="dots"></div>
    </div>

    <!-- CATEGORY KUBWA -->
    <div class="main-categories">
        <button class="cat-main active">
            <span class="cat-icon">🎬</span>
            SINGO MOVIE
        </button>
        <button class="cat-main inactive">
            <span class="cat-icon">📺</span>
            SERIES
        </button>
    </div>

    <!-- TRENDING -->
    <div class="trending-section">
        <div class="section-header">🔥 TRENDING SASA</div>
        <div class="trending-scroll">
            <div class="trending-card">
                <img src="https://picsum.photos/300/400?random=20" class="trending-poster">
                <div class="trending-title">MJI WA MAFIA</div>
            </div>
            <div class="trending-card">
                <img src="https://picsum.photos/300/400?random=21" class="trending-poster">
                <div class="trending-title">USIKU WA GIZA</div>
            </div>
            <div class="trending-card">
                <img src="https://picsum.photos/300/400?random=22" class="trending-poster">
                <div class="trending-title">SAUTI YA MAPENZI</div>
            </div>
        </div>
    </div>

    <!-- CATEGORY NDOGO -->
    <div class="sub-categories">
        <button class="cat-sub active">🔥 Zote</button>
        <button class="cat-sub">💥 Action</button>
        <button class="cat-sub">😢 Drama</button>
        <button class="cat-sub">💖 Love</button>
        <button class="cat-sub">😂 Comedy</button>
        <button class="cat-sub">👻 Horror</button>
    </div>

    <!-- MOVIE GRID -->
    <div class="section-title">SINGO MOVIE • ZOTE</div>
    <div class="movie-grid">
        <div class="movie-card">
            <img src="https://picsum.photos/300/400?random=1" class="movie-poster">
            <div class="movie-title">DAKIKA 90 ZA JOTO</div>
        </div>
        <div class="movie-card">
            <img src="https://picsum.photos/300/400?random=2" class="movie-poster">
            <div class="movie-title">ENDLESS LOVE</div>
        </div>
        <div class="movie-card">
            <img src="https://picsum.photos/300/400?random=3" class="movie-poster">
            <div class="movie-title">SHADOW CODE</div>
        </div>
        <div class="movie-card">
            <img src="https://picsum.photos/300/400?random=4" class="movie-poster">
            <div class="movie-title">MJI WA MAFIA</div>
        </div>
    </div>

    <!-- TRAILER MODAL -->
    <div class="modal" id="trailerModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeTrailer()">&times;</span>
            <h3 id="modalTitle">TRAILER</h3>
            <iframe id="trailerFrame" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // SLIDER
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const dotsContainer = document.getElementById('dots');
        
        slides.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            if(i === 0) dot.classList.add('active');
            dot.onclick = () => goToSlide(i);
            dotsContainer.appendChild(dot);
        });
        
        function goToSlide(n) {
            currentSlide = n;
            document.getElementById('slider').style.transform = `translateX(-${currentSlide * 100}%)`;
            document.querySelectorAll('.dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentSlide);
            });
        }
        
        setInterval(() => {
            currentSlide = (currentSlide + 1) % slides.length;
            goToSlide(currentSlide);
        }, 5000);
        
        // TRAILER
        function openTrailer(title, youtubeId) {
            document.getElementById('modalTitle').textContent = title + ' - TRAILER';
            document.getElementById('trailerFrame').src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1&rel=0`;
            document.getElementById('trailerModal').classList.add('active');
        }
        
        function closeTrailer() {
            document.getElementById('trailerFrame').src = '';
            document.getElementById('trailerModal').classList.remove('active');
        }
    </script>

</body>
</html>
