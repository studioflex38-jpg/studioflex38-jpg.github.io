<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; color:#fff; font-family:Arial; }
.container { padding:12px; padding-bottom:40px; }
.header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.logo { width:32px; height:32px; }
.app-name { font-size:18px; font-weight:bold; background:linear-gradient(90deg, #8B5CF6, #EC4899); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.hero-slider { position:relative; border-radius:12px; overflow:hidden; margin-bottom:18px; background:#000; }
.hero-slides { display:flex; overflow-x:auto; scroll-snap-type:x mandatory; scroll-behavior:smooth; }
.hero-slides::-webkit-scrollbar { display:none; }
.hero-slide { min-width:100%; position:relative; scroll-snap-align:start; flex-shrink:0; background:#000; height:180px; overflow:hidden; cursor:pointer; }
.hero-slide img { width:100%; height:100%; object-fit:cover; object-position:center; display:block; }
.hero-text { position:absolute; left:0; right:0; bottom:0; padding:15px; display:flex; flex-direction:column; justify-content:flex-end; background:linear-gradient(0deg, rgba(0,0,0,0.4) 40%, transparent 100%); pointer-events:none; }
.hero-text h1 { font-size:20px; font-weight:bold; margin:0 0 6px 0; text-shadow:0 2px 8px #000; }
.hero-text p { font-size:12px; color:#ddd; margin:0 0 12px 0; max-width:85%; text-shadow:0 2px 8px #000; }
.btn-tazama { background:linear-gradient(90deg, #A855F7, #EC4899); border:none; color:#fff; padding:8px 20px; border-radius:8px; font-weight:bold; font-size:13px; display:flex; align-items:center; gap:6px; cursor:pointer; width:fit-content; pointer-events:auto; }
.hero-dots { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); display:flex; gap:6px; }
.dot { width:6px; height:6px; border-radius:50%; background:#666; }
.dot.active { background:#EC4899; }
.tabs { display:flex; gap:8px; margin:15px 0; }
.tab { background:#1a1a1a; color:#888; padding:10px 18px; border-radius:25px; border:none; font-size:13px; cursor:pointer; }
.tab.active { background:linear-gradient(90deg, #A855F7, #EC4899); color:#fff; }
.icons { display:flex; justify-content:space-around; margin:15px 0; }
.icon-box { text-align:center; cursor:pointer; }
.icon-circle { width:55px; height:55px; border-radius:50%; background:#1a1a1a; display:flex; align-items:center; justify-content:center; margin:0 auto 5px; border:2px solid #222; }
.icon-box.active.icon-circle { background:linear-gradient(135deg, #A855F7, #EC4899); border-color:#A855F7; box-shadow:0 0 15px #A855F7; }
.icon-circle svg { width:26px; height:26px; fill:#fff; }
.icon-box p { margin:0; font-size:12px; color:#888; }
.icon-box.active p { color:#fff; font-weight:bold; }
.section-title { font-size:17px; font-weight:bold; margin:20px 0 12px 0; }
.movie-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; }
.trending-slider { display:flex; gap:12px; overflow-x:auto; scroll-snap-type:x mandatory; padding-bottom:10px; }
.trending-slider::-webkit-scrollbar { display:none; }
.trending-card { min-width:130px; width:130px; background:#111; border-radius:8px; overflow:hidden; cursor:pointer; position:relative; flex-shrink:0; }
.trending-card img { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; background:#222; }
.trending-card p { padding:8px; margin:0; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.movie-card { background:#111; border-radius:8px; overflow:hidden; cursor:pointer; position:relative; }
.movie-card img { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; background:#222; }
.movie-card p { padding:8px; margin:0; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.star-icon { position:absolute; top:6px; right:6px; background:linear-gradient(90deg, #A855F7, #EC4899); color:#fff; padding:3px 5px; border-radius:4px; font-size:10px; font-weight:bold; }
.watched-badge { position:absolute; top:6px; left:6px; background:#10B981; color:#fff; padding:3px 5px; border-radius:4px; font-size:10px; }
.player-section { display:none; margin-top:20px; }
.video-box { width:100%; aspect-ratio:16/9; background:#000; border-radius:8px; margin-bottom:15px; overflow:hidden; }
.pay-box { background:#1a1a1a; padding:12px; border-radius:8px; margin-bottom:15px; border:2px solid #A855F7; }
.pay-box input { width:100%; padding:8px; background:#000; border:1px solid #333; color:#fff; border-radius:5px; margin:6px 0; }
.btn-pay { width:100%; padding:10px; background:linear-gradient(90deg, #A855F7, #EC4899); border:none; color:#fff; border-radius:5px; font-weight:bold; cursor:pointer; }
.comment-section { margin-top:15px; padding-top:15px; border-top:1px solid #222; }
.comment { background:#1a1a1a; padding:8px; margin:6px 0; border-radius:6px; font-size:12px; }
.comment b { color:#EC4899; }
.comment input,.comment textarea { width:100%; padding:8px; background:#000; border:1px solid #333; color:#fff; border-radius:5px; margin:5px 0; font-size:12px; }
.loading { color:#888; text-align:center; padding:20px; font-size:13px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <img class="logo" src="https://i.postimg.cc/LXYGQT8w/In-Shot-20260523-092931092-removebg-preview.png">
    <div class="app-name">Chilagu Cinema</div>
  </div>

  <div class="hero-slider" id="heroSlider">
    <div class="hero-slides" id="heroSlides"><p class="loading">Inapakia Bana...</p></div>
    <div class="hero-dots" id="heroDots"></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('all', this)">📁 All Movies</button>
    <button class="tab" onclick="switchTab('Series', this)">💻 Series</button>
    <button class="tab" onclick="switchTab('Singo', this)">🎞️ Singo</button>
  </div>

  <div class="icons">
    <div class="icon-box active" onclick="filterCategory('all', this)"><div class="icon-circle"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg></div><p>Zote</p></div>
    <div class="icon-box" onclick="filterCategory('Action', this)"><div class="icon-circle"><svg viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg></div><p>Action</p></div>
    <div class="icon-box" onclick="filterCategory('Love', this)"><div class="icon-circle"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div><p>Love</p></div>
    <div class="icon-box" onclick="filterCategory('Drama', this)"><div class="icon-circle"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg></div><p>Drama</p></div>
  </div>

  <h2 class="section-title">TRENDING 🔥</h2>
  <div class="trending-slider" id="trendingGrid"><p class="loading">Inapakia...</p></div>

  <h2 class="section-title">HOME</h2>
  <div class="movie-grid" id="homeGrid"><p class="loading" style="grid-column:1/4">Inapakia movie...</p></div>

  <h2 class="section-title">Watched ✓</h2>
  <div class="movie-grid" id="watchedGrid"></div>
  <p id="noWatched" style="color:#666; text-align:center; display:none; margin:20px 0">Bado hujatazama movie</p>

  <div class="player-section" id="playerSection">
    <div class="video-box" id="videoBox"></div>
    <div class="pay-box" id="payBox" style="display:none;">
      <p style="margin:0 0 8px 0; font-size:13px;">Movie hii ni ya kulipia TSH <span id="price"></span></p>
      <input id="licenseKey" placeholder="Weka license key ya Payhip">
      <button class="btn-pay" onclick="unlockMovie()">Fungua Movie</button>
      <a id="payhipLink" href="#" target="_blank" style="display:block; text-align:center; margin-top:8px; color:#10B981; font-size:12px;">Nunua Payhip →</a>
    </div>
    <div class="comment-section">
      <h3 style="font-size:15px; margin-bottom:10px;">Live Comments</h3>
      <div id="commentList" style="max-height:200px; overflow-y:auto;"></div>
      <input id="cName" placeholder="Jina lako">
      <textarea id="cText" placeholder="Andika comment..." rows="2"></textarea>
      <button class="btn-pay" onclick="sendComment()">Tuma Comment</button>
    </div>
    <button onclick="closePlayer()" style="width:100%; margin-top:15px; padding:10px; background:#333; border:none; color:#fff; border-radius:5px;">↩ Rudi Nyuma</button>
  </div>

</div>

<script>
const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSt7bqQdW-jWRmH6PzhumapSpuxoEA73v6vSqvy5BIyWZ8w-pKGPdq6lA1Wl5k7piIszoMgGh41ze2S/pub?gid=0&single=true&output=csv";
const COMMENT_URL = "https://script.google.com/macros/s/AKfycbxdUjSRj9jp-ZJvpYdGAtelC4yuTkD5azCOE2FPVdBBMGlSeNO6_ZhzjJ67LMfGfZUr/exec";

let allMovies = [];
let currentMovie = null;
let currentCategory = 'all';
let currentType = 'all';
let heroSlideIndex = 0;
let heroSlideInterval;

function parseCSV(text) {
  const rows = []; let row = []; let cell = ''; let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const char = text[i]; const nextChar = text[i + 1];
    if (char === '"') { if (inQuotes && nextChar === '"') { cell += '"'; i++; } else { inQuotes =!inQuotes; } }
    else if (char === ',' &&!inQuotes) { row.push(cell.trim()); cell = ''; }
    else if (char === '\n' &&!inQuotes) { row.push(cell.trim()); rows.push(row); row = []; cell = ''; }
    else { cell += char; }
  }
  if (cell) { row.push(cell.trim()); rows.push(row); }
  return rows;
}

async function loadMovies() {
  try {
    const res = await fetch(SHEET_CSV, {cache: "no-store"});
    if(!res.ok) throw new Error(`Sheet haipatikani: ${res.status}`);
    const csv = await res.text();
    const rows = parseCSV(csv).slice(1);
    allMovies = rows.map(cols => ({
        id: cols[0]?.replace(/"/g,'').trim(), title: cols[1]?.replace(/"/g,'').trim(), type: cols[2]?.replace(/"/g,'').trim(),
        image: cols[3]?.replace(/"/g,'').trim(), genre: cols[4]?.replace(/"/g,'').trim(), desc: cols[5]?.replace(/"/g,'').trim(),
        featured: cols[6]?.replace(/"/g,'').trim(), trending: cols[7]?.replace(/"/g,'').trim(), new: cols[8]?.replace(/"/g,'').trim(),
        videoLink: cols[9]?.replace(/"/g,'').trim(), price: cols[10]?.replace(/"/g,'').trim(), payhipLink: cols[11]?.replace(/"/g,'').trim()
      })).filter(m => m.id && m.title && m.image);

    if(allMovies.length > 0) { renderHeroSlider(); renderMovies(); startHeroAutoSlide(); }
    else { document.getElementById("homeGrid").innerHTML = "<p style='color:#ff5555; grid-column:1/4; text-align:center'>Hakuna movie kwenye Sheet</p>"; }
  } catch(e) {
    document.getElementById("homeGrid").innerHTML = `<p style='color:red; grid-column:1/4'>ERROR: ${e.message}</p>`;
    document.getElementById("trendingGrid").innerHTML = `<p style='color:red'>ERROR: ${e.message}</p>`;
    document.getElementById("heroSlides").innerHTML = `<p style='color:red; padding:20px'>ERROR: ${e.message}</p>`;
  }
}

function renderHeroSlider() {
  const heroSlides = document.getElementById("heroSlides"); const heroDots = document.getElementById("heroDots");
  const heroMovies = allMovies.filter(m => m.featured?.toLowerCase() === "true").slice(0,5);
  const slides = heroMovies.length > 0? heroMovies : allMovies.slice(0,3);
  heroSlides.innerHTML = ""; heroDots.innerHTML = "";
  slides.forEach((movie, i) => {
    const buttonHtml = i === 0? `<button class="btn-tazama" onclick="event.stopPropagation(); openPlayer(${JSON.stringify(movie).replace(/"/g, '&quot;')})">▶ Tazama</button>` : '';
    heroSlides.innerHTML += `<div class="hero-slide" onclick="openPlayer(${JSON.stringify(movie).replace(/"/g, '&quot;')})"><img src="${movie.image}" onerror="this.src='https://via.placeholder.com/600x300/111/555'"><div class="hero-text"><h1>${movie.title}</h1><p>${movie.desc}</p>${buttonHtml}</div></div>`;
    heroDots.innerHTML += `<div class="dot ${i===0?'active':''}"></div>`;
  });
  heroSlides.addEventListener('scroll', () => updateHeroDots(Math.round(heroSlides.scrollLeft / heroSlides.offsetWidth)));
}
function updateHeroDots(index) { heroSlideIndex = index; document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i === index)); }
function startHeroAutoSlide() { clearInterval(heroSlideInterval); heroSlideInterval = setInterval(() => { const s = document.getElementById("heroSlides"); const t = s.children.length; if(t>0){ heroSlideIndex=(heroSlideIndex+1)%t; s.scrollTo({left:heroSlideIndex*s.offsetWidth,behavior:'smooth'}); updateHeroDots(heroSlideIndex); }}, 4000); }
function getWatched() { return JSON.parse(localStorage.getItem("watched_movies") || "[]"); }
function markWatched(id) { let w=getWatched(); if(!w.includes(id)){w.push(id);localStorage.setItem("watched_movies",JSON.stringify(w));} }

function renderMovies() {
  const trending=document.getElementById("trendingGrid"); const home=document.getElementById("homeGrid"); const watched=document.getElementById("watchedGrid"); const noWatched=document.getElementById("noWatched"); const wList=getWatched();
  trending.innerHTML=""; home.innerHTML=""; watched.innerHTML=""; let hasWatched=false;
  const filtered=allMovies.filter(m=> (currentType==='all'||m.type===currentType) && (currentCategory==='all'||m.genre.toLowerCase()===currentCategory.toLowerCase()) );

  filtered.forEach(m=>{
    const paid=m.price&&m.price.trim()!=='';
    const watched=m.id&&wList.includes(m.id);
    const trend=m.trending?.toLowerCase()==='true';
    const card=`<div class="movie-card" onclick="openPlayer(${JSON.stringify(m).replace(/"/g,'&quot;')})"><img src="${m.image}" onerror="this.src='https://via.placeholder.com/300x200/111/555'">${paid?'<div class="star-icon">★</div>':''}${watched?'<div class="watched-badge">✓</div>':''}<p>${m.title}</p></div>`;
    const tCard=`<div class="trending-card" onclick="openPlayer(${JSON.stringify(m).replace(/"/g,'&quot;')})"><img src="${m.image}" onerror="this.src='https://via.placeholder.com/300x200/111/555'">${paid?'<div class="star-icon">★</div>':''}${watched?'<div class="watched-badge">✓</div>':''}<p>${m.title}</p></div>`;

    home.innerHTML+=card;
    if(watched){watched.innerHTML+=card;hasWatched=true;}
    if(trend){trending.innerHTML+=tCard;}
  });

  if(trending.innerHTML==='')trending.innerHTML="<p style='color:#666;padding:20px;text-align:center'>Hakuna Trending</p>";
  if(home.innerHTML==='')home.innerHTML="<p style='color:#666;grid-column:1/4;text-align:center'>Hakuna movie</p>";
  noWatched.style.display=hasWatched?'none':'block';
}
function filterCategory(c,e){document.querySelectorAll('.icon-box').forEach(b=>b.classList.remove('active'));e.classList.add('active');currentCategory=c;renderMovies();}
function switchTab(t,e){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));e.classList.add('active');currentType=t;renderMovies();}
function openPlayer(m){currentMovie=m;markWatched(m.id);document.getElementById("heroSlider").style.display="none";document.querySelector(".tabs").style.display="none";document.querySelector(".icons").style.display="none";document.getElementById("playerSection").style.display="block";clearInterval(heroSlideInterval);
  if(m.price&&m.price.trim()!==''&&!hasLicense(m.id)){document.getElementById("payBox").style.display="block";document.getElementById("price").textContent=m.price;document.getElementById("payhipLink").href=m.payhipLink;document.getElementById("videoBox").innerHTML="<p style='color:#888;text-align:center;padding-top:80px'>Fungua license kwanza</p>";}
  else{document.getElementById("payBox").style.display="none";document.getElementById("videoBox").innerHTML=`<video controls autoplay playsinline style="width:100%;height:100%"><source src="${m.videoLink}" type="video/mp4"></video>`;}
  loadComments(m.id);
}
function closePlayer(){document.getElementById("playerSection").style.display="none";document.getElementById("heroSlider").style.display="block";document.querySelector(".tabs").style.display="flex";document.querySelector(".icons").style.display="flex";document.getElementById("videoBox").innerHTML="";startHeroAutoSlide();renderMovies();}
function hasLicense(id){return localStorage.getItem("license_"+id);}
function unlockMovie(){const k=document.getElementById("licenseKey").value.trim();if(k.length<5)return alert("Weka key sahihi");localStorage.setItem("license_"+currentMovie.id,k);openPlayer(currentMovie);}
async function loadComments(id){try{const r=await fetch(COMMENT_URL+"?movieId="+id);const d=await r.json();let h="";d.reverse().forEach(c=>{h+=`<div class="comment"><b>${c.name}</b> <span style="float:right;color:#666;font-size:10px">${c.date}</span><br>${c.comment}</div>`;});document.getElementById("commentList").innerHTML=h||"<p style='color:#666;font-size:12px'>Hakuna comment</p>";}catch(e){}}
async function sendComment(){const n=document.getElementById("cName").value||"Anonymous";const t=document.getElementById("cText").value;if(!t)return alert("Andika comment");await fetch(COMMENT_URL,{method:"POST",body:JSON.stringify({Content_ID:currentMovie.id,Name:n,Comment:t,Date:new Date().toLocaleString()})});document.getElementById("cText").value="";loadComments(currentMovie.id);}
loadMovies();
</script>
</body>
</html>
