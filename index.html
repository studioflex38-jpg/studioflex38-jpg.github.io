<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chilagu Legacy Cinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #0a0a0a; color: #fff;
        }
.header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 20px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100; gap: 15px;
        }
.logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.logo img { width: 32px; height: 32px; object-fit: contain; }
.logo h1 { 
            font-family: 'Bebas Neue', sans-serif;
            color: #a855f7; font-size: 26px; letter-spacing: 1.5px;
            text-shadow: 0 0 20px rgba(168,85,247,0.4);
        }

.search-box {
            flex: 1; max-width: 400px; position: relative;
        }
.search-box input {
            width: 100%; padding: 12px 45px 12px 18px; border-radius: 25px;
            border: 1px solid #2a2a2a; background: #141414; color: #fff;
            font-size: 15px; outline: none; font-weight: 500; font-family: 'Outfit', sans-serif;
        }
.search-box input:focus { border-color: #a855f7; box-shadow: 0 0 0 3px rgba(168,85,247,0.1); }
.search-icon {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            color: #888; pointer-events: none; font-size: 18px;
        }

.banner {
            position: relative; width: 100%; height: 450px; overflow: hidden; background: #111;
        }
.banner-slide {
            position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 1.2s;
            background-size: cover; background-position: center;
            display: flex; align-items: flex-end; padding: 40px 30px;
        }
.banner-slide.active { opacity: 1; }
.banner-slide::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, #0a0a0a 20%, transparent 70%);
        }
.banner-content { position: relative; z-index: 2; max-width: 600px; }
.banner-content h2 { 
            font-family: 'Bebas Neue', sans-serif;
            font-size: 52px; margin: 12px 0; letter-spacing: 2px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.8); line-height: 1;
        }
.banner-content p { 
            font-size: 16px; opacity: 0.9; margin-bottom: 20px; 
            line-height: 1.5; font-weight: 500;
        }
.banner-btns { display: flex; gap: 12px; }
.banner-btn {
            padding: 14px 28px; border-radius: 8px; font-weight: 800;
            border: none; cursor: pointer; font-size: 16px; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
.btn-play { background: #fff; color: #000; }
.btn-play:hover { opacity: 0.8; }
.btn-info { background: rgba(109,109,110,0.7); color: #fff; }
.btn-info:hover { background: rgba(109,109,110,0.5); }
.banner-badge { 
            background: #a855f7; padding: 8px 18px; border-radius: 20px; 
            font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
        }
.dots { position: absolute; bottom: 25px; right: 30px; display: flex; gap: 12px; z-index: 3; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; transition: 0.3s; }
.dot.active { background: #a855f7; width: 35px; border-radius: 5px; }

.tabs { display: flex; gap: 15px; padding: 25px 20px 10px; }
.tab {
            flex: 1; padding: 24px; border-radius: 16px; text-align: center;
            background: #141414; cursor: pointer; transition: 0.3s;
            font-weight: 800; font-size: 17px; border: 1px solid #222;
            font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px;
        }
.tab.active { 
            background: linear-gradient(135deg, #a855f7, #7e22ce); 
            border-color: #a855f7;
            box-shadow: 0 10px 30px rgba(168,85,247,0.4);
        }
.filters { display: flex; gap: 10px; padding: 0 20px 15px; overflow-x: auto; }
.filter {
            padding: 11px 20px; background: #141414; border-radius: 25px;
            white-space: nowrap; cursor: pointer; border: 1px solid #222; 
            color: #fff; font-weight: 700; font-size: 14px; transition: 0.3s;
        }
.filter.active { 
            background: #a855f7; border-color: #a855f7;
            box-shadow: 0 4px 15px rgba(168,85,247,0.3);
        }

/* STYLE MPYA: HORIZONTAL ROWS KAMA NETFLIX */
.category-row {
            padding: 20px 0 10px;
        }
.category-title { 
            padding: 0 20px 15px; font-size: 22px; font-weight: 900; 
            color: #fff; text-transform: uppercase; letter-spacing: 1.5px;
            font-family: 'Bebas Neue', sans-serif;
        }
.movies-row {
            display: flex; gap: 12px; overflow-x: auto; padding: 0 20px 20px;
            scroll-behavior: smooth;
        }
.movies-row::-webkit-scrollbar { height: 0; }
.movie-card-small { 
            flex: 0 0 160px; background: #141414; border-radius: 8px; overflow: hidden; 
            border: 1px solid #222; transition: 0.3s; cursor: pointer;
        }
.movie-card-small:hover { 
            transform: scale(1.08); border-color: #a855f7; 
            box-shadow: 0 10px 30px rgba(168,85,247,0.3); z-index: 10;
        }
.movie-card-small img { width: 100%; height: 240px; object-fit: cover; }
.movie-card-small.movie-info { padding: 10px; }
.movie-card-small.movie-title { 
            font-size: 14px; font-weight: 700; height: 40px; overflow: hidden; 
            line-height: 1.3; margin-bottom: 6px;
        }
.movie-card-small.price { color: #22c55e; font-weight: 800; font-size: 14px; }
.movie-card-small.price.free { color: #a855f7; }

.badge {
            position: absolute; top: 8px; left: 8px; background: #a855f7;
            padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
.no-results { text-align: center; padding: 60px 20px; color: #888; font-weight: 700; font-size: 16px; }

.modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 999; align-items: center; justify-content: center;
        }
.modal.active { display: flex; }
.modal-content {
            width: 95%; max-width: 950px; background: #000; border-radius: 16px; overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }
.modal-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 24px; background: #141414;
        }
.modal-title { font-weight: 800; font-size: 20px; }
.close-btn {
            background: #a855f7; border: none; color: white; width: 40px; height: 40px;
            border-radius: 50%; cursor: pointer; font-size: 24px; font-weight: 700;
            transition: 0.3s;
        }
.close-btn:hover { background: #7e22ce; transform: rotate(90deg); }
.video-frame { width: 100%; aspect-ratio: 16/9; border: none; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <img src="https://i.postimg.cc/LXYGQT8w/In-Shot-20260523-092931092-removebg-preview.png" alt="Chilagu Logo">
            <h1>CHILAGU LEGACY CINEMA</h1>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Tafuta movie...">
            <span class="search-icon">🔍</span>
        </div>
    </div>

    <div class="banner" id="banner-slider">
        <div class="dots" id="banner-dots"></div>
    </div>

    <div class="tabs">
        <div class="tab" data-type="series">📺 SERIES</div>
        <div class="tab" data-type="singo">🎬 SINGO MOVIE</div>
    </div>

    <div class="filters">
        <button class="filter active" data-genre="all">🔥 Zote</button>
        <button class="filter" data-genre="Drama">😢 Drama</button>
        <button class="filter" data-genre="Action">💥 Action</button>
        <button class="filter" data-genre="Comedy">😂 Comedy</button>
        <button class="filter" data-genre="Love">💖 Love</button>
    </div>

    <!-- HAPA SASA ZINAJIPANGA KAMA NETFLIX - ROWS ZA HORIZONTAL -->
    <div id="categories-container"></div>

    <div class="modal" id="videoModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Inacheza...</div>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <iframe class="video-frame" id="videoFrame" allowfullscreen allow="autoplay"></iframe>
        </div>
    </div>

    <script>
        // WEKA MOVIE ZAKO HAPA - ZITAJIPANGA AUTOMATIC
        const allMovies = [
            {
                id: 1,
                title: "MPANDA MNAZI KWA MKONO MMOJA",
                type: "singo",
                genre: "Comedy",
                price: 0,
                poster: "https://i.ibb.co/zWN0Jr9d/file-0000000001e471f481a5cc83ddc746bd.png",
                payhip_link: "FREE",
                video_link: "https://streamable.com/e/8326lw",
                trending: true,
                new_release: true
            },
            {
                id: 2,
                title: "USWAZI WA MAMA",
                type: "singo",
                genre: "Drama",
                price: 2000,
                poster: "https://i.ibb.co/placeholder.jpg",
                payhip_link: "https://payhip.com/b/XXXXX",
                video_link: "https://youtube.com/embed/XXXXX",
                trending: false,
                new_release: true
            },
            {
                id: 3,
                title: "JAMII YANGU S1 EP1",
                type: "series",
                genre: "Drama",
                price: 500,
                poster: "https://i.ibb.co/placeholder.jpg",
                payhip_link: "https://payhip.com/b/YYYYY",
                video_link: "https://youtube.com/embed/YYYYY",
                trending: true,
                new_release: false
            },
            {
                id: 4,
                title: "DAKIKA 90 ZA JOTO",
                type: "singo",
                genre: "Action",
                price: 2000,
                poster: "https://i.ibb.co/placeholder.jpg",
                payhip_link: "https://payhip.com/b/ZZZZZ",
                video_link: "https://youtube.com/embed/ZZZZZ",
                trending: true,
                new_release: true
            }
        ];

        let currentType = 'singo';
        let currentGenre = 'all';
        let searchQuery = '';
        let slideIndex = 0;
        let slideInterval;

        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[data-type="${currentType}"]`).classList.add('active');
            
            createBannerSlider(allMovies);
            displayCategories();
        });

        function createBannerSlider(movies) {
            const slider = document.getElementById('banner-slider');
            const dotsContainer = document.getElementById('banner-dots');
            const sliderMovies = movies.filter(m => m.trending).slice(0, 5);

            if(sliderMovies.length === 0) {
                slider.style.display = 'none';
                return;
            }

            sliderMovies.forEach((movie, index) => {
                const slide = document.createElement('div');
                slide.className = `banner-slide ${index === 0? 'active' : ''}`;
                slide.style.backgroundImage = `url('${movie.poster}')`;
                slide.innerHTML = `
                    <div class="banner-content">
                        <span class="banner-badge">${movie.type === 'series'? '🔥 SERIES MPYA' : '🎬 SINGO MPYA'}</span>
                        <h2>${movie.title}</h2>
                        <p>${movie.genre} • ${movie.price === 0? 'BURE' : 'Tsh ' + movie.price.toLocaleString()}</p>
                        <div class="banner-btns">
                            <button class="banner-btn btn-play" onclick="handleMovieClick('${movie.id}')">▶ Tazama</button>
                            <button class="banner-btn btn-info" onclick="handleMovieClick('${movie.id}')">ℹ Taarifa</button>
                        </div>
                    </div>
                `;
                slider.insertBefore(slide, dotsContainer);

                const dot = document.createElement('div');
                dot.className = `dot ${index === 0? 'active' : ''}`;
                dot.onclick = () => goToSlide(index);
                dotsContainer.appendChild(dot);
            });

            if(sliderMovies.length > 1) {
                slideInterval = setInterval(nextSlide, 5000);
            }
        }

        function nextSlide() {
            const slides = document.querySelectorAll('.banner-slide');
            const dots = document.querySelectorAll('.dot');
            if(slides.length === 0) return;
            slides[slideIndex].classList.remove('active');
            dots[slideIndex].classList.remove('active');
            slideIndex = (slideIndex + 1) % slides.length;
            slides[slideIndex].classList.add('active');
            dots[slideIndex].classList.add('active');
        }

        function goToSlide(index) {
            clearInterval(slideInterval);
            const slides = document.querySelectorAll('.banner-slide');
            const dots = document.querySelectorAll('.dot');
            slides[slideIndex].classList.remove('active');
            dots[slideIndex].classList.remove('active');
            slideIndex = index;
            slides[slideIndex].classList.add('active');
            dots[slideIndex].classList.add('active');
            slideInterval = setInterval(nextSlide, 5000);
        }

        function handleMovieClick(movieId) {
            const movie = allMovies.find(m => m.id == movieId);
            if(!movie) return;

            if(movie.price === 0 || movie.payhip_link === 'FREE') {
                openVideoModal(movie);
            } else {
                window.open(movie.payhip_link, '_blank');
            }
        }

        function openVideoModal(movie) {
            const modal = document.getElementById('videoModal');
            const frame = document.getElementById('videoFrame');
            const title = document.getElementById('modalTitle');
            
            title.textContent = movie.title;
            frame.src = movie.video_link;
            modal.classList.add('active');
        }

        function closeModal() {
            const modal = document.getElementById('videoModal');
            const frame = document.getElementById('videoFrame');
            frame.src = '';
            modal.classList.remove('active');
        }

        // HII NDIO INAZIPANGA KAMA NETFLIX - ROWS
        function displayCategories() {
            const container = document.getElementById('categories-container');
            let filtered = allMovies;

            if(currentType!== 'all') {
                filtered = filtered.filter(movie => movie.type === currentType);
            }

            if(currentGenre!== 'all') {
                filtered = filtered.filter(movie => movie.genre === currentGenre);
            }

            if(searchQuery) {
                filtered = filtered.filter(movie =>
                    movie.title.toLowerCase().includes(searchQuery.toLowerCase())
                );
            }

            if(filtered.length === 0) {
                container.innerHTML = '<div class="no-results">Hakuna movie kwenye category hii.</div>';
                return;
            }

            // TENGENEZA ROWS: TRENDING, NEW RELEASES, ZOTE
            const categories = [
                { title: 'Trending Sasa', filter: m => m.trending },
                { title: 'New Releases', filter: m => m.new_release },
                { title: currentType === 'series'? 'Series Zote' : 'Singo Zote', filter: m => true }
            ];

            container.innerHTML = categories.map(cat => {
                const movies = filtered.filter(cat.filter);
                if(movies.length === 0) return '';
                
                return `
                <div class="category-row">
                    <h3 class="category-title">${cat.title}</h3>
                    <div class="movies-row">
                        ${movies.map(movie => {
                            const isFree = movie.price === 0 || movie.payhip_link === 'FREE';
                            const priceText = isFree? 'BURE' : `Tsh ${movie.price.toLocaleString()}`;
                            return `
                            <div class="movie-card-small" onclick="handleMovieClick('${movie.id}')">
                                <div style="position:relative">
                                    <img src="${movie.poster}" alt="${movie.title}">
                                    <span class="badge">${movie.type.toUpperCase()}</span>
                                </div>
                                <div class="movie-info">
                                    <div class="movie-title">${movie.title}</div>
                                    <div class="price ${isFree? 'free' : ''}">${priceText}</div>
                                </div>
                            </div>
                            `;
                        }).join('')}
                    </div>
                </div>
                `;
            }).join('');
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            searchQuery = e.target.value;
            displayCategories();
        });

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentType = this.dataset.type;
                displayCategories();
            });
        });

        document.querySelectorAll('.filter').forEach(filter => {
            filter.addEventListener('click', function() {
                document.querySelectorAll('.filter').forEach(f => f.classList.remove('active'));
                this.classList.add('active');
                currentGenre = this.dataset.genre;
                displayCategories();
            });
        });
    </script>
</body>
</html>
