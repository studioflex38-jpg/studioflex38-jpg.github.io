<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; color:#fff; font-family:Arial; }
.container { padding:12px; padding-bottom:40px; }

.header { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.logo { width:32px; height:32px; }
.app-name { font-size:15px; font-weight:bold; background:linear-gradient(90deg, #8B5CF6, #EC4899); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

/* HERO SLIDER - AUTO HEIGHT */
.hero-slider { position:relative; border-radius:10px; overflow:hidden; margin-bottom:18px; background:#000; }
.hero-slides { display:flex; overflow-x:auto; scroll-snap-type:x mandatory; scroll-behavior:smooth; }
.hero-slides::-webkit-scrollbar { display:none; }
.hero-slide { 
  min-width:100%; 
  position:relative; 
  scroll-snap-align:start; 
  flex-shrink:0; 
  background:#000;
}
.hero-slide img { 
  width:100%; 
  height:auto; 
  display:block; 
}
.hero-text { position:absolute; bottom:0; left:0; right:0; padding:12px; background:linear-gradient(transparent, #000 85%); }
.hero h1 { font-size:22px; font-weight:bold; margin:0 0 6px 0; }
.hero p { font-size:12px; color:#ccc; margin:0 0 10px 0; }
.btn-tazama {
    background:linear-gradient(90deg, #8B5CF6, #EC4899);
    border:none; color:#fff; padding:8px 22px; border-radius:20px;
    font-weight:bold; font-size:14px; display:flex; align-items:center; gap:5px; cursor:pointer;
  }
.hero-dots { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); display:flex; gap:6px; }
.dot { width:6px; height:6px; border-radius:50%; background:#555; }
.dot.active { background:#EC4899; }

.tabs { display:flex; gap:8px; margin:15px 0; }
.tab { background:#1a1a1a; color:#888; padding:8px 16px; border-radius:20px; border:none; font-size:13px; cursor:pointer; }
.tab.active { background:linear-gradient(90deg, #8B5CF6, #EC4899); color:#fff; }

.icons { display:flex; justify-content:space-around; margin:15px 0; }
.icon-box { text-align:center; cursor:pointer; transition:0.2s; }
.icon-box:active { transform:scale(0.95); }
.icon-circle {
    width:50px; height:50px; border-radius:50%; background:#1a1a1a;
    display:flex; align-items:center; justify-content:center; margin:0 auto 4px;
    border:2px solid #333;
  }
.icon-box.active .icon-circle {
    background:linear-gradient(135deg, #8B5CF6, #EC4899);
    border-color:#8B5CF6;
    box-shadow:0 0 10px #8B5CF6;
  }
.icon-circle svg { width:24px; height:24px; fill:#fff; }
.icon-box p { margin:0; font-size:11px; color:#888; }
.icon-box.active p { color:#fff; font-weight:bold; }

.section-title { font-size:16px; font-weight:bold; margin:20px 0 10px 0; }

/* GRID YA HOME - 3X3 */
.movie-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; }

/* SLIDE YA TRENDING - HORIZONTAL SCROLL */
.trending-slider {
  display:flex; 
  gap:10px; 
  overflow-x:auto; 
  scroll-snap-type:x mandatory;
  scroll-behavior:smooth;
  padding-bottom:10px;
}
.trending-slider::-webkit-scrollbar { display:none; }
.trending-slider { -ms-overflow-style:none; scrollbar-width:none; }

.trending-card {
  min-width:140px; 
  width:140px;
  background:#111; 
  border-radius:6px; 
  overflow:hidden; 
  cursor:pointer; 
  position:relative;
  scroll-snap-align:start;
  flex-shrink:0;
}
.trending-card img { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; background:#222; }
.trending-card p { padding:6px; margin:0; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.movie-card { background:#111; border-radius:6px; overflow:hidden; cursor:pointer; position:relative; }
.movie-card img { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; background:#222; }
.movie-card p { padding:6px; margin:0; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.star-icon { position:absolute; top:4px; right:4px; background:linear-gradient(90deg, #8B5CF6, #EC4899); color:#fff; padding:2px 4px; border-radius:3px; font-size:9px; font-weight:bold; }
.watched-badge { position:absolute; top:4px; left:4px; background:#10B981; color:#fff; padding:2px 4px; border-radius:3px; font-size:9px; }

.player-section { display:none; margin-top:20px; }
.video-box { width:100%; aspect-ratio:16/9; background:#000; border-radius:8px; margin-bottom:15px; overflow:hidden; }
.pay-box { background:#1a1a1a; padding:12px; border-radius:8px; margin-bottom:15px; border:2px solid #8B5CF6; }
.pay-box input { width:100%; padding:8px; background:#000; border:1px solid #333; color:#fff; border-radius:5px; margin:6px 0; }
.btn-pay { width:100%; padding:10px; background:linear-gradient(90deg, #8B5CF6, #EC4899); border:none; color:#fff; border-radius:5px; font-weight:bold; cursor:pointer; }

.comment-section { margin-top:15px; padding-top:15px; border-top:1px solid #222; }
.comment { background:#1a1a1a; padding:8px; margin:6px 0; border-radius:6px; font-size:12px; }
.comment b { color:#EC4899; }
.comment input,.comment textarea { width:100%; padding:8px; background:#000; border:1px solid #333; color:#fff; border-radius:5px; margin:5px 0; font-size:12px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <img class="logo" src="https://i.postimg.cc/LXYGQT8w/In-Shot-20260523-092931092-removebg-preview.png">
    <div class="app-name">Chilagu Cinema</div>
  </div>

  <!-- HERO SLIDER - INATEMBEA KIOtomatiki + AUTO HEIGHT -->
  <div class="hero-slider" id="heroSlider">
    <div class="hero-slides" id="heroSlides"></div>
    <div class="hero-dots" id="heroDots"></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('all', this)">📂 All Movies</button>
    <button class="tab" onclick="switchTab('Series', this)">📺 Series</button>
    <button class="tab" onclick="switchTab('Singo', this)">🎞️ Singo</button>
  </div>

  <div class="icons">
    <div class="icon-box active" onclick="filterCategory('all', this)">
      <div class="icon-circle"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
      <p>Zote</p>
    </div>
    <div class="icon-box" onclick="filterCategory('Action', this)">
      <div class="icon-circle"><svg viewBox="0 0 24 24"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg></div>
      <p>Action</p>
    </div>
    <div class="icon-box" onclick="filterCategory('Love', this)">
      <div class="icon-circle"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>
      <p>Love</p>
    </div>
    <div class="icon-box" onclick="filterCategory('Drama', this)">
      <div class="icon-circle"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg></div>
      <p>Drama</p>
    </div>
  </div>

  <!-- TRENDING - INASLIDE PEMBENI -->
  <h2 class="section-title">TRENDING 🔥</h2>
  <div class="trending-slider" id="trendingGrid"></div>

  <!-- HOME - LIST KUU 3X3 -->
  <h2 class="section-title">HOME</h2>
  <div class="movie-grid" id="homeGrid"></div>

  <h2 class="section-title">Watched ✓</h2>
  <div class="movie-grid" id="watchedGrid"></div>
  <p id="noWatched" style="color:#666; text-align:center; display:none; margin:20px 0">Bado hujatazama movie</p>

  <div class="player-section" id="playerSection">
    <div class="video-box" id="videoBox"></div>

    <div class="pay-box" id="payBox" style="display:none;">
      <p style="margin:0 0 8px 0; font-size:13px;">Movie hii ni ya kulipia TSH <span id="price"></span></p>
      <input id="licenseKey" placeholder="Weka license key ya Payhip">
      <button class="btn-pay" onclick="unlockMovie()">Fungua Movie</button>
      <a id="payhipLink" href="#" target="_blank" style="display:block; text-align:center; margin-top:8px; color:#10B981; font-size:12px; text-decoration:none;">Nunua Payhip →</a>
    </div>

    <div class="comment-section">
      <h3 style="font-size:15px; margin-bottom:10px;">Live Comments</h3>
      <div id="commentList" style="max-height:200px; overflow-y:auto;"></div>
      <input id="cName" placeholder="Jina lako">
      <textarea id="cText" placeholder="Andika comment..." rows="2"></textarea>
      <button class="btn-pay" onclick="sendComment()">Tuma Comment</button>
    </div>

    <button onclick="closePlayer()" style="width:100%; margin-top:15px; padding:10px; background:#333; border:none; color:#fff; border-radius:5px; cursor:pointer;">↩ Rudi Nyuma</button>
  </div>

</div>

<script>
const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSt7bqQdW-jWRmH6PzhumapSpuxoEA73v6vSqvy5BIyWZ8w-pKGPdq6lA1Wl5k7piIszoMgGh41ze2S/pub?output=csv";
const COMMENT_URL = "https://script.google.com/macros/s/AKfycbxdUjSRj9jp-ZJvpYdGAtelC4yuTkD5azCOE2FPVdBBMGlSeNO6_ZhzjJ67LMfGfZUr/exec";

let allMovies = [];
let currentMovie = null;
let currentCategory = 'all';
let currentType = 'all';
let heroSlideIndex = 0;
let heroSlideInterval;

async function loadMovies() {
  try {
    const res = await fetch(SHEET_CSV);
    const csv = await res.text();
    const rows = csv.split('\n').slice(1);

    allMovies = rows.map(row => {
      const cols = row.split(/,(?=(?:[^\"]*\"[^\"]*\")*[^\"]*$)/);
      return {
        id: cols[0]?.replace(/"/g,''),
        title: cols[1]?.replace(/"/g,''),
        type: cols[2]?.replace(/"/g,''),
        image: cols[3]?.replace(/"/g,''),
        genre: cols[4]?.replace(/"/g,''),
        desc: cols[5]?.replace(/"/g,''),
        featured: cols[6]?.replace(/"/g,''),
        trending: cols[7]?.replace(/"/g,''),
        new: cols[8]?.replace(/"/g,''),
        videoLink: cols[9]?.replace(/"/g,''),
        price: cols[10]?.replace(/"/g,''),
        payhipLink: cols[11]?.replace(/"/g,'')
      };
    }).filter(m => m.id);

    if(allMovies.length > 0) {
      renderHeroSlider();
      renderMovies();
      startHeroAutoSlide();
    }
  } catch(e) {
    document.getElementById("trendingGrid").innerHTML = "<p style='color:red'>Error: "+e.message+"</p>";
  }
}

function renderHeroSlider() {
  const heroSlides = document.getElementById("heroSlides");
  const heroDots = document.getElementById("heroDots");
  
  const heroMovies = allMovies.filter(m => m.featured?.toLowerCase() === "true").slice(0,5);
  const slides = heroMovies.length > 0 ? heroMovies : allMovies.slice(0,5);

  heroSlides.innerHTML = "";
  heroDots.innerHTML = "";

  slides.forEach((movie, i) => {
    heroSlides.innerHTML += `
      <div class="hero-slide">
        <img src="${movie.image}">
        <div class="hero-text">
          <h1>${movie.title}</h1>
          <p>${movie.desc}</p>
          <button class="btn-tazama" onclick="openPlayer(${JSON.stringify(movie).replace(/"/g, '&quot;')})">▶ Tazama</button>
        </div>
      </div>
    `;
    heroDots.innerHTML += `<div class="dot ${i===0?'active':''}"></div>`;
  });

  heroSlides.addEventListener('scroll', () => {
    const index = Math.round(heroSlides.scrollLeft / heroSlides.offsetWidth);
    updateHeroDots(index);
  });
}

function updateHeroDots(index) {
  heroSlideIndex = index;
  document.querySelectorAll('.dot').forEach((d,i) => {
    d.classList.toggle('active', i === index);
  });
}

function startHeroAutoSlide() {
  clearInterval(heroSlideInterval);
  heroSlideInterval = setInterval(() => {
    const slides = document.getElementById("heroSlides");
    const total = slides.children.length;
    heroSlideIndex = (heroSlideIndex + 1) % total;
    slides.scrollTo({ left: heroSlideIndex * slides.offsetWidth, behavior: 'smooth' });
    updateHeroDots(heroSlideIndex);
  }, 4000);
}

function getWatched() {
  return JSON.parse(localStorage.getItem("watched_movies") || "[]");
}

function markWatched(id) {
  let w = getWatched();
  if(!w.includes(id)) {
    w.push(id);
    localStorage.setItem("watched_movies", JSON.stringify(w));
  }
}

function renderMovies() {
  const trending = document.getElementById("trendingGrid");
  const home = document.getElementById("homeGrid");
  const watched = document.getElementById("watchedGrid");
  const noWatched = document.getElementById("noWatched");
  const watchedList = getWatched();

  trending.innerHTML = "";
  home.innerHTML = "";
  watched.innerHTML = "";

  let hasWatched = false;

  allMovies.filter(m => {
    if(currentType!== 'all' && m.type!== currentType) return false;
    if(currentCategory!== 'all' && m.genre.toLowerCase()!== currentCategory.toLowerCase()) return false;
    return true;
  }).forEach(movie => {
    const isPaid = movie.price && movie.price.trim()!== "";
    const isWatched = watchedList.includes(movie.id);
    const isTrending = movie.trending?.toLowerCase() === "true";

    const cardHome = `
      <div class="movie-card" onclick="openPlayer(${JSON.stringify(movie).replace(/"/g, '&quot;')})">
        <img src="${movie.image}">
        ${isPaid? '<div class="star-icon">★</div>' : ''}
        ${isWatched? '<div class="watched-badge">✓</div>' : ''}
        <p>${movie.title}</p>
      </div>
    `;

    const cardTrending = `
      <div class="trending-card" onclick="openPlayer(${JSON.stringify(movie).replace(/"/g, '&quot;')})">
        <img src="${movie.image}">
        ${isPaid? '<div class="star-icon">★</div>' : ''}
        ${isWatched? '<div class="watched-badge">✓</div>' : ''}
        <p>${movie.title}</p>
      </div>
    `;

    if(isWatched) {
      watched.innerHTML += cardHome;
      hasWatched = true;
    } else {
      home.innerHTML += cardHome;
      if(isTrending) {
        trending.innerHTML += cardTrending;
      }
    }
  });

  if(trending.innerHTML === "") {
    trending.innerHTML = "<p style='color:#666; font-size:12px; padding:20px'>Hakuna movie za Trending</p>";
  }
  
  if(home.innerHTML === "") {
    home.innerHTML = "<p style='color:#666; grid-column:1/4; text-align:center; font-size:12px'>Hakuna movie</p>";
  }

  noWatched.style.display = hasWatched? "none" : "block";
}

function filterCategory(category, el) {
  document.querySelectorAll('.icon-box').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentCategory = category;
  renderMovies();
}

function switchTab(type, el) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentType = type;
  renderMovies();
}

function openPlayer(movie) {
  currentMovie = movie;
  markWatched(movie.id);
  document.getElementById("heroSlider").style.display = "none";
  document.getElementById("playerSection").style.display = "block";
  clearInterval(heroSlideInterval);

  if(movie.price && movie.price.trim()!== "" &&!hasLicense(movie.id)) {
    document.getElementById("payBox").style.display = "block";
    document.getElementById("price").textContent = movie.price;
    document.getElementById("payhipLink").href = movie.payhipLink;
    document.getElementById("videoBox").innerHTML = "<p style='color:#888; text-align:center; padding-top:80px'>Fungua license kwanza</p>";
  } else {
    document.getElementById("payBox").style.display = "none";
    document.getElementById("videoBox").innerHTML = `<video controls autoplay style="width:100%; height:100%"><source src="${movie.videoLink}" type="video/mp4"></video>`;
  }

  loadComments(movie.id);
}

function closePlayer() {
  document.getElementById("playerSection").style.display = "none";
  document.getElementById("heroSlider").style.display = "block";
  startHeroAutoSlide();
  renderMovies();
}

function hasLicense(id) {
  return localStorage.getItem("license_" + id);
}
function unlockMovie() {
  const key = document.getElementById("licenseKey").value.trim();
  if(key.length < 5) return alert("Weka key sahihi");
  localStorage.setItem("license_" + currentMovie.id, key);
  openPlayer(currentMovie);
}

async function loadComments(movieId) {
  try {
    const res = await fetch(COMMENT_URL + "?movieId=" + movieId);
    const data = await res.json();
    let html = "";
    data.reverse().forEach(c => {
      html += `<div class="comment"><b>${c.name}</b> <span style="float:right; color:#666; font-size:10px">${c.date}</span><br>${c.comment}</div>`;
    });
    document.getElementById("commentList").innerHTML = html || "<p style='color:#666; font-size:12px'>Hakuna comment</p>";
  } catch(e) {}
}

async function sendComment() {
  const name = document.getElementById("cName").value || "Anonymous";
  const text = document.getElementById("cText").value;
  if(!text) return alert("Andika comment");

  await fetch(COMMENT_URL, {
    method:"POST",
    body:JSON.stringify({Content_ID:currentMovie.id, Name:name, Comment:text, Date:new Date().toLocaleString()})
  });

  document.getElementById("cText").value = "";
  loadComments(currentMovie.id);
}

loadMovies();
</script>
</body>
</html>
