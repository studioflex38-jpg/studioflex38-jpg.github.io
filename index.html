<!-- ======= CHILAGU HOME PAGE - FINAL ======= -->
<style>
  body { margin:0; background:#000; color:#fff; font-family:Arial; }
 .container { padding:15px; }
 .hero-banner { position:relative; border-radius:12px; overflow:hidden; margin-bottom:20px; }
 .hero-banner img { width:100%; height:200px; object-fit:cover; }
 .hero-overlay { position:absolute; bottom:0; left:0; right:0; padding:15px; background:linear-gradient(transparent, #000); }
 .hero-title { font-size:24px; font-weight:bold; margin:0; }
 .hero-desc { font-size:14px; color:#ccc; margin:5px 0 15px 0; }
 .btn-tazama { background:#E50914; color:#fff; border:none; padding:10px 20px; border-radius:8px; font-weight:bold; }
 .category-tabs { display:flex; gap:10px; margin:20px 0; overflow-x:auto; }
 .tab { background:#333; padding:8px 16px; border-radius:20px; white-space:nowrap; }
 .tab.active { background:#E50914; }
 .section-title { font-size:18px; font-weight:bold; margin:25px 0 15px 0; }
 .movie-row { display:flex; gap:12px; overflow-x:auto; padding-bottom:10px; }
 .movie-card { min-width:140px; background:#1a1a1a; border-radius:8px; overflow:hidden; }
 .movie-card img { width:140px; height:200px; object-fit:cover; }
 .movie-card p { padding:8px; margin:0; font-size:13px; }
 .watched-badge { position:absolute; top:5px; right:5px; background:#E50914; color:#fff; font-size:10px; padding:2px 6px; border-radius:4px; }
</style>

<div class="container">
  <!-- HERO BANNER -->
  <div class="hero-banner">
    <img id="heroImage" src="https://via.placeholder.com/400x200">
    <div class="hero-overlay">
      <h1 class="hero-title" id="heroTitle">TRAILER | YELLOW RECKONING</h1>
      <p class="hero-desc" id="heroDesc">kisasi cha Binti Ida, kupoteza family yake...</p>
      <button class="btn-tazama" onclick="watchMovie(heroMovie)">▶ Tazama</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="category-tabs">
    <div class="tab active">🎬 All Movies</div>
    <div class="tab">📺 Series</div>
    <div class="tab">🎵 Singo</div>
  </div>

  <!-- TRENDING NOW - MPYA TU -->
  <h2 class="section-title">TRENDING 🔥</h2>
  <div class="movie-row" id="trendingRow"></div>

  <!-- UMEZITAZAMA - ZILIZOTAZAMIKA -->
  <h2 class="section-title">Watched ✓</h2>
  <div class="movie-row" id="watchedRow"></div>
  <p id="noWatched" style="color:#666; text-align:center; display:none;">Hujatazama movie yoyote bado</p>

  <!-- COMMENT SECTION -->
  <div id="commentSection"></div>
</div>

<script>
// ======= 1. DATABASE YA MOVIES =======
let allMovies = [
  {id:"yellow1", title:"YELLOW RECKONING", image:"https://via.placeholder.com/140x200/FFD700", desc:"kisasi cha Binti Ida...", trending:true},
  {id:"love1", title:"LOVE AND DESTINY", image:"https://via.placeholder.com/140x200/FF0000", desc:"Coming soon", trending:true},
  {id:"action1", title:"ACTION FORCE", image:"https://via.placeholder.com/140x200/0000FF", desc:"Movie ya vita", trending:false}
];

let heroMovie = allMovies[0]; // Movie ya banner

// ======= 2. WATCHED SYSTEM - LOCALSTORAGE =======
function getWatchedMovies() {
  return JSON.parse(localStorage.getItem("chilagu_watched") || "[]");
}

function markAsWatched(movieId) {
  let watched = getWatchedMovies();
  if(!watched.includes(movieId)) {
    watched.push(movieId);
    localStorage.setItem("chilagu_watched", JSON.stringify(watched));
  }
  renderMovies(); // Onyesha upya
}

function watchMovie(movie) {
  markAsWatched(movie.id);
  alert("Unafungua: " + movie.title);
  // Hapa weka code yako ya kufungua video player
}

// ======= 3. ONYESHA MOVIES =======
function renderMovies() {
  const watched = getWatchedMovies();
  const trendingRow = document.getElementById("trendingRow");
  const watchedRow = document.getElementById("watchedRow");
  const noWatched = document.getElementById("noWatched");
  
  trendingRow.innerHTML = "";
  watchedRow.innerHTML = "";

  let hasWatched = false;

  allMovies.forEach(movie => {
    const isWatched = watched.includes(movie.id);
    
    const card = `
      <div class="movie-card" onclick="watchMovie(${JSON.stringify(movie).replace(/"/g, '&quot;')})" style="position:relative;">
        <img src="${movie.image}">
        ${isWatched? '<div class="watched-badge">✓</div>' : ''}
        <p>${movie.title}</p>
      </div>
    `;

    // Kama imetazamika → peleka "Umezitazama"
    // Kama haijatazamika na ni trending → peleka "Trending"
    if(isWatched) {
      watchedRow.innerHTML += card;
      hasWatched = true;
    } else if(movie.trending) {
      trendingRow.innerHTML += card;
    }
  });

  noWatched.style.display = hasWatched? "none" : "block";
}

// ======= 4. COMMENT SYSTEM - LIVE =======
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxdUjSRj9jp-ZJvpYdGAtelC4yuTkD5azCOE2FPVdBBMGlSeNO6_ZhzjJ67LMfGfZUr/exec";
const movieId = heroMovie.id;

async function loadComments() {
  try {
    const res = await fetch(SCRIPT_URL);
    const allComments = await res.json();
    const comments = allComments[movieId] || [];
    displayComments(comments);
  } catch(e) { console.log("Error:", e); }
}

function displayComments(comments) {
  const commentList = document.getElementById("commentList");
  commentList.innerHTML = "";
  if(comments.length === 0) {
    commentList.innerHTML = "<p style='color:#888'>Kuwa wa kwanza ku-comment</p>";
    return;
  }
  comments.reverse().forEach(c => {
    commentList.innerHTML += `
      <div style="background:#222; padding:10px; margin:8px 0; border-radius:8px;">
        <b style="color:#FFD700">${c.name}</b>
        <span style="color:#666; font-size:12px; float:right">${c.date}</span>
        <p style="color:#fff; margin:5px 0 0 0;">${c.text}</p>
      </div>
    `;
  });
}

async function postComment() {
  const name = document.getElementById("nameInput").value.trim() || "Anonymous";
  const text = document.getElementById("commentInput").value.trim();
  if(!text) return alert("Andika comment kwanza");
  try {
    await fetch(SCRIPT_URL, { method:"POST", body:JSON.stringify({movieId, name, text}) });
    document.getElementById("commentInput").value = "";
    loadComments();
  } catch(e) { alert("Imeshindikana kutuma"); }
}

document.getElementById("commentSection").innerHTML = `
  <h3 style="color:#fff; margin-top:30px;">Comments</h3>
  <div id="commentList" style="max-height:300px; overflow-y:auto;"></div>
  <div style="margin-top:15px;">
    <input id="nameInput" placeholder="Jina lako" style="width:100%; padding:8px; margin-bottom:8px; background:#333; border:none; color:#fff; border-radius:5px;">
    <textarea id="commentInput" placeholder="Andika comment..." style="width:100%; padding:8px; background:#333; border:none; color:#fff; border-radius:5px;" rows="3"></textarea>
    <button onclick="postComment()" style="width:100%; padding:10px; margin-top:8px; background:#E50914; border:none; color:#fff; border-radius:5px; font-weight:bold;">Tuma Comment</button>
  </div>
`;

// ANZA APP
renderMovies();
loadComments();
</script>
<!-- ======= MWISHO ======= -->
