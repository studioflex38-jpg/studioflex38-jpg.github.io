<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin:0; background:#000; color:#fff; font-family:Arial; padding:15px; }

  /* HEADER - LOGO + JINA KAMA YAKO */
  .header { display:flex; align-items:center; gap:8px; margin-bottom:15px; }
  .logo { width:35px; height:35px; }
  .app-name { font-size:15px; font-weight:bold; color:#fff; }

  /* HERO - PICHA + TEXT + BUTTON PINK KAMA YAKO */
  .hero { position:relative; border-radius:12px; overflow:hidden; margin-bottom:20px; }
  .hero img { width:100%; height:240px; object-fit:cover; }
  .hero-text { position:absolute; bottom:0; left:0; right:0; padding:15px; background:linear-gradient(transparent, rgba(0,0,0,0.9)); }
  .hero h1 { font-size:28px; font-weight:bold; margin:0 0 8px 0; line-height:1.2; }
  .hero p { font-size:13px; color:#ddd; margin:0 0 12px 0; line-height:1.4; }
  .btn-tazama { 
    background:linear-gradient(90deg, #FF00FF, #FF1493); 
    border:none; 
    color:#fff; 
    padding:10px 28px; 
    border-radius:25px; 
    font-weight:bold; 
    font-size:15px;
    display:flex;
    align-items:center;
    gap:6px;
  }

  /* TABS - PINK ACTIVE KAMA YAKO */
  .tabs { display:flex; gap:10px; margin:20px 0; }
  .tab { 
    background:#1a1a1a; 
    color:#888; 
    padding:10px 18px; 
    border-radius:25px; 
    border:none; 
    font-size:14px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .tab.active { 
    background:linear-gradient(90deg, #FF1493, #FF00FF); 
    color:#fff; 
  }

  /* ICON - DUARA LA PINK KAMA YAKO */
  .icons { display:flex; justify-content:space-around; margin:20px 0; }
  .icon-box { text-align:center; }
  .icon-circle { 
    width:55px; 
    height:55px; 
    border-radius:50%; 
    background:#1a1a1a; 
    display:flex; 
    align-items:center; 
    justify-content:center; 
    font-size:26px; 
    margin:0 auto 5px;
  }
  .icon-box.active .icon-circle { 
    background:linear-gradient(135deg, #FF1493, #FF00FF); 
  }
  .icon-box p { margin:0; font-size:12px; color:#888; }
  .icon-box.active p { color:#fff; }

  /* TRENDING */
  .section-title { font-size:18px; font-weight:bold; margin:25px 0 12px 0; }
  .movies { display:flex; gap:12px; overflow-x:auto; padding-bottom:10px; }
  .card { min-width:140px; background:#1a1a1a; border-radius:10px; overflow:hidden; }
  .card img { width:140px; height:200px; object-fit:cover; }
  .card p { padding:8px; margin:0; font-size:13px; }

  /* COMMENT */
  .comment-section { margin-top:30px; border-top:1px solid #222; padding-top:20px; }
  .comment { background:#1a1a1a; padding:10px; margin:8px 0; border-radius:8px; }
  input, textarea { width:100%; padding:10px; background:#1a1a1a; border:1px solid #333; color:#fff; border-radius:8px; margin:5px 0; }
  .btn-comment { width:100%; padding:12px; background:linear-gradient(90deg, #FF1493, #FF00FF); border:none; color:#fff; border-radius:8px; font-weight:bold; }
</style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <img class="logo" src="https://i.postimg.cc/LXYGQT8w/In-Shot-20260523-092931092-removebg-preview.png">
    <div class="app-name">CHILAGU LEGACY CINEMA</div>
  </div>

  <!-- HERO KAMA PICHA YAKO -->
  <div class="hero">
    <img src="https://i.postimg.cc/7Yr5rR8L/yellow.jpg">
    <div class="hero-text">
      <h1>TRAILER | YELLOW RECKONING FULL POWER</h1>
      <p>kisasi cha Binti Ida, kupoteza family yake, je ataweza kulipa kisasi Kwa huyu shetani Ambae hatazamiki??</p>
      <button class="btn-tazama">▶ Tazama</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active">🎬 All Movies</button>
    <button class="tab">📺 Series</button>
    <button class="tab">🎞️ Singo</button>
  </div>

  <!-- ICON KAMA YAKO -->
  <div class="icons">
    <div class="icon-box active">
      <div class="icon-circle">🔥</div>
      <p>Zote</p>
    </div>
    <div class="icon-box">
      <div class="icon-circle">⚡</div>
      <p>Action</p>
    </div>
    <div class="icon-box">
      <div class="icon-circle">❤️</div>
      <p>Love</p>
    </div>
    <div class="icon-box">
      <div class="icon-circle">🎭</div>
      <p>Drama</p>
    </div>
  </div>

  <!-- TRENDING -->
  <h2 class="section-title">TRENDING 🔥</h2>
  <div class="movies">
    <div class="card">
      <img src="https://i.postimg.cc/7Yr5rR8L/yellow.jpg">
      <p>TRAILER | Yellow...</p>
    </div>
    <div class="card">
      <img src="https://i.postimg.cc/3J4k6Q2B/love.jpg">
      <p>LOVE AND DESTINY</p>
    </div>
  </div>

  <!-- COMMENT LIVE -->
  <div class="comment-section">
    <h3>Comments</h3>
    <div id="comments"></div>
    <input id="name" placeholder="Jina lako">
    <textarea id="comment" placeholder="Andika comment..." rows="3"></textarea>
    <button class="btn-comment" onclick="sendComment()">Tuma Comment</button>
  </div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxdUjSRj9jp-ZJvpYdGAtelC4yuTkD5azCOE2FPVdBBMGlSeNO6_ZhzjJ67LMfGfZUr/exec";
const movieId = "yellow1";

// Load comments
async function loadComments() {
  const res = await fetch(SCRIPT_URL + "?id=" + movieId);
  const data = await res.json();
  let html = "";
  data.reverse().forEach(c => {
    html += `<div class="comment"><b style="color:#FF1493">${c.name}</b> <span style="float:right; color:#666; font-size:11px">${c.date}</span><p>${c.comment}</p></div>`;
  });
  document.getElementById("comments").innerHTML = html || "<p style='color:#666'>Hakuna comment</p>";
}

// Send comment
async function sendComment() {
  const name = document.getElementById("name").value || "Anonymous";
  const comment = document.getElementById("comment").value;
  if(!comment) return alert("Andika comment");
  
  await fetch(SCRIPT_URL, {
    method:"POST",
    body:JSON.stringify({Content_ID:movieId, Name:name, Comment:comment, Date:new Date().toLocaleString()})
  });
  
  document.getElementById("comment").value = "";
  loadComments();
}

loadComments();
</script>
</body>
</html>
