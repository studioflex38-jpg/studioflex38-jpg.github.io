<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chilagu Legacy Cinema</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<style>
:root{--purple:#7C3AED;--pink:#EC4899;--dark-purple:#4C1D95;--gradient:linear-gradient(90deg,var(--purple),var(--pink));--bg:#050505;--card:#0F0F0F}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:#e5e5e5;font-family:'Montserrat',sans-serif;font-size:13px}
.header{padding:14px 15px;background:#000;display:flex;gap:10px;align-items:center;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--dark-purple)}
.header img{width:42px;height:42px;cursor:pointer}
.header h1{margin:0;font-size:18px;font-weight:800;font-family:'Orbitron',sans-serif;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.user-info{margin-left:auto;font-size:10px;color:#aaa}
.hero-banner{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:#000;margin-bottom:12px;border-bottom:2px solid var(--dark-purple)}
.hero-slide{position:absolute;width:100%;height:100%;opacity:0;transition:opacity 0.8s}
.hero-slide.active{opacity:1}
.hero-slide img{width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(90deg,rgba(124,58,237,0.3) 0%,transparent 60%)}
.hero-content{position:absolute;bottom:15px;left:15px;z-index:2;max-width:60%}
.hero-content h2{margin:0 0 8px;font-size:16px;font-weight:800;font-family:'Orbitron',sans-serif;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-btn{padding:7px 16px;background:var(--gradient);border-radius:20px;color:#fff;font-weight:700;font-size:11px;border:none}
.hero-dots{position:absolute;bottom:8px;left:15px;display:flex;gap:5px;z-index:2}
.dot{width:6px;height:6px;border-radius:50%;background:#333}.dot.active{background:var(--gradient);width:18px;border-radius:8px}
.section{margin-bottom:20px}
.section-header{padding:0 15px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.section-title{font-size:15px;font-weight:800;text-transform:uppercase;display:flex;align-items:center;gap:6px;color:#fff}
.section-title.fire::before{content:"";display:inline-block;width:14px;height:14px;background:linear-gradient(45deg,#FF4500,#FF0000);clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)}
.login-btn{font-size:10px;padding:5px 10px;background:var(--gradient);border:none;border-radius:15px;color:#fff;font-weight:700}
.row-wrap{display:flex; flex-direction:column; gap:12px; padding:0 15px}
.row{display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; scroll-snap-type:x mandatory; padding-bottom:5px}
.row::-webkit-scrollbar{display:none}
.card{flex:0 0 32%; max-width:32%; background:var(--card); border-radius:10px; overflow:hidden; cursor:pointer; position:relative; border:1px solid var(--dark-purple); scroll-snap-align:start}
.card img{width:100%;aspect-ratio:2/3;object-fit:cover}
.card p{padding:5px 6px;margin:0;font-size:11px;font-weight:600;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-views{display:flex;align-items:center;gap:5px;padding:4px 6px 6px;font-size:10px;color:#aaa} /* KURUDI VIEWS TU */
.eye-icon{width:14px;height:14px;border:1.5px solid #aaa;border-radius:75% 15%;position:relative;transform:rotate(45deg)}
.eye-icon::before{content:"";position:absolute;top:50%;left:50%;width:6px;height:6px;background:#aaa;border-radius:50%;transform:translate(-50%,-50%)}
.eye-icon::after{content:"";position:absolute;top:50%;left:50%;width:3px;height:3px;background:#050505;border-radius:50%;transform:translate(-50%,-50%)}
.badge-star{position:absolute;top:4px;right:4px;font-size:16px;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 8px var(--pink)}
.trend-badge{position:absolute;top:4px;left:4px;background:linear-gradient(45deg,#FF4500,#FF0000);padding:2px 6px;border-radius:4px;font-size:8px;font-weight:800;box-shadow:0 0 8px #FF4500;text-transform:uppercase;z-index:2}
.ep-count{position:absolute;bottom:28px;right:4px;background:rgba(0,0,0,0.8);padding:2px 5px;border-radius:4px;font-size:9px}
.sub-categories{display:flex;gap:8px;overflow-x:auto;padding:0 15px;margin-bottom:8px}
.sub-cat-btn{padding:5px 12px;background:#111;border-radius:15px;border:1px solid var(--dark-purple);color:#ccc;font-weight:600;font-size:11px;white-space:nowrap;cursor:pointer;text-transform:lowercase}
.sub-cat-btn.active{background:var(--gradient);border:none;color:#fff}
.search-box{padding:0 15px; margin-bottom:10px}
.search-box input{width:100%; padding:10px 12px; background:#111; border:1px solid var(--dark-purple); border-radius:20px; color:#fff; font-size:12px}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.98);justify-content:center;align-items:center;z-index:99;overflow-y:auto}
.box{background:var(--card);padding:18px;border-radius:12px;width:95%;max-width:700px;max-height:95vh;overflow-y:auto;border:1px solid var(--dark-purple)}
input,select,button{width:100%;padding:12px;margin-top:8px;border-radius:8px;border:1px solid var(--dark-purple);background:#0a0a0a;color:#fff;font-size:13px}
button{background:var(--gradient);color:#fff;font-weight:700;border:none;cursor:pointer;font-size:13px}
.btn-red{background:#DC2626}.btn-blue{background:#2563EB}.btn-gray{background:#1f1f1f}.btn-green{background:#16A34A}
.player-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;z-index:999}
.close-player{position:absolute;top:10px;right:15px;font-size:32px;cursor:pointer;color:var(--pink);z-index:1000}
.player-actions{position:absolute;bottom:20px;left:0;right:0;display:flex;gap:15px;justify-content:center;z-index:1001}
.like-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(0,0,0,0.6);padding:8px 14px;border-radius:20px;border:1px solid var(--dark-purple);cursor:pointer}
.like-btn svg{width:22px;height:22px;fill:#aaa}
.like-btn.active svg{fill:var(--pink)}
.like-btn span{font-size:10px}
.episode-item{padding:10px;background:#111;margin-bottom:6px;border-radius:8px;cursor:pointer;border:1px solid var(--dark-purple)}
</style>
</head>
<body>

<div class="header">
  <img src="https://i.postimg.cc/LXYGQT8w/In-Shot-20260523-092931092-removebg-preview.png" onclick="logoClick()">
  <h1>Chilagu Legacy Cinema</h1>
  <div class="user-info" id="userInfo"></div>
</div>

<div class="hero-banner" id="heroBanner"></div>

<div class="section" id="trendingSection">
  <div class="section-header"><div class="section-title"><span class="fire"></span>HOT</div><button class="login-btn" id="loginBtn" onclick="showLogin()">INGIA</button></div>
  <div class="row-wrap" id="trendingWrap"></div>
</div>

<div class="section">
  <div class="section-header"><div class="section-title">HOME</div></div>
  <div class="sub-categories">
    <button class="sub-cat-btn active" onclick="filterSubCat('all',this)">all</button>
    <button class="sub-cat-btn" onclick="filterSubCat('action',this)">action</button>
    <button class="sub-cat-btn" onclick="filterSubCat('love',this)">love</button>
    <button class="sub-cat-btn" onclick="filterSubCat('drama',this)">drama</button>
    <button class="sub-cat-btn" onclick="filterSubCat('thriller',this)">thriller</button>
  </div>
  <div class="search-box"><input type="text" id="searchInput" placeholder="Tafuta movie..." onkeyup="searchMovies()"></div>
  <div class="row-wrap" id="homeWrap"></div>
</div>

<div class="overlay" id="loginOverlay"><div class="box" style="max-width:400px">
  <h3 style="font-family:Orbitron;font-size:15px;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent">INGIA / JIANDIKISHE</h3>
  <input id="email" type="email" placeholder="Weka Email yako">
  <input id="password" type="password" placeholder="Weka Password">
  <button onclick="signup()">JIANDIKISHE</button>
  <button onclick="loginUser()" class="btn-blue">INGIA</button>
  <button onclick="logout()" class="btn-red" id="logoutBtn" style="display:none">TOKA</button>
  <button onclick="closeLogin()" class="btn-gray">FUNGA</button>
</div></div>

<div class="overlay" id="admin"><div class="box">... Admin yako ile...</div></div>

<div class="overlay" id="keyBox"><div class="box" style="max-width:400px">
  <h3 style="font-family:Orbitron;font-size:15px;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Movie ya Kulipia</h3>
  <p style="font-size:12px">Bei: Tsh <span id="priceTag">0</span></p>
  <div id="beforePay">
    <p style="font-size:12px">Lipa kwanza ili upate Access Key</p>
    <button class="btn-blue" onclick="startBuyProcess()">NUNUA KEY</button>
  </div>
  <div id="afterPay" style="display:none">
    <p style="font-size:12px">Weka Access Key uliyopewa baada ya kulipa</p>
    <input id="keyInput" placeholder="Weka Access Key hapa">
    <button class="btn-green" onclick="verifyKey()">FUNGUA MOVIE</button>
    <button class="btn-green" onclick="sendWA()">NIMELIPA - TUMA WHATSAPP</button>
  </div>
  <button onclick="closeKey()" class="btn-gray">FUNGA</button>
</div></div>

<div class="overlay" id="episodeBox"><div class="box" style="max-width:500px">
  <h3 style="font-family:Orbitron;font-size:15px;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent" id="episodeTitle"></h3>
  <div id="episodeList"></div>
  <button onclick="closeEpisode()" class="btn-gray">FUNGA</button>
</div></div>

<div class="player-overlay" id="player">
  <span class="close-player" onclick="closePlayer()">X</span>
  <iframe id="iframe" style="width:100%;height:100%;border:none" allowfullscreen></iframe>
  <div class="player-actions">
    <div class="like-btn" id="likeBtn" onclick="toggleLike()">
      <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      <span id="likeCount">0</span>
    </div>
  </div>
</div>

<script>
let clicks=0, editingId=null, appSettings={}, allMovies=[], currentSubCat='all', searchQuery='', currentPlayData={}, currentUser=null, userLikes={};
var firebaseConfig={apiKey:"AIzaSyCVDXKkOYlhr5ez_dfA-jOQ8Ve_UXw5qWk",projectId:"chilagu-update"};
firebase.initializeApp(firebaseConfig);var db=firebase.firestore();var auth=firebase.auth();

auth.onAuthStateChanged(user=>{
  if(user){
    currentUser=user;
    document.getElementById('loginBtn').innerText='TOKA';
    document.getElementById('userInfo').innerText=user.email.split('@')[0];
    document.getElementById('logoutBtn').style.display='block';
    loadUserLikes(user.uid);
  }else{
    currentUser=null;
    document.getElementById('loginBtn').innerText='INGIA';
    document.getElementById('userInfo').innerText='';
    document.getElementById('logoutBtn').style.display='none';
  }
})

function loadUserLikes(uid){
  db.collection("users").doc(uid).collection("likes").get().then(s=>{
    userLikes={}; s.forEach(d=>userLikes[d.id]=d.data())
  })
}

function showLogin(){document.getElementById('loginOverlay').style.display='flex'}
function closeLogin(){document.getElementById('loginOverlay').style.display='none'}

function signup(){
  let email=document.getElementById('email').value;
  let pass=document.getElementById('password').value;
  auth.createUserWithEmailAndPassword(email,pass).then(()=>{alert('✅ Umejiandikisha');closeLogin();}).catch(e=>alert(e.message))
}

function loginUser(){
  let email=document.getElementById('email').value;
  let pass=document.getElementById('password').value;
  auth.signInWithEmailAndPassword(email,pass).then(()=>{closeLogin()}).catch(e=>alert('Email au Password ni mbaya'))
}

function logout(){auth.signOut()}

function load(){db.collection("settings").doc("main").get().then(doc=>{if(doc.exists){appSettings=doc.data()}});
  db.collection("movies").onSnapshot(s=>{
    allMovies = []; s.forEach(d=>{let m=d.data(); m.docId=d.id; allMovies.push(m);});
    renderTrendingRow();
    renderHomeRow();
    loadHeroBanner();
  })
}

function formatNum(num){ if(num>=1000000) return (num/1000000).toFixed(1)+'M'; if(num>=1000) return (num/1000).toFixed(1)+'K'; return num}

function renderRow(containerId, movies, showTrendBadge=true){
  let {grouped, singles} = groupSeries(movies);
  let allItems = [...singles];
  Object.keys(grouped).forEach(key=>{ allItems.push({isGroup:true, title:key, episodes:grouped[key]}); });
  let chunks = chunkArray(allItems, 5);
  let h='';
  chunks.forEach(chunk=>{
    h += `<div class="row">`;
    chunk.forEach(item=>{
      if(item.isGroup){
        let firstEp = item.episodes[0];
        let totalViews = item.episodes.reduce((sum,ep)=>sum+(ep.views||0),0);
        let starBadge = firstEp.price>0? `<div class="badge-star">★</div>` : '';
        let trendBadge = (showTrendBadge && firstEp.trending)? `<div class="trend-badge">HOT</div>` : '';
        h+=`<div class="card" onclick="openEpisodes('${item.title}')"><img src="${firstEp.thumbnail}">${starBadge}${trendBadge}<div class="ep-count">${item.episodes.length} Ep</div><p>${item.title}</p><div class="card-views"><div class="eye-icon"></div>${formatNum(totalViews)}</div></div>`; // VIEWS TU
      }else{
        let m = item;
        let trendBadge = (showTrendBadge && m.trending)? `<div class="trend-badge">HOT</div>` : '';
        let starBadge = m.price>0? `<div class="badge-star">★</div>` : '';
        h+=`<div class="card" onclick="checkAccess('${m.docId}','${m.link}',${m.price},'${m.accessKey||''}')"><img src="${m.thumbnail}">${starBadge}${trendBadge}<p>${m.title}</p><div class="card-views"><div class="eye-icon"></div>${formatNum(m.views||0)}</div></div>`; // VIEWS TU
      }
    });
    h += `</div>`;
  });
  document.getElementById(containerId).innerHTML=h||'<p style="padding:10px;font-size:11px">Hakuna movie</p>';
}

function groupSeries(movies){let grouped = {};let singles = [];movies.forEach(m=>{if(m.type=='series'){let baseName = m.title.replace(/ep\s*\d+/i,'').replace(/episode\s*\d+/i,'').trim();if(!grouped[baseName]) grouped[baseName] = [];grouped[baseName].push(m);}else{singles.push(m);}});return {grouped, singles};}
function chunkArray(arr, size){ let result=[]; for(let i=0;i<arr.length;i+=size){ result.push(arr.slice(i,i+size)); } return result; }
function openEpisodes(seriesName){let episodes = allMovies.filter(m=>m.type=='series' && m.title.includes(seriesName));document.getElementById('episodeTitle').innerText = seriesName;let h = '';episodes.sort((a,b)=>a.title.localeCompare(b.title));episodes.forEach(ep=>{h += `<div class="episode-item" onclick="checkAccess('${ep.docId}','${ep.link}',${ep.price},'${ep.accessKey||''}');closeEpisode()"><b>${ep.title}</b> ${ep.price>0?'<span style="color:var(--pink)">★</span>':''}</div>`});document.getElementById('episodeList').innerHTML = h;document.getElementById('episodeBox').style.display = 'flex';}
function closeEpisode(){document.getElementById('episodeBox').style.display='none'}
function searchMovies(){searchQuery = document.getElementById('searchInput').value.toLowerCase();renderHomeRow();}
function renderTrendingRow(){let trendingMovies = allMovies.filter(m=>m.trending==true);document.getElementById('trendingSection').style.display = trendingMovies.length>0? 'block' : 'none';renderRow('trendingWrap', trendingMovies, true);}
function renderHomeRow(){let filtered = allMovies;if(currentSubCat!='all'){filtered = filtered.filter(m=>m.cat==currentSubCat);}if(searchQuery!=''){filtered = filtered.filter(m=>m.title.toLowerCase().includes(searchQuery));}renderRow('homeWrap', filtered, false);}
function filterSubCat(cat,btn){currentSubCat=cat;document.querySelectorAll('.sub-cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderHomeRow();}
function loadHeroBanner(){const banner = document.getElementById("heroBanner");const slideMovies = allMovies.filter(m => m.slide === true).slice(0,5);if(slideMovies.length === 0){ banner.style.display = "none"; return; }banner.style.display = "block";let slidesHTML = '';let dotsHTML = '';slideMovies.forEach((m, index)=>{slidesHTML += `<div class="hero-slide ${index===0?'active':''}"><img src="${m.thumbnail}"><div class="hero-overlay"></div><div class="hero-content"><h2>${m.title}</h2><button class="hero-btn" onclick="checkAccess('${m.docId}','${m.link}',${m.price},'${m.accessKey||''}')">Watching Now</button></div></div>`;dotsHTML += `<span class="dot ${index===0?'active':''}"></span>`;});banner.innerHTML = slidesHTML + `<div class="hero-dots">${dotsHTML}</div>`;let current=0; setInterval(()=>{current=(current+1)%slideMovies.length; document.querySelectorAll('.hero-slide').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.dot').forEach(d=>d.classList.remove('active'));document.querySelectorAll('.hero-slide')[current].classList.add('active');document.querySelectorAll('.dot')[current].classList.add('active')},5000);}

function checkAccess(id,link,price,key){
  if(!currentUser){alert('Tafadhali Ingia kwanza ili uweze kuangalia');showLogin();return;}
  currentPlayData = {id,link,price,key};
  addView(id);
  if(price > 0){
    document.getElementById('priceTag').innerText = price;
    document.getElementById('beforePay').style.display = 'block';
    document.getElementById('afterPay').style.display = 'none';
    document.getElementById('keyBox').style.display='flex';
  }else{
    playMovie(link);
  }
}

function playMovie(link){
  document.getElementById('iframe').src=link;
  document.getElementById('player').style.display='flex';
  checkLikeStatus();
}

function closePlayer(){document.getElementById('player').style.display='none';document.getElementById('iframe').src=''}

function toggleLike(){
  if(!currentUser) return;
  let movieId = currentPlayData.id;
  let btn = document.getElementById('likeBtn');
  let movieRef = db.collection("movies").doc(movieId);

  if(userLikes[movieId]){
    movieRef.update({likes: firebase.firestore.FieldValue.increment(-1)});
    db.collection("users").doc(currentUser.uid).collection("likes").doc(movieId).delete();
    delete userLikes[movieId];
    btn.classList.remove('active');
  }else{
    movieRef.update({likes: firebase.firestore.FieldValue.increment(1)});
    db.collection("users").doc(currentUser.uid).collection("likes").doc(movieId).set({liked:true,time:Date.now()});
    userLikes[movieId]={liked:true};
    btn.classList.add('active');
  }
}

function checkLikeStatus(){
  let movieId = currentPlayData.id;
  let btn = document.getElementById('likeBtn');
  let movie = allMovies.find(m=>m.docId==movieId);
  document.getElementById('likeCount').innerText = formatNum(movie.likes||0);
  if(userLikes[movieId]){btn.classList.add('active')}else{btn.classList.remove('active')}
}

function addView(docId){db.collection("movies").doc(docId).update({views: firebase.firestore.FieldValue.increment(1)});}

function logoClick(){clicks++;if(clicks>=5){initAdmin();clicks=0;}setTimeout(()=>clicks=0,3000)}
function initAdmin(){...admin yako ile...}
function login(){...}
function closeAdmin(){...}
function save(){...}
//... code yako yote ya admin...

load();
</script>
</body>
</html>
