<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chilagu Legacy Cinema</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<style>
:root{--purple:#7C3AED;--pink:#EC4899;--dark-purple:#4C1D95;--gradient:linear-gradient(90deg,var(--purple),var(--pink));--bg:#050505;--card:#0F0F0F}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#e5e5e5;font-family:'Montserrat',sans-serif;font-size:13px}
.header{padding:14px 15px;background:#000;display:flex;gap:10px;align-items:center;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--dark-purple)}
.header img{width:42px;height:42px;cursor:pointer}
.header h1{margin:0;font-size:18px;font-weight:800;font-family:'Orbitron',sans-serif;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-banner{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:#000;margin-bottom:12px;border-bottom:2px solid var(--dark-purple)}
.hero-slide{position:absolute;width:100%;height:100%;opacity:0;transition:opacity 0.8s}.hero-slide.active{opacity:1}
.hero-slide img{width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(90deg,rgba(124,58,237,0.3) 0%,transparent 60%)}
.hero-content{position:absolute;bottom:15px;left:15px;z-index:2;max-width:60%}
.hero-content h2{margin:0 0 8px;font-size:16px;font-weight:800;font-family:'Orbitron',sans-serif;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-btn{padding:7px 16px;background:var(--gradient);border-radius:20px;color:#fff;font-weight:700;font-size:11px;border:none}
.hero-dots{position:absolute;bottom:8px;left:15px;display:flex;gap:5px;z-index:2}
.dot{width:6px;height:6px;border-radius:50%;background:#333}.dot.active{background:var(--gradient);width:18px;border-radius:8px}
.section{margin-bottom:20px}
.section-header{display:flex;justify-content:space-between;align-items:center;padding:0 15px;margin-bottom:8px}
.section-title{font-size:15px;font-weight:800;text-transform:uppercase;display:flex;align-items:center;gap:6px;color:#fff}
.section-title.fire::before{content:"";display:inline-block;width:14px;height:14px;background:linear-gradient(45deg,#EC4899,#7C3AED);clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)}
.row-wrap{display:flex; flex-direction:column; gap:12px; padding:0 15px}
.row{display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; scroll-snap-type:x mandatory; padding-bottom:5px}
.row::-webkit-scrollbar{display:none}
.card{flex:0 0 32%; max-width:32%; background:var(--card); border-radius:10px; overflow:hidden; cursor:pointer; position:relative; border:1px solid var(--dark-purple); transition:0.2s}
.card:hover{border-color:var(--purple); transform:scale(1.02)} /* EFFECT NDOGO TU */
.card img{width:100%;aspect-ratio:16/9;object-fit:cover}
.card p{padding:6px 8px;margin:0;font-size:11px;font-weight:600;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.badge{position:absolute;top:4px;right:4px;background:var(--gradient);padding:2px 5px;border-radius:4px;font-size:8px;font-weight:bold}
.ep-badge{position:absolute;bottom:8px;right:4px;background:rgba(124,58,237,0.9);padding:2px 5px;border-radius:4px;font-size:9px;font-weight:700}
.sub-categories{display:flex;gap:8px;overflow-x:auto;padding:0 15px;margin-bottom:8px;scrollbar-width:none}
.sub-cat-btn{padding:5px 12px;background:#111;border-radius:15px;border:1px solid var(--dark-purple);color:#ccc;font-weight:600;font-size:11px;white-space:nowrap;cursor:pointer;text-transform:lowercase}
.sub-cat-btn.active{background:var(--gradient);border:none;color:#fff}
.search-box{padding:0 15px; margin-bottom:10px}
.search-box input{width:100%; padding:10px 12px; background:#111; border:1px solid var(--dark-purple); border-radius:20px; color:#fff; font-size:12px; outline:none}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.98);justify-content:center;align-items:center;z-index:99;overflow-y:auto}
.box{background:var(--card);padding:18px;border-radius:12px;width:95%;max-width:700px;max-height:95vh;overflow-y:auto;border:1px solid var(--dark-purple)}
input,select,button{width:100%;padding:12px;margin-top:8px;border-radius:8px;border:1px solid var(--dark-purple);background:#0a0a0a;color:#fff;font-size:13px}
button{background:var(--gradient);color:#fff;font-weight:700;border:none;cursor:pointer;font-size:13px}
.btn-red{background:#DC2626}.btn-blue{background:#2563EB}.btn-gray{background:#1f1f1f}
.admin-tabs{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto}
.admin-tab{flex:1;padding:10px;background:#111;border:none;font-weight:600;font-size:12px;border-radius:8px;color:#ccc}
.admin-tab.active{background:var(--gradient);color:#fff}
.movie-item{background:#111;padding:10px;border-radius:10px;margin-bottom:8px;display:flex;gap:10px;align-items:center;border:1px solid var(--dark-purple)}
.movie-item img{width:100px;height:56px;object-fit:cover;border-radius:6px}
.views-text{font-size:10px;color:#888;margin-top:2px}
.episode-list{margin-top:10px}
.episode-item{background:#111; padding:8px; border-radius:8px; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; border:1px solid var(--dark-purple)}
.ep-title{font-size:11px; font-weight:600}
.ep-buttons{display:flex; gap:5px}
.ep-btn{padding:4px 8px; font-size:9px; border-radius:5px}

/* PLAYER BAR YA NDANI */
.player-bar{position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.85); padding:10px 15px; display:flex; justify-content:space-between; align-items:center; backdrop-filter: blur(10px); border-top:1px solid var(--dark-purple)}
.player-btn{padding:8px 14px; font-size:11px; border-radius:8px; display:flex; align-items:center; gap:5px; font-weight:700}
.player-download{background:var(--gradient); color:#fff; box-shadow:0 0 10px rgba(124,58,237,0.3)}
.icon{width:12px; height:12px; fill:currentColor}
</style>
</head>
<body>

<div class="header">
  <img src="https://i.postimg.cc/LXYGQT8w/In-Shot-20260523-092931092-removebg-preview.png" onclick="logoClick()">
  <h1>Chilagu Legacy Cinema</h1>
</div>

<div class="hero-banner" id="heroBanner"></div>
<div class="section" id="trendingSection"><div class="section-header"><div class="section-title"><span class="fire"></span>TRENDING NOW</div></div><div class="row-wrap" id="trendingWrap"></div></div>
<div class="section">
  <div class="section-header"><div class="section-title">HOME</div></div>
  <div class="sub-categories">
    <button class="sub-cat-btn active" onclick="filterSubCat('all',this)">all</button>
    <button class="sub-cat-btn" onclick="filterSubCat('action',this)">action</button>
    <button class="sub-cat-btn" onclick="filterSubCat('love',this)">love</button>
    <button class="sub-cat-btn" onclick="filterSubCat('drama',this)">drama</button>
    <button class="sub-cat-btn" onclick="filterSubCat('thriller',this)">thriller</button>
  </div>
  <div class="search-box"><input type="text" id="searchInput" placeholder="Tafuta movie..." onkeyup="searchMovies()"></div>
  <div class="row-wrap" id="homeWrap"></div>
</div>

<div class="overlay" id="admin"><div class="box">
  <div id="login">
    <h3 style="font-family:Orbitron;font-size:16px;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Chilagu Legacy Admin</h3>
    <input type="password" id="pass" placeholder="Weka Admin Password">
    <button onclick="login()">INGIA</button>
    <button onclick="closeAdmin()" class="btn-gray">FUNGA</button>
  </div>
  <div id="form" style="display:none">
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="showTab('dashboard',this)">Dashboard</button>
      <button class="admin-tab" onclick="showTab('movies',this)">Movies</button>
      <button class="admin-tab" onclick="showTab('series',this)">Ongeza Episode</button>
    </div>
    <div id="dashboardTab"><h3>📊 Dashboard</h3></div>
    <div id="moviesTab" style="display:none"><h3>➕ Ongeza Movie Mpya / Series Mpya</h3>
      <input id="t" placeholder="Jina la Movie au Jina la Series">
      <input id="img" placeholder="Link ya Picha / Poster">
      <input id="v" placeholder="Link ya Video - Kwa Singo Movie">
      <input id="dl" placeholder="Link ya Download - Kwa Singo Movie">
      <select id="type"><option value="singo">SINGO MOVIE</option><option value="series">SERIES</option></select>
      <select id="cat"><option value="action">action</option><option value="love">love</option><option value="drama">drama</option><option value="thriller">thriller</option></select>
      <select id="price"><option value="0">FREE</option><option value="1500">VIP - Tsh 1500</option></select>
      <label><input type="checkbox" id="slide"> Weka kwenye SLIDE</label>
      <label><input type="checkbox" id="trending"> Weka kwenye TRENDING</label>
      <button onclick="saveMovie()">HIFADHI</button>
      <hr><h3>🎬 Manage</h3><div id="movieList">Loading...</div>
    </div>
    <div id="seriesTab" style="display:none">
      <h3>➕ Ongeza Episode Mpya</h3>
      <select id="seriesSelect"></select>
      <input id="epNum" type="number" placeholder="Namba ya Episode: 1, 2, 3...">
      <input id="epTitle" placeholder="Title ya Episode: Optional">
      <input id="epLink" placeholder="Link ya Video ya Episode">
      <input id="epDownload" placeholder="Link ya Download ya Episode - Acha wazi kama huna">
      <button class="btn-blue" onclick="saveEpisode()">ONGEZA EPISODE</button>
      <hr><h3>📺 Episodes Zilizopo</h3><div id="episodeList">Chagua Series kwanza</div>
    </div>
    <button onclick="closeAdmin()" class="btn-gray" style="margin-top:12px">FUNGA</button>
  </div>
</div></div>

<div class="overlay" id="player" style="position:relative">
  <span onclick="closePlayer()" style="position:absolute;top:10px;right:15px;font-size:32px;cursor:pointer;color:var(--pink);z-index:100">X</span>
  <iframe id="iframe" style="width:100%;height:100%;border:none" allowfullscreen></iframe>
  <div class="player-bar" id="playerBar" style="display:none">
    <div id="playerTitle" style="font-size:12px; font-weight:600"></div>
    <button class="player-btn player-download" id="playerDownloadBtn" onclick="downloadMovie(currentDownloadLink)">
      <svg class="icon" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> DOWNLOAD
    </button>
  </div>
</div>

<div class="overlay" id="episodeBox"><div class="box"><h3 id="seriesTitle" style="background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent"></h3><div id="episodeBoxList" class="episode-list"></div><button onclick="closeEpisodeBox()" class="btn-gray">FUNGA</button></div></div>

<script>
let clicks=0, editingId=null, appSettings={}, allMovies=[], allEpisodes=[], currentSubCat='all', searchQuery='';
let currentDownloadLink = '';
var firebaseConfig={apiKey:"AIzaSyCVDXKkOYlhr5ez_dfA-jOQ8Ve_UXw5qWk",projectId:"chilagu-update"};
firebase.initializeApp(firebaseConfig);var db=firebase.firestore();

function logoClick(){clicks++;if(clicks>=5){initAdmin();clicks=0;}setTimeout(()=>clicks=0,3000)}
function initAdmin(){db.collection("settings").doc("main").get().then(doc=>{if(doc.exists){appSettings=doc.data()}else{appSettings={adminPassword:"ChilaguBoss2026"}}document.getElementById('admin').style.display='flex';}).catch(()=>{appSettings={adminPassword:"ChilaguBoss2026"};document.getElementById('admin').style.display='flex';})}
function login(){let passInput = document.getElementById('pass').value;let correctPass = appSettings.adminPassword || "ChilaguBoss2026";if(passInput == correctPass){document.getElementById('login').style.display='none';document.getElementById('form').style.display='block';loadSeriesSelect();}else{alert('Password mbaya')}}
function closeAdmin(){document.getElementById('admin').style.display='none';document.getElementById('login').style.display='block';document.getElementById('form').style.display='none';document.getElementById('pass').value='';editingId=null}
function showTab(tab,btn){document.querySelectorAll('.admin-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');['dashboard','movies','series'].forEach(t=>document.getElementById(t+'Tab').style.display='none');document.getElementById(tab+'Tab').style.display='block';if(tab=='series') loadSeriesSelect();}

function saveMovie(){
  let data={title:document.getElementById('t').value,thumbnail:document.getElementById('img').value,link:document.getElementById('v').value,download:document.getElementById('dl').value,type:document.getElementById('type').value,cat:document.getElementById('cat').value,price:parseInt(document.getElementById('price').value),slide:document.getElementById('slide').checked,trending:document.getElementById('trending').checked,views:0};
  db.collection("movies").add(data).then(()=>{alert('Imehifadhiwa');document.querySelectorAll('#moviesTab input[type=text]').forEach(i=>i.value='');})
}

function saveEpisode(){
  let seriesId = document.getElementById('seriesSelect').value;
  let data={seriesId: seriesId,epNum: parseInt(document.getElementById('epNum').value),title: document.getElementById('epTitle').value,link: document.getElementById('epLink').value,download: document.getElementById('epDownload').value,type: 'episode'};
  db.collection("episodes").add(data).then(()=>{alert('Episode imeongezwa');loadEpisodes(seriesId);document.querySelectorAll('#seriesTab input').forEach(i=>i.value='');})
}

function loadSeriesSelect(){
  let series = allMovies.filter(m=>m.type=='series');
  let h='<option value="">Chagua Series</option>';
  series.forEach(s=>{h+=`<option value="${s.docId}">${s.title}</option>`});
  document.getElementById('seriesSelect').innerHTML=h;
  document.getElementById('seriesSelect').onchange = (e)=>loadEpisodes(e.target.value);
}

function loadEpisodes(seriesId){
  db.collection("episodes").where("seriesId","==",seriesId).orderBy("epNum").onSnapshot(s=>{
    let h='';
    s.forEach(d=>{let e=d.data(); h+=`<div class="episode-item"><div class="ep-title">Ep ${e.epNum}: ${e.title||''}</div><button class="ep-btn btn-red" onclick="deleteEpisode('${d.id}')">Futa</button></div>`});
    document.getElementById('episodeList').innerHTML=h||'Hakuna episode';
  })
}
function deleteEpisode(id){if(confirm('Futa episode hii?')){db.collection("episodes").doc(id).delete()}}

function loadMoviesAdmin(){
  let h='';
  allMovies.forEach(m=>{
    h+=`<div class="movie-item">
      <img src="${m.thumbnail}">
      <div><b>${m.title}</b><div class="views-text">${m.type} | ${m.cat} | Tsh ${m.price}</div></div>
      <div><button class="btn-red" onclick='deleteMovie("${m.docId}")'>Delete</button></div>
    </div>`
  });
  document.getElementById('movieList').innerHTML=h;
}
function deleteMovie(id){if(confirm('Futa movie hii?')){db.collection("movies").doc(id).delete()}}

function groupMovies(movies, episodes){
  let grouped = []; let seriesMap = {};
  movies.forEach(m=>{if(m.type === 'series'){seriesMap[m.docId] = {...m, episodes:[]};}else{grouped.push(m);}});
  episodes.forEach(e=>{if(seriesMap[e.seriesId]){seriesMap[e.seriesId].episodes.push(e)}});
  Object.values(seriesMap).forEach(s=>{s.episodeCount = s.episodes.length; grouped.push(s)});
  return grouped;
}
function chunkArray(arr, size){ let result=[]; for(let i=0;i<arr.length;i+=size){ result.push(arr.slice(i,i+size)); } return result; }
function downloadMovie(link){ if(link){ let a = document.createElement('a'); a.href = link; a.click(); } else { alert('Hakuna link ya download') } }

function renderRow(containerId, movies, episodes, showTrendBadge=true){
  let grouped = groupMovies(movies, episodes);
  let chunks = chunkArray(grouped, 5);
  let h='';
  chunks.forEach(chunk=>{
    h += `<div class="row">`;
    chunk.forEach(m=>{
      let epBadge = m.type=='series'? `<div class="ep-badge">${m.episodeCount}+</div>` : '';
      let clickAction = m.type=='series'? `openEpisodes('${m.docId}','${m.title}')` : `handlePlay('${m.docId}','${m.link}',${m.price},'${m.download}','${m.title}')`;

      // HAPA HAKUNA BUTTON TENA. CARD NZIMA INABONYEZEKA
      h+=`<div class="card" onclick="${clickAction}">
        <img src="${m.thumbnail}">
        ${m.price>0?'<div class="badge">VIP</div>':''}${epBadge}
        <p>${m.title}</p>
      </div>`;
    });
    h += `</div>`;
  });
  document.getElementById(containerId).innerHTML=h||'<p style="padding:10px;font-size:11px">Hakuna movie</p>';
}

function openEpisodes(seriesId, seriesName){
  document.getElementById('seriesTitle').innerText=seriesName;
  db.collection("episodes").where("seriesId","==",seriesId).orderBy("epNum").get().then(s=>{
    let h='';
    s.forEach(d=>{let e=d.data();
      h+=`<div class="episode-item" onclick="handlePlay('${e.docId}','${e.link}',0,'${e.download}','Ep ${e.epNum}: ${e.title||''}')" style="cursor:pointer">
        <div class="ep-title">Ep ${e.epNum}: ${e.title||''}</div>
      </div>`;
    });
    document.getElementById('episodeBoxList').innerHTML=h;
    document.getElementById('episodeBox').style.display='flex';
  })
}
function closeEpisodeBox(){document.getElementById('episodeBox').style.display='none'}

function searchMovies(){searchQuery = document.getElementById('searchInput').value.toLowerCase();renderHomeRow();}
function renderTrendingRow(movies, episodes){let trendingMovies = movies.filter(m=>m.trending==true);document.getElementById('trendingSection').style.display = trendingMovies.length>0? 'block' : 'none';renderRow('trendingWrap', trendingMovies, episodes, true);}
function renderHomeRow(movies, episodes){let filtered = movies;if(currentSubCat!='all'){filtered = filtered.filter(m=>m.cat==currentSubCat);}if(searchQuery!=''){filtered = filtered.filter(m=>m.title.toLowerCase().includes(searchQuery));}renderRow('homeWrap', filtered, episodes, false);}
function filterSubCat(cat,btn){currentSubCat=cat;document.querySelectorAll('.sub-cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');load();}

function load(){
  db.collection("episodes").onSnapshot(s=>{allEpisodes=[];s.forEach(d=>{let e=d.data(); e.docId=d.id; allEpisodes.push(e);});});
  db.collection("movies").onSnapshot(s=>{
    allMovies = []; s.forEach(d=>{let m=d.data(); m.docId=d.id; allMovies.push(m);});
    renderTrendingRow(allMovies, allEpisodes);
    renderHomeRow(allMovies, allEpisodes);
    loadMoviesAdmin();
    loadSeriesSelect();
  })
}

function addView(docId){db.collection("movies").doc(docId).update({views: firebase.firestore.FieldValue.increment(1)});}

function handlePlay(id,link,price,downloadLink,title){
  addView(id);
  currentDownloadLink = downloadLink;
  document.getElementById('playerTitle').innerText = title;
  
  if(downloadLink && downloadLink.trim() !== ''){
    document.getElementById('playerDownloadBtn').style.display = 'flex';
  }else{
    document.getElementById('playerDownloadBtn').style.display = 'none';
  }
  
  document.getElementById('iframe').src=link;
  document.getElementById('player').style.display='flex';
  document.getElementById('playerBar').style.display='flex';
}

function closePlayer(){document.getElementById('player').style.display='none';document.getElementById('iframe').src='';document.getElementById('playerBar').style.display='none'}

load();
</script>
</body>
</html>
