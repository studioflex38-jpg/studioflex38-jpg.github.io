<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chilagu Legacy Cinema</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root { --bg:#000; --gradient:linear-gradient(90deg,#A855F7,#EC4899); --green:#25D366; }
  *{box-sizing:border-box}
  html,body{margin:0;font-family:'Montserrat',sans-serif;background:var(--bg);color:#fff;height:100%;overflow-y:auto;overflow-x:hidden}
.header{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 15px;background:#000;border-bottom:1px solid #111;position:sticky;top:0;z-index:10}
.header-left{display:flex;align-items:center;gap:10px}
.header img{width:32px;height:32px;cursor:pointer}
.header h1{margin:0;font-size:20px;font-weight:900;font-family:'Orbitron',sans-serif;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}
.search-icon-btn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:5px}
.search-wrap{display:none;padding:10px 15px;position:absolute;top:55px;left:0;right:0;background:#000;z-index:9}
.search-wrap.active{display:block}
.search input{width:100%;padding:11px 40px 11px 14px;border-radius:25px;border:none;background:#1a1a1a;color:#fff;font-size:13px}
.search-close{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:18px;color:#666;cursor:pointer}
.main-tabs{display:flex;gap:8px;padding:10px 15px;overflow-x:auto}
.main-tab{flex:0 0 auto;padding:9px 16px;border-radius:20px;background:#1a1a1a;font-size:13px;cursor:pointer;font-weight:600;color:#aaa}
.main-tab.active{background:var(--gradient);color:#fff}
.cat-wrap{padding:0 15px 18px;overflow-x:auto;white-space:nowrap}.cat-row{display:flex;gap:6px}
.cat-box{padding:7px 12px;border-radius:16px;background:#1a1a1a;font-size:11px;cursor:pointer;font-weight:600;color:#aaa;display:inline-block}
.cat-box.active{background:var(--gradient);color:#fff}
.section-title{padding:0 15px;font-size:18px;font-weight:700;margin:15px 0 10px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 15px}
.card{background:transparent;border-radius:6px;overflow:hidden;cursor:pointer;position:relative}
.thumb-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#111;border-radius:6px;overflow:hidden}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.star-badge{position:absolute;top:4px;right:4px;width:18px;height:18px;background:var(--gradient);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700;z-index:2}
.card-body{padding:4px 2px 0}
.card p{margin:0;font-size:11px;font-weight:500;line-height:1.3;color:#ddd;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-align:left}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:999;align-items:center;justify-content:center;padding:15px}
.box{background:#181818;padding:20px;border-radius:12px;width:100%;max-width:420px;text-align:center;max-height:90vh;overflow-y:auto}
.box h2{margin:0 0 10px;font-size:18px;font-family:'Orbitron',sans-serif;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.box input, .box select{width:100%;padding:12px;border-radius:8px;border:1px solid #333;background:#222;color:#fff;margin:10px 0;font-size:14px}
.box button{width:100%;padding:12px;margin-top:8px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.btn-green{background:var(--green);color:#fff}
.btn-grad{background:var(--gradient);color:#fff}
.btn-gray{background:#333;color:#fff}
.btn-red{background:#ff3333;color:#fff}
.btn-blue{background:#007AFF;color:#fff}
.error{color:#ff4d4d;font-size:12px;margin-top:5px;display:none}
.payment-alert{background:var(--gradient);padding:15px;border-radius:10px;margin-bottom:12px;text-align:center;border:2px solid #fff}
.payment-alert .namba{font-size:22px;letter-spacing:2px;font-weight:900}
.networks{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.net-btn{background:#222;border:1px solid #333;padding:12px;border-radius:8px;color:#fff;font-size:13px;cursor:pointer;font-weight:600}
.whatsapp-step{display:none;margin-top:10px}
.btn-whatsapp{background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;gap:8px}
table{width:100%;border-collapse:collapse;font-size:11px}
th,td{padding:6px;border-bottom:1px solid #333;text-align:left}
.admin-movie-item{background:#222;padding:10px;border-radius:8px;margin-bottom:8px;text-align:left}
.admin-movie-item button{width:48%;display:inline-block;margin:4px 1%}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <img id="adminLogo" src="https://i.postimg.cc/LXYGQT8w/In-Shot-20260523-092931092-removebg-preview.png" alt="Logo">
    <h1>Chilagu Cinema</h1>
  </div>
  <button class="search-icon-btn" onclick="toggleSearch()">🔍</button>
</div>

<div class="search-wrap" id="searchWrap"><div class="search"><input type="text" id="searchInput" placeholder="Tafuta movie..." onkeyup="loadMovies()"><span class="search-close" onclick="toggleSearch()">×</span></div></div>
<div class="main-tabs"><div class="main-tab active" onclick="filterMain('all',this)">All Movies</div><div class="main-tab" onclick="filterMain('series',this)">Series</div><div class="main-tab" onclick="filterMain('singo',this)">Singo</div></div>
<div class="cat-wrap"><div class="cat-row"><div class="cat-box active" onclick="filterCat('all',this)">Zote</div><div class="cat-box" onclick="filterCat('action',this)">Action</div><div class="cat-box" onclick="filterCat('love',this)">Love</div><div class="cat-box" onclick="filterCat('drama',this)">Drama</div><div class="cat-box" onclick="filterCat('thriller',this)">Thriller</div></div></div>
<h2 class="section-title">HOME</h2><div class="grid" id="homeGrid"></div>

<div class="overlay" id="keyBox"><div class="box"><h2>Fungua kwa Access Key</h2><input type="text" id="keyInput" placeholder="Mf: CHILAGU-F1K"><p class="error" id="keyError">❌ Key sio sahihi</p><button class="btn-grad" onclick="checkKey()">FUNGUA MOVIE</button><button class="btn-green" onclick="showPayment()">NUNUA KEY Tsh 2000</button><button class="btn-gray" onclick="closeOverlay('keyBox')">Cancel</button></div></div>
<div class="overlay" id="payBox"><div class="box"><h2>Chagua Mtandao</h2><div class="payment-alert"><p>Lipa Tsh 2000 kwenda</p><p class="namba">0686436004</p><p>Moshi Idd</p></div><div class="networks" id="networkButtons"><div class="net-btn" onclick="pay('airtel')">Airtel Money</div><div class="net-btn" onclick="pay('mpesa')">M-Pesa</div><div class="net-btn" onclick="pay('tigo')">Tigo Pesa</div><div class="net-btn" onclick="pay('halo')">HaloPesa</div></div><div class="whatsapp-step" id="whatsappStep"><button class="btn-whatsapp" onclick="goToWhatsapp()">💬 TUMA MUAMALA WHATSAPP</button></div><button class="btn-gray" onclick="closeOverlay('payBox')">Rudi Nyuma</button></div></div>
<div class="overlay" id="playerBox"><div class="box" style="max-width:100vw;max-height:100vh;padding:0"><span style="position:absolute;top:10px;right:10px;font-size:35px;cursor:pointer;z-index:1001" onclick="closePlayer()">×</span><iframe id="videoFrame" src="" style="width:100vw;height:100vh;border:none" allowfullscreen></iframe></div></div>

<div class="overlay" id="adminBox"><div class="box">
  <h2>👑 Mlango wa Admin</h2>
  <div id="adminTabs" style="display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap">
    <button class="btn-grad" onclick="showAdminTab('stats')">Takwimu</button>
    <button class="btn-grad" onclick="showAdminTab('upload')">Ongeza</button>
    <button class="btn-grad" onclick="showAdminTab('manage')">Simamia</button>
    <button class="btn-grad" onclick="showAdminTab('settings')">Mipangilio</button>
  </div>
  <div id="adminStats"></div>
  <div id="adminUpload" style="display:none;text-align:left">
    <input type="text" id="mTitle" placeholder="Jina la Movie">
    <select id="mType"><option value="singo">Singo</option><option value="series">Series</option></select>
    <select id="mCat"><option value="drama">Drama</option><option value="action">Action</option><option value="love">Love</option><option value="thriller">Thriller</option></select>
    <input type="number" id="mPrice" placeholder="Bei: 0 kwa bure, 2000 kwa kulipwa" value="2000">
    <input type="text" id="mThumb" placeholder="Link ya Thumbnail">
    <input type="text" id="mLink" placeholder="Link ya Video">
    <label><input type="checkbox" id="mTrending"> Trending</label>
    <button class="btn-green" onclick="saveMovie()">HIFADHI MOVIE</button>
  </div>
  <div id="adminManage" style="display:none;text-align:left"><h3>Hariri au Futa Movie</h3><div id="manageList"></div></div>
  <div id="adminSettings" style="display:none;text-align:left"><h3>Badilisha Mipangilio</h3><input type="text" id="settingKey" placeholder="Key ya Wiki Mpya"><input type="text" id="settingPass" placeholder="Password Mpya ya Admin"><button class="btn-grad" onclick="saveSettings()">HIFADHI MIPANGILIO</button></div>
  <button class="btn-gray" onclick="closeOverlay('adminBox')">Funga</button>
</div></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import { getAnalytics, logEvent } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-analytics.js";
  import { getFirestore, collection, addDoc, serverTimestamp, getDocs, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCVDXKkOYlhr5ez_dfA-jOQ8Ve_UXw5qWk",
    authDomain: "chilagu-update.firebaseapp.com",
    projectId: "chilagu-update",
    storageBucket: "chilagu-update.firebasestorage.app",
    messagingSenderId: "1007502056082",
    appId: "1:1007502056082:web:c20c43601cdae50059244b"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = getFirestore(app);
  window.db = db;

  window.trackEvent = async function(eventName, data) {
    logEvent(analytics, eventName, data);
    await addDoc(collection(db, "chilagu_events"), {event: eventName,...data,time: serverTimestamp()});
  }
</script>

<script>
let WEEKLY_KEY = "Chilagu-F1K";
let ADMIN_PASS = "ChilaguCinemaPro";
const WEEKLY_PRICE = 2000;
const ADMIN_WHATSAPP = "255686436004";
const ADMIN_NAME = "Moshi Idd";
const PAYMENT_NUMBER = "0686436004";

let movies = [];
let mainType='all', activeCat='all', currentMovie=null, selectedNetwork='';
let logoClicks = 0;

onSnapshot(collection(window.db, "settings"), (snapshot) => {
  snapshot.forEach(doc => {const d = doc.data(); if(d.key) WEEKLY_KEY = d.key; if(d.pass) ADMIN_PASS = d.pass;});
});

onSnapshot(collection(window.db, "movies"), (snapshot) => {
  movies = [];
  snapshot.forEach(doc => { movies.push({id: doc.id, ...doc.data()}) });
  loadMovies();
});

document.getElementById("adminLogo").onclick = () => {
  logoClicks++;
  if(logoClicks >= 5){logoClicks = 0; openAdmin();}
  setTimeout(()=>{logoClicks=0}, 2000);
}

function toggleSearch(){document.getElementById("searchWrap").classList.toggle("active");}
function makeCard(m){const div=document.createElement("div");div.className="card";let star=m.price>0?'<div class="star-badge">★</div>':'';div.innerHTML=`<div class="thumb-wrap"><img src="${m.thumbnail}" loading="lazy">${star}</div><div class="card-body"><p>${m.title}</p></div>`;div.onclick=()=>openMovie(m);return div}
function loadMovies(){const homeGrid=document.getElementById("homeGrid");homeGrid.innerHTML="";let searchVal = document.getElementById("searchInput").value.toLowerCase();let filtered=movies.filter(m=>(mainType==='all'||m.type===mainType)&&(activeCat==='all'||m.cat===activeCat)&&m.title.toLowerCase().includes(searchVal));filtered.forEach(m=>homeGrid.appendChild(makeCard(m)));}

function openMovie(m){trackEvent("view_movie", {title: m.title});currentMovie=m;if(m.price>0){document.getElementById("keyBox").style.display="flex"}else{playMovie(m.link)}}
function checkKey(){if(document.getElementById("keyInput").value.trim()===WEEKLY_KEY){trackEvent("key_used", {movie: currentMovie.title});closeOverlay('keyBox');playMovie(currentMovie.link)}else{document.getElementById("keyError").style.display="block"}}
function playMovie(link){trackEvent("play_movie", {title: currentMovie.title});document.getElementById("videoFrame").src = link;document.getElementById("playerBox").style.display="flex";}
function showPayment(){closeOverlay('keyBox');document.getElementById("payBox").style.display="flex"}
function pay(network){trackEvent("buy_key_click", {movie: currentMovie.title, network: network});selectedNetwork = network;document.getElementById("networkButtons").style.display="none";document.getElementById("whatsappStep").style.display="block";}
function goToWhatsapp(){const msg=`SALAMU ${ADMIN_NAME}. NIMELIPA Tsh${WEEKLY_PRICE} KWA ${selectedNetwork.toUpperCase()} KWENDA ${PAYMENT_NUMBER}. TAFADHALI NITUMIE KEY YA WIKI HII: ${WEEKLY_KEY}`;window.open(`https://wa.me/${ADMIN_WHATSAPP}?text=${encodeURIComponent(msg)}`,'_blank');closeOverlay('payBox');}
function closePlayer(){document.getElementById("playerBox").style.display="none";document.getElementById("videoFrame").src="";}
function closeOverlay(id){document.getElementById(id).style.display="none"}
function filterMain(type,el){mainType=type;document.querySelectorAll(".main-tab").forEach(c=>c.classList.remove("active"));el.classList.add("active");loadMovies()}
function filterCat(cat,el){activeCat=cat;document.querySelectorAll(".cat-box").forEach(c=>c.classList.remove("active"));el.classList.add("active");loadMovies()}

function openAdmin(){const pass = prompt("Weka Password ya Admin:"); if(pass !== ADMIN_PASS){ alert("Password sio sahihi!"); return; } document.getElementById("adminBox").style.display="flex"; loadAdminStats(); loadManageList();}
function showAdminTab(tab){['adminStats','adminUpload','adminManage','adminSettings'].forEach(id=>document.getElementById(id).style.display='none'); document.getElementById('admin'+tab.charAt(0).toUpperCase()+tab.slice(1)).style.display='block';}
async function loadAdminStats(){const snapshot = await getDocs(collection(window.db, "chilagu_events")); let plays = {}; let payments = {}; snapshot.forEach(doc=>{const d = doc.data(); if(d.event === "play_movie") plays[d.title] = (plays[d.title]||0)+1; if(d.event === "buy_key_click") payments[d.movie] = (payments[d.movie]||0)+1;}); let html = `<h3>Takwimu</h3><table><tr><th>Movie</th><th>Plays</th><th>Waliojaribu</th><th>Pesa</th></tr>`; movies.forEach(m=>{html += `<tr><td>${m.title}</td><td>${plays[m.title]||0}</td><td>${payments[m.title]||0}</td><td>Tsh ${(payments[m.title]||0)*WEEKLY_PRICE}</td></tr>`;}); html += `</table>`; document.getElementById("adminStats").innerHTML = html;}
async function saveMovie(){const newMovie = {title: document.getElementById("mTitle").value, type: document.getElementById("mType").value, cat: document.getElementById("mCat").value, price: parseInt(document.getElementById("mPrice").value), thumbnail: document.getElementById("mThumb").value, link: document.getElementById("mLink").value, trending: document.getElementById("mTrending").checked}; await addDoc(collection(window.db, "movies"), newMovie); alert("Movie imehifadhiwa!"); document.getElementById("mTitle").value = "";}
function loadManageList(){const list = document.getElementById("manageList"); list.innerHTML = ""; movies.forEach(m=>{list.innerHTML += `<div class="admin-movie-item"><b>${m.title}</b> - ${m.price==0?'Bure':'Tsh '+m.price}<button class="btn-blue" onclick='editMovie("${m.id}")'>Hariri</button><button class="btn-red" onclick='deleteMovie("${m.id}")'>Futa</button></div>`;});}
function editMovie(id){const m = movies.find(x=>x.id==id); document.getElementById("mTitle").value = m.title; document.getElementById("mType").value = m.type; document.getElementById("mCat").value = m.cat; document.getElementById("mPrice").value = m.price; document.getElementById("mThumb").value = m.thumbnail; document.getElementById("mLink").value = m.link; document.getElementById("mTrending").checked = m.trending; showAdminTab('upload'); document.querySelector("#adminUpload button").innerText = "SASISHA MOVIE"; document.querySelector("#adminUpload button").onclick = async () => {await updateDoc(doc(window.db, "movies", id), {title: document.getElementById("mTitle").value, price: parseInt(document.getElementById("mPrice").value), thumbnail: document.getElementById("mThumb").value, link: document.getElementById("mLink").value, trending: document.getElementById("mTrending").checked}); alert("Imesasishwa!"); document.querySelector("#adminUpload button").innerText = "HIFADHI MOVIE"; document.querySelector("#adminUpload button").onclick = saveMovie; showAdminTab('manage');}}
async function deleteMovie(id){if(confirm("Una uhakika unataka kufuta movie hii?")){await deleteDoc(doc(window.db, "movies", id)); alert("Imefutwa!");}}
async function saveSettings(){await addDoc(collection(window.db, "settings"), {key: document.getElementById("settingKey").value, pass: document.getElementById("settingPass").value, time: serverTimestamp()}); alert("Mipangilio imehifadhiwa!");}
</script>
</body>
</html>
