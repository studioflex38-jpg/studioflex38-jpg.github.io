<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chilagu Legacy Cinema - VIP</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --bg: #000; --card: #181818; --netflix: #E50914; --airtel: #e60000; --green: #25D366; --gold: #FFD700; }
  body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--bg); color: #fff; }
  .header { padding: 20px 15px 5px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { margin: 0; font-size: 22px; font-weight: 800; }
  .vip-badge { background: var(--gold); color: #000; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .search { margin: 0 15px 15px; position: relative; }
  .search input { width: 100%; padding: 12px 40px 12px 15px; border-radius: 20px; border: none; background: #2a2a2a; color: #fff; font-size: 15px; box-sizing: border-box; }
  .search-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 18px; color: #888; }
  .cat-nav { display: flex; gap: 8px; padding: 0 15px 15px; overflow-x: auto; } 
  .cat { padding: 7px 14px; border-radius: 20px; background: #2a2a2a; font-size: 13px; white-space: nowrap; cursor: pointer; font-weight: 600; }
  .cat.active { background: #fff; color: #000; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 10px 15px 20px; } 
  .card { background: var(--card); border-radius: 4px; overflow: hidden; position: relative; cursor: pointer; }
  .card .thumb { width: 100%; aspect-ratio: 19/6; background: #333; } 
  .star { position: absolute; top: 6px; right: 6px; width: 24px; height: 24px; background: var(--gold); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #000; }
  .card p { margin: 0; padding: 8px 6px; font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #paymentBox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; align-items: center; justify-content: center; }
  .pay-card { background: #181818; padding: 20px; border-radius: 8px; width: 90%; max-width: 420px; text-align: center; font-weight: 600; }
  .pay-card .airtel { font-size: 22px; color: var(--airtel); font-weight: 800; margin: 8px 0; }
  .pay-card button { width: 100%; padding: 14px; margin-top: 12px; border: none; border-radius: 4px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Montserrat', sans-serif; background: var(--netflix); color: #fff; }
  .pay-card button.whatsapp { background: var(--green); }
</style>
</head>
<body>

<div class="header">
  <h1>Chilagu Legacy Cinema</h1>
  <div class="vip-badge">VIP WEEK</div>
</div>
<div class="search"><input type="text" id="searchInput" placeholder="Tafuta movie hapa..." onkeyup="loadMovies()"><span class="search-icon">🔍</span></div>
<div class="cat-nav">
  <div class="cat active" onclick="filterCat('all', this)">Zote</div>
  <div class="cat" onclick="filterCat('vip', this)">VIP Only ★</div>
  <div class="cat" onclick="filterCat('free', this)">Bure</div>
</div>
<div class="grid" id="homeGrid"></div>

<div id="paymentBox"><div class="pay-card">
  <h3>Ingia VIP - Wiki 1</h3>
  <p>Lipa <b>Tsh <span id="subPrice">2000</span></b> kwa:</p>
  <p class="airtel">0686436004</p> 
  <p>Jina: Moshi Idd</p>
  <p style="font-size:12px; color:#aaa;">Baada ya kulipa bonyeza hapa chini</p>
  <a id="waLink" href="#" target="_blank" style="text-decoration:none;">
    <button class="whatsapp">NIMELIPA - NIPATIE ACCESS</button>
  </a>
  <button onclick="closePay()" style="background:#333; margin-top:8px;">Funga</button>
</div></div>

<script>
/* ================== WEKA HAPA TU MZEE ================== */
const WEEKLY_KEY = "CHILAGU-WK43"; // <-- BADILISHA HII KILA JUMAPILI
const WEEKLY_PRICE = 2000;         // <-- BEI YA WIKI
const YOUR_WHATSAPP_LINK = "https://wa.me/255686436004?text=KEY " + WEEKLY_KEY; // <-- LINK YAKO
/* ======================================================= */

const movies = [
  {id: 1, title: "Movie Bure 1", cat: "free", price: 0, link: "https://drive.google.com/file/d/FREE1/view"},
  {id: 2, title: "John Wick 4 VIP", cat: "vip", price: WEEKLY_PRICE, link: "https://drive.google.com/file/d/VIP1/view"},
  {id: 3, title: "Fast X VIP", cat: "vip", price: WEEKLY_PRICE, link: "https://drive.google.com/file/d/VIP2/view"},
];

let activeCat = 'all';

function loadMovies() {
  const grid = document.getElementById("homeGrid"); grid.innerHTML = "";
  let filtered = movies.filter(m => (activeCat === 'all' || m.cat === activeCat) && m.title.toLowerCase().includes(document.getElementById("searchInput").value.toLowerCase()));
  filtered.forEach(m => {
    const div = document.createElement("div"); div.className = "card";
    let star = m.price > 0 ? '<div class="star">★</div>' : ''; 
    div.innerHTML = `<div class="thumb"></div> ${star} <p>${m.title}</p>`;
    div.onclick = () => openMovie(m); grid.appendChild(div);
  });
}

function openMovie(m) {
  if(m.price === 0){ 
    window.open(m.link, "_blank"); 
  } else {
    // Movie ya VIP - Fungua Popup ya Subscription
    document.getElementById("subPrice").innerText = WEEKLY_PRICE;
    document.getElementById("waLink").href = YOUR_WHATSAPP_LINK; // Link inajenga na Key ya wiki
    document.getElementById("paymentBox").style.display = "flex";
  }
}

function closePay() { document.getElementById("paymentBox").style.display = "none"; }

function filterCat(cat, el) { 
  activeCat = cat; 
  document.querySelectorAll(".cat").forEach(c => c.classList.remove("active")); 
  el.classList.add("active"); 
  loadMovies(); 
}
loadMovies();
</script>
</body>
</html>
