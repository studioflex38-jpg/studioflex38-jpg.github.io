<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chilagu Movies</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0a0a0a; color: #fff; }
.header { display: flex; align-items: center; padding: 14px 16px; background: #1a1a1a; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
.logo { width: 36px; height: 36px; margin-right: 12px; }
.brand { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.search-bar { flex: 1; background: #222; border: 1px solid #333; border-radius: 8px; padding: 10px 14px; color: #fff; margin: 0 16px; font-size: 14px; }
.search-bar:focus { outline: none; border-color: #a855f7; }
.hero-slider { position: relative; width: 100%; height: 220px; overflow: hidden; margin-bottom: 16px; }
.slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 0.8s; background-size: cover; background-position: center; cursor: pointer; }
.slide.active { opacity: 1; }
.slide-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(10,10,10,0.95)); padding: 20px 16px; }
.slide-title { font-size: 24px; font-weight: 700; margin-bottom: 4px; text-transform: uppercase; }
.slide-desc { font-size: 13px; color: #ccc; margin-bottom: 12px; font-weight: 500; }
.btn-watch { background: linear-gradient(135deg, #a855f7, #ec4899); color: #fff; border: none; padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.cat-pills { padding: 0 16px; margin-bottom: 16px; }
.pill-tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; }
.pill-tabs::-webkit-scrollbar { display: none; }
.pill-tab { background: #1a1a1a; border: 1px solid #2a2a2a; color: #aaa; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; white-space: nowrap; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
.pill-tab.active { background: linear-gradient(135deg, #a855f7, #ec4899); color: #fff; border-color: transparent; }
.pill-tab i { font-size: 14px; }
.cat-circles { padding: 0 16px; margin-bottom: 20px; }
.circle-tabs { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; }
.circle-tabs::-webkit-scrollbar { display: none; }
.circle-tab { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; min-width: 64px; }
.circle-icon { width: 56px; height: 56px; border-radius: 50%; background: #1a1a1a; border: 2px solid #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 22px; transition: all 0.3s; }
.circle-tab.active.circle-icon { background: linear-gradient(135deg, #a855f7, #ec4899); border-color: transparent; transform: scale(1.1); }
.circle-name { font-size: 12px; font-weight: 500; color: #aaa; }
.circle-tab.active.circle-name { color: #fff; font-weight: 600; }
.section-title { padding: 0 16px; font-size: 17px; font-weight: 700; margin-bottom: 14px; }
.movie-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 16px 40px; }
.movie-card { background: #1a1a1a; border-radius: 10px; overflow: hidden; cursor: pointer; position: relative; border: 1px solid #222; transition: transform 0.2s; }
.movie-card:active { transform: scale(0.97); }
.thumbnail { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #222; }
.star-badge { position: absolute; top: 6px; right: 6px; background: linear-gradient(135deg, #f59e0b, #f97316); color: #000; width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; box-shadow: 0 2px 8px rgba(245,158,11,0.4); }
.card-info { padding: 8px; }
.card-title { font-size: 11px; font-weight: 600; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 28px; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 1000; overflow-y: auto; }
.modal-content { background: #1a1a1a; width: 95%; max-width: 900px; margin: 20px auto; border-radius: 16px; padding: 0; position: relative; border: 1px solid #2a2a2a; }
.close-btn { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; font-size: 24px; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; }
.video-frame { width: 100%; aspect-ratio: 16/9; border: none; border-radius: 16px 16px 0 0; }
.modal-info { padding: 20px; }
.modal-title { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
.modal-desc { font-size: 14px; color: #aaa; line-height: 1.6; margin-bottom: 16px; }
.price-box { background: #222; padding: 14px; border-radius: 10px; margin-bottom: 14px; border: 1px solid #2a2a2a; }
.price-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.price-value { font-size: 22px; font-weight: 700; color: #10b981; }
.btn-buy { background: linear-gradient(135deg, #10b981, #059669); color: #fff; border: none; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; margin-bottom: 20px; }
.free-badge { background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; padding: 14px; border-radius: 10px; text-align: center; font-weight: 600; margin-bottom: 20px; }
.comment-section { border-top: 1px solid #2a2a2a; padding-top: 20px; margin-top: 20px; }
.comment-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.comment-form { background: #222; padding: 16px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #2a2a2a; }
.comment-form input { width: 100%; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 10px; color: #fff; font-size: 14px; margin-bottom: 10px; }
.comment-form textarea { width: 100%; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 10px; color: #fff; font-size: 14px; min-height: 80px; resize: vertical; margin-bottom: 10px; }
.comment-form input:focus,.comment-form textarea:focus { outline: none; border-color: #a855f7; }
.btn-comment { background: linear-gradient(135deg, #a855f7, #ec4899); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
.comment-list { display: flex; flex-direction: column; gap: 12px; }
.comment-item { background: #222; padding: 14px; border-radius: 10px; border: 1px solid #2a2a2a; }
.comment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.comment-name { font-size: 14px; font-weight: 600; color: #a855f7; }
.comment-date { font-size: 11px; color: #666; }
.comment-text { font-size: 13px; color: #ccc; line-height: 1.5; }
.loading { text-align: center; padding: 50px; color: #666; }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://i.postimg.cc/LXYGQT8w/In-Shot-20260523-092931092-removebg-preview.png" alt="Logo" class="logo">
        <div class="brand">CHILAGU</div>
        <input type="text" class="search-bar" placeholder="Tafuta movie..." id="searchInput">
    </div>
    <div class="hero-slider" id="heroSlider"></div>
    <div class="cat-pills">
        <div class="pill-tabs" id="pillTabs">
            <button class="pill-tab active" data-cat="all"><i class="fas fa-clapperboard"></i> All Movies</button>
            <button class="pill-tab" data-cat="Series"><i class="fas fa-tv"></i> Series</button>
            <button class="pill-tab" data-cat="Singo"><i class="fas fa-film"></i> Singo</button>
        </div>
    </div>
    <div class="cat-circles">
        <div class="circle-tabs" id="circleTabs">
            <div class="circle-tab active" data-cat="all" onclick="selectCategory('all')">
                <div class="circle-icon" style="background: linear-gradient(135deg, #a855f7, #ec4899);"><i class="fas fa-fire"></i></div>
                <div class="circle-name">Zote</div>
            </div>
            <div class="circle-tab" data-cat="Action" onclick="selectCategory('Action')">
                <div class="circle-icon"><i class="fas fa-bolt"></i></div>
                <div class="circle-name">Action</div>
            </div>
            <div class="circle-tab" data-cat="Love story" onclick="selectCategory('Love story')">
                <div class="circle-icon"><i class="fas fa-heart"></i></div>
                <div class="circle-name">Love</div>
            </div>
            <div class="circle-tab" data-cat="Drama" onclick="selectCategory('Drama')">
                <div class="circle-icon"><i class="fas fa-theater-masks"></i></div>
                <div class="circle-name">Drama</div>
            </div>
        </div>
    <h2 class="section-title" id="sectionTitle">TRENDING SASA</h2>
    <div class="movie-grid" id="movieGrid"><div class="loading">Inapakia movies kutoka Google Sheets...</div></div>
    <div class="modal" id="videoModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <iframe class="video-frame" id="videoFrame" allowfullscreen></iframe>
            <div class="modal-info">
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-desc" id="modalDesc"></div>
                <div id="priceSection"></div>
                <div class="comment-section">
                    <div class="comment-title">Maoni (<span id="commentCount">0</span>)</div>
                    <div class="comment-form">
                        <input type="text" id="commentName" placeholder="Jina lako">
                        <textarea id="commentText" placeholder="Andika maoni yako hapa..."></textarea>
                        <button class="btn-comment" onclick="addComment()">Tuma Maoni</button>
                    </div>
                    <div class="comment-list" id="commentList"></div>
                </div>
            </div>
        </div>
    </div>
<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSt7bqQdW-jWRmH6PzhumapSpuxoEA73v6vSqvy5BIyWZ8w-pKGPdq6lA1Wl5k7piIszoMgGh41ze2S/pub?output=csv';

let movies = [];
let comments = JSON.parse(localStorage.getItem('chilagu_comments') || '{}');
let currentMovieId = null;
let currentCategory = 'all';

document.addEventListener('DOMContentLoaded', () => {
    loadMoviesFromSheet();
    document.getElementById('searchInput').addEventListener('input', filterMovies);
    document.querySelectorAll('.pill-tab').forEach(btn => btn.addEventListener('click', (e) => selectPillCategory(e.target.dataset.cat)));
});

async function loadMoviesFromSheet() {
    try {
        const response = await fetch(SHEET_URL);
        const csv = await response.text();
        const rows = csv.split('\n').slice(1);
        movies = rows.filter(row => row.trim()).map(row => {
            const cols = parseCSVRow(row);
            return {
                id: parseInt(cols[0]) || 0,
                title: cols[1] || '',
                type: cols[2] || '',
                thumbnail: cols[3] || '',
                cat: cols[4] || '',
                desc: cols[5] || '',
                featured: cols[6] === 'TRUE',
                trending: cols[7] === 'TRUE',
                new: cols[8] === 'TRUE',
                video: cols[9] || '',
                price: parseInt(cols[10]) || 0,
                payhip: cols[11] || ''
            };
        }).filter(m => m.id && m.title);
        renderMovies();
        renderHeroSlider();
    } catch (e) {
        document.getElementById('movieGrid').innerHTML = '<div class="loading">Imeshindwa kupakia. Hakikisha Sheet imepublish vizuri.</div>';
    }
}

function parseCSVRow(row) {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < row.length; i++) {
        const char = row[i];
        if (char === '"') {
            inQuotes =!inQuotes;
        } else if (char === ',' &&!inQuotes) {
            result.push(current.trim());
            current = '';
        } else {
            current += char;
        }
    }
    result.push(current.trim());
    return result;
}

function renderMovies(filter = '', category = 'all') {
    const grid = document.getElementById('movieGrid');
    let filtered = movies;
    if (category!== 'all') {
        filtered = filtered.filter(m => m.cat === category || m.type === category);
    }
    if (filter) {
        filtered = filtered.filter(m =>
            m.title.toLowerCase().includes(filter.toLowerCase()) ||
            m.desc.toLowerCase().includes(filter.toLowerCase())
        );
    }
    if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;">Hakuna movies</div>';
        return;
    }
    grid.innerHTML = filtered.map(m => `
        <div class="movie-card" onclick="openMovie(${m.id})">
            ${m.price > 0? '<div class="star-badge">⭐</div>' : ''}
            <img src="${m.thumbnail}" class="thumbnail" onerror="this.src='https://via.placeholder.com/400x225/222/666?text=No+Image'">
            <div class="card-info">
                <div class="card-title">${m.title}</div>
            </div>
        </div>
    `).join('');
}

function renderHeroSlider() {
    const slider = document.getElementById('heroSlider');
    const featured = movies.filter(m => m.featured).slice(0, 5);
    if (featured.length === 0) {
        slider.innerHTML = '<div class="slide active" style="background:#1a1a1a;display:flex;align-items:center;justify-content:center;"><div style="color:#666;">Weka TRUE kwenye Is_Featured kwa banner</div></div>';
        return;
    }
    slider.innerHTML = featured.map((m, i) => `
        <div class="slide ${i === 0? 'active' : ''}" style="background-image:url('${m.thumbnail}')" onclick="openMovie(${m.id})">
            <div class="slide-overlay">
                <div class="slide-title">${m.title}</div>
                <div class="slide-desc">${m.desc}</div>
                <button class="btn-watch" onclick="event.stopPropagation(); openMovie(${m.id})"><i class="fas fa-play"></i> Tazama</button>
            </div>
        </div>
    `).join('');
    let currentSlide = 0;
    setInterval(() => {
        const slides = slider.querySelectorAll('.slide');
        if(slides.length > 0) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }
    }, 5000);
}

function filterMovies() {
    const term = document.getElementById('searchInput').value;
    renderMovies(term, currentCategory);
}

function selectPillCategory(cat) {
    document.querySelectorAll('.pill-tab').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    currentCategory = cat;
    renderMovies('', cat);
}

function selectCategory(cat) {
    document.querySelectorAll('.circle-tab').forEach(b => b.classList.remove('active'));
    event.currentTarget.classList.add('active');
    currentCategory = cat;
    renderMovies('', cat);
}

function openMovie(id) {
    const movie = movies.find(m => m.id === id);
    if (!movie) return;
    currentMovieId = id;
    document.getElementById('videoModal').style.display = 'block';
    document.getElementById('videoFrame').src = movie.video;
    document.getElementById('modalTitle').textContent = movie.title;
    document.getElementById('modalDesc').textContent = movie.desc;
    const priceSection = document.getElementById('priceSection');
    if (movie.price > 0) {
        priceSection.innerHTML = `
            <div class="price-box">
                <div class="price-label">Bei ya Movie</div>
                <div class="price-value">Tsh ${movie.price.toLocaleString()}</div>
            </div>
            <button class="btn-buy" onclick="buyMovie(${movie.id})">Nunua Sasa</button>
        `;
    } else {
        priceSection.innerHTML = `<div class="free-badge">✓ Movie ya Bure - Tazama Sasa</div>`;
    }
    renderComments(id);
}

function closeModal() {
    document.getElementById('videoModal').style.display = 'none';
    document.getElementById('videoFrame').src = '';
    currentMovieId = null;
}

function buyMovie(id) {
    const movie = movies.find(m => m.id === id);
    if (!movie) return;
    if (movie.payhip) {
        window.open(movie.payhip, '_blank');
    } else {
        alert(`Tuma Tsh ${movie.price.toLocaleString()} kwa M-Pesa 0686436004\n\nBaada ya kulipa, tuma screenshot WhatsApp kwa 0686436004 upate link ya kutazama.`);
    }
}

function renderComments(movieId) {
    const list = document.getElementById('commentList');
    const movieComments = comments[movieId] || [];
    document.getElementById('commentCount').textContent = movieComments.length;
    if (movieComments.length === 0) {
        list.innerHTML = '<div style="text-align:center;color:#666;padding:20px;">Hakuna maoni bado. Kuwa wa kwanza!</div>';
        return;
    }
    list.innerHTML = movieComments.map(c => `
        <div class="comment-item">
            <div class="comment-header">
                <div class="comment-name">${c.name}</div>
                <div class="comment-date">${c.date}</div>
            </div>
            <div class="comment-text">${c.text}</div>
        </div>
    `).join('');
}

function addComment() {
    if (!currentMovieId) return;
    const name = document.getElementById('commentName').value.trim();
    const text = document.getElementById('commentText').value.trim();
    if (!name ||!text) {
        alert('Jaza jina na maoni yako');
        return;
    }
    if (!comments[currentMovieId]) comments[currentMovieId] = [];
    comments[currentMovieId].push({
        name: name,
        text: text,
        date: new Date().toLocaleDateString('sw-TZ', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })
    });
    localStorage.setItem('chilagu_comments', JSON.stringify(comments));
    document.getElementById('commentName').value = '';
    document.getElementById('commentText').value = '';
    renderComments(currentMovieId);
}

window.onclick = function(event) {
    if (event.target.classList.contains('modal')) {
        event.target.style.display = 'none';
        if(event.target.id === 'videoModal') document.getElementById('videoFrame').src = '';
    }
}
</script>
</body>
</html>
