<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chilagu Movies</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #fff;
        }

        /* HEADER */
     .header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #111;
            position: sticky;
            top: 0;
            z-index: 100;
        }

     .logo {
            width: 40px;
            height: 40px;
            margin-right: 12px;
        }

     .search-bar {
            flex: 1;
            background: #222;
            border: none;
            border-radius: 20px;
            padding: 10px 16px;
            color: #fff;
            font-size: 14px;
        }

     .search-bar::placeholder {
            color: #888;
        }

        /* HERO SLIDER - AUTOMATIC + BUTTONS */
     .hero-slider {
            position: relative;
            width: 100%;
            height: 220px;
            overflow: hidden;
            margin-bottom: 20px;
        }

     .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            background-size: cover;
            background-position: center;
        }

     .slide.active {
            opacity: 1;
        }

     .slide-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            padding: 20px 16px 16px;
        }

     .slide-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 6px;
        }

     .slide-desc {
            font-size: 13px;
            color: #ccc;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

     .hero-buttons {
            display: flex;
            gap: 10px;
        }

     .btn-watch,.btn-details {
            border: none;
            padding: 8px 18px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

     .btn-watch {
            background: #8b5cf6;
            color: #fff;
        }

     .btn-details {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }

        /* CATEGORIES */
     .categories {
            padding: 0 16px;
            margin-bottom: 20px;
        }

     .main-cats,.sub-cats {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }

     .main-cats::-webkit-scrollbar,.sub-cats::-webkit-scrollbar {
            display: none;
        }

     .cat-btn {
            background: #222;
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
        }

     .cat-btn.active {
            background: #8b5cf6;
        }

     .sub-cats {
            margin-top: 12px;
        }

     .sub-cat-btn {
            background: #1a1a1a;
            border: none;
            color: #fff;
            padding: 12px;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

     .sub-cat-btn.active {
            background: #8b5cf6;
        }

        /* MOVIE GRID - CARD NDOGO ZA ULALO 16:9 */
     .section-title {
            padding: 0 16px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
        }

     .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            padding: 0 16px 30px;
        }

     .movie-card {
            background: #111;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

     .movie-card:hover {
            transform: scale(1.03);
        }

     .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: #222;
        }

     .card-info {
            padding: 8px;
        }

     .card-title {
            font-size: 12px;
            font-weight: 600;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 8px;
        }

     .card-buttons {
            display: flex;
            gap: 6px;
        }

     .card-btn {
            flex: 1;
            border: none;
            padding: 6px 0;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
        }

     .card-watch {
            background: #8b5cf6;
            color: #fff;
        }

     .card-details {
            background: #333;
            color: #fff;
        }

        /* MODAL PLAYER */
     .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

     .modal-content {
            width: 95%;
            max-width: 900px;
            position: relative;
        }

     .close-btn {
            position: absolute;
            top: -40px;
            right: 0;
            background: none;
            border: none;
            color: #fff;
            font-size: 30px;
            cursor: pointer;
        }

     .video-frame {
            width: 100%;
            aspect-ratio: 16/9;
            border: none;
            border-radius: 8px;
        }

     .modal-info {
            padding: 16px 0;
        }

     .modal-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
        }

     .modal-desc {
            font-size: 14px;
            color: #ccc;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="header">
        <img src="https://i.postimg.cc/LXYGQT8w/In-Shot-20260523-092931092-removebg-preview.png" alt="Chilagu" class="logo">
        <input type="text" class="search-bar" placeholder="Tafuta movie, series..." id="searchInput">
    </div>

    <!-- AUTOMATIC HERO SLIDER -->
    <div class="hero-slider" id="heroSlider">
        <!-- Slides zinajazwa na JS -->
    </div>

    <!-- CATEGORIES -->
    <div class="categories">
        <div class="main-cats" id="mainCats">
            <button class="cat-btn active" data-cat="all">🎬 All Movies</button>
            <button class="cat-btn" data-cat="Series">📺 Series</button>
            <button class="cat-btn" data-cat="singo">🎬 Singo</button>
        </div>
        <div class="sub-cats" id="subCats">
            <button class="sub-cat-btn active" data-sub="all">🔥<br>Zote</button>
            <button class="sub-cat-btn" data-sub="Action">💥<br>Action</button>
            <button class="sub-cat-btn" data-sub="Love Story">❤️<br>Love Story</button>
            <button class="sub-cat-btn" data-sub="Drama">😢<br>Drama</button>
            <button class="sub-cat-btn" data-sub="Clips & Comedy">😂<br>Clips & Comedy</button>
        </div>
    </div>

    <!-- TRENDING SECTION -->
    <h2 class="section-title">TRENDING SASA</h2>
    <div class="movie-grid" id="movieGrid">
        <!-- Movies zinajazwa na JS -->
    </div>

    <!-- VIDEO MODAL -->
    <div class="modal" id="videoModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <iframe class="video-frame" id="videoFrame" allowfullscreen></iframe>
            <div class="modal-info">
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-desc" id="modalDesc"></div>
            </div>
        </div>
    </div>

    <script>
        const movies = [
            {
                title: "TRAILER: Yellow RECKONING Full Power",
                thumbnail: "https://i.postimg.cc/YSnrwTCg/file-000000007ed871f49b545ab627e53b0d.png",
                videoUrl: "https://streamable.com/e/02hbc4?",
                price: 0,
                isFree: true,
                mainCategory: "Series",
                subCategory: "Drama",
                featured: true,
                payhipLink: "",
                description: "Kisasi cha Binti, alie poteza familia yake kwa Mr Bad Ghost. The Yellow Reckoning imeanza. Je, ataweza kumshinda?"
            },
            {
                title: "MPANDA MNAZI KWA MKONO MMOJA",
                thumbnail: "https://i.postimg.cc/HLJg2GPL/file-0000000001e471f481a5cc83ddc746bd.png",
                videoUrl: "https://streamable.com/e/83261w?",
                price: 0,
                isFree: true,
                mainCategory: "singo",
                subCategory: "Clips & Comedy",
                featured: true,
                payhipLink: "",
                description: "Mpanda Mnazi Kwa Mkono Mmoja - Comedy kali ya mtaani. Cheka hadi ubavu uume."
            }
        ];

        let currentSlide = 0;
        let activeMainCat = 'all';
        let activeSubCat = 'all';
        let currentMovie = null;

        // RENDER HERO SLIDER - AUTOMATIC + BUTTONS
        function renderHero() {
            const featured = movies.filter(m => m.featured);
            const slider = document.getElementById('heroSlider');

            slider.innerHTML = featured.map((movie, index) => `
                <div class="slide ${index === 0? 'active' : ''}" style="background-image: url('${movie.thumbnail}')">
                    <div class="slide-overlay">
                        <div class="slide-title">${movie.title}</div>
                        <div class="slide-desc">${movie.description}</div>
                        <div class="hero-buttons">
                            <button class="btn-watch" onclick="openModal('${movie.videoUrl}', '${movie.title}', '${movie.description}')">▶ Watch Now</button>
                            <button class="btn-details" onclick="openModal('${movie.videoUrl}', '${movie.title}', '${movie.description}')">ℹ Details</button>
                        </div>
                    </div>
                </div>
            `).join('');

            // AUTO SLIDE KILA SEKUNDE 4
            setInterval(() => {
                const slides = document.querySelectorAll('.slide');
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
            }, 4000);
        }

        // RENDER MOVIE GRID - CARD NDOGO ZA ULALO
        function renderMovies() {
            const grid = document.getElementById('movieGrid');
            let filtered = movies;

            if (activeMainCat!== 'all') {
                filtered = filtered.filter(m => m.mainCategory === activeMainCat);
            }
            if (activeSubCat!== 'all') {
                filtered = filtered.filter(m => m.subCategory === activeSubCat);
            }

            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(m =>
                    m.title.toLowerCase().includes(searchTerm) ||
                    m.description.toLowerCase().includes(searchTerm)
                );
            }

            grid.innerHTML = filtered.map(movie => `
                <div class="movie-card">
                    <img src="${movie.thumbnail}" alt="${movie.title}" class="thumbnail" onclick="openModal('${movie.videoUrl}', '${movie.title}', '${movie.description}')">
                    <div class="card-info">
                        <div class="card-title">${movie.title}</div>
                        <div class="card-buttons">
                            <button class="card-btn card-watch" onclick="openModal('${movie.videoUrl}', '${movie.title}', '${movie.description}')">Watch</button>
                            <button class="card-btn card-details" onclick="openModal('${movie.videoUrl}', '${movie.title}', '${movie.description}')">Details</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // MODAL FUNCTIONS
        function openModal(videoUrl, title, desc) {
            document.getElementById('videoFrame').src = videoUrl;
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalDesc').textContent = desc;
            document.getElementById('videoModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('videoFrame').src = '';
            document.getElementById('videoModal').style.display = 'none';
        }

        // CATEGORY FILTERS
        document.getElementById('mainCats').addEventListener('click', (e) => {
            if (e.target.classList.contains('cat-btn')) {
                document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                activeMainCat = e.target.dataset.cat;
                renderMovies();
            }
        });

        document.getElementById('subCats').addEventListener('click', (e) => {
            if (e.target.classList.contains('sub-cat-btn')) {
                document.querySelectorAll('.sub-cat-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                activeSubCat = e.target.dataset.sub;
                renderMovies();
            }
        });

        // SEARCH
        document.getElementById('searchInput').addEventListener('input', renderMovies);

        // CLOSE MODAL ON CLICK OUTSIDE
        document.getElementById('videoModal').addEventListener('click', (e) => {
            if (e.target.id === 'videoModal') closeModal();
        });

        // INIT
        renderHero();
        renderMovies();
    </script>
</body>
</html>
