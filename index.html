<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chilagu Movies</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0a0a0a; color: #fff; }

  .header { display: flex; align-items: center; padding: 12px 16px; background: #111; position: sticky; top: 0; z-index: 100; }
  .logo { width: 40px; height: 40px; margin-right: 12px; cursor: pointer; }
  .search-bar { flex: 1; background: #222; border: none; border-radius: 20px; padding: 10px 16px; color: #fff; }

        /* FAB YA UPLOAD KAMA AUDIOMACK */
  .fab-upload { 
       position: fixed; 
       bottom: 20px; 
       right: 20px; 
       width: 56px; 
       height: 56px; 
       background: #8b5cf6; 
       border: none; 
       border-radius: 50%; 
       display: none; 
       align-items: center; 
       justify-content: center; 
       cursor: pointer; 
       box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
       z-index: 999;
       transition: transform 0.2s;
   }
  .fab-upload:hover { transform: scale(1.1); }
  .fab-upload svg { width: 24px; height: 24px; fill: #fff; }

  .hero-slider { position: relative; width: 100%; height: 200px; overflow: hidden; margin-bottom: 16px; }
  .slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 1s; background-size: cover; background-position: center; }
  .slide.active { opacity: 1; }
  .slide-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.95)); padding: 16px; }
  .slide-title { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
  .slide-desc { font-size: 12px; color: #ccc; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .hero-buttons { display: flex; gap: 8px; }
  .btn-watch,.btn-details,.btn-buy { border: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-watch { background: #8b5cf6; color: #fff; }
  .btn-details { background: rgba(255,255,255,0.2); color: #fff; }
  .btn-buy { background: #10b981; color: #fff; }

  .categories { padding: 0 16px; margin-bottom: 16px; }
  .main-cats,.sub-cats { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
  .main-cats::-webkit-scrollbar,.sub-cats::-webkit-scrollbar { display: none; }
  .cat-btn { background: #222; border: none; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px; white-space: nowrap; cursor: pointer; }
  .cat-btn.active { background: #8b5cf6; }
  .sub-cats { margin-top: 10px; }
  .sub-cat-btn { background: #1a1a1a; border: none; color: #fff; padding: 10px; border-radius: 50%; width: 56px; height: 56px; font-size: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
  .sub-cat-btn.active { background: #8b5cf6; }

  .section-title { padding: 0 16px; font-size: 16px; font-weight: bold; margin-bottom: 10px; }
  .movie-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 16px 80px; }
  .movie-card { background: #111; border-radius: 6px; overflow: hidden; cursor: pointer; position: relative; }
  .thumbnail { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #222; }
  .card-info { padding: 6px; }
  .card-title { font-size: 11px; font-weight: 600; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 26px; }
   /* FREE TAG IMETOLEWA - TOFOUTI NI NYOTA TU */
  .star-badge { position: absolute; top: 6px; right: 6px; background: #f59e0b; color: #000; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }

  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
  .modal-content { width: 95%; max-width: 900px; position: relative; }
  .close-btn { position: absolute; top: -40px; right: 0; background: none; border: none; color: #fff; font-size: 30px; cursor: pointer; }
  .video-frame { width: 100%; aspect-ratio: 16/9; border: none; border-radius: 8px; }
  .modal-info { padding: 16px 0; }
  .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
  .modal-desc { font-size: 13px; color: #ccc; line-height: 1.5; margin-bottom: 12px; }
  .modal-buy { background: #10b981; color: #fff; border: none; padding: 12px 24px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }

  .admin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; }
  .admin-content { background: #111; width: 95%; max-width: 500px; margin: 20px auto; border-radius: 12px; padding: 20px; }
  .admin-title { font-size: 20px; font-weight: bold; margin-bottom: 20px; text-align: center; }
  .form-group { margin-bottom: 15px; }
  .form-group label { display: block; font-size: 13px; margin-bottom: 6px; color: #ccc; }
  .form-group input,.form-group select,.form-group textarea { width: 100%; background: #222; border: 1px solid #333; border-radius: 6px; padding: 10px; color: #fff; font-size: 14px; }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .form-row { display: flex; gap: 10px; }
  .form-row.form-group { flex: 1; }
  .checkbox-group { display: flex; align-items: center; gap: 8px; }
  .admin-buttons { display: flex; gap: 10px; margin-top: 20px; }
  .btn-save { flex: 1; background: #8b5cf6; color: #fff; border: none; padding: 12px; border-radius: 6px; font-weight: 600; cursor: pointer; }
  .btn-cancel { flex: 1; background: #333; color: #fff; border: none; padding: 12px; border-radius: 6px; font-weight: 600; cursor: pointer; }
  .movie-list { margin-top: 30px; }
  .movie-list-title { font-size: 16px; font-weight: bold; margin-bottom: 10px; }
  .admin-movie-item { background: #1a1a1a; padding: 10px; border-radius: 6px; margin-bottom: 8px; }
  .admin-movie-name { font-size: 13px; margin-bottom: 8px; }
  .admin-movie-actions { display: flex; gap: 8px; }
  .btn-edit { background: #3b82f6; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; flex: 1; }
  .btn-delete { background: #ef4444; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; flex: 1; }

  .login-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; }
  .login-content { background: #111; width: 90%; max-width: 350px; border-radius: 12px; padding: 30px 20px; text-align: center; }
  .login-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; }
  .login-input { width: 100%; background: #222; border: 1px solid #333; border-radius: 6px; padding: 12px; color: #fff; font-size: 14px; margin-bottom: 15px; }
  .login-btn { width: 100%; background: #8b5cf6; color: #fff; border: none; padding: 12px; border-radius: 6px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://i.postimg.cc/LXYGQT8w/In-Shot-20260523-092931092-removebg-preview.png" alt="Chilagu" class="logo" id="logo">
        <input type="text" class="search-bar" placeholder="Tafuta movie, series..." id="searchInput">
    </div>

    <button class="fab-upload" id="fabUpload" onclick="openAdmin()">
        <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
    </button>

    <div class="hero-slider" id="heroSlider"></div>

    <div class="categories">
        <div class="main-cats" id="mainCats">
            <button class="cat-btn active" data-cat="all">🎬 All Movies</button>
            <button class="cat-btn" data-cat="Series">📺 Series</button>
            <button class="cat-btn" data-cat="singo">🎬 Singo</button>
        </div>
        <div class="sub-cats" id="subCats">
            <button class="sub-cat-btn active" data-sub="all">🔥<br>Zote</button>
            <button class="sub-cat-btn" data-sub="Action">💥<br>Action</button>
            <button class="sub-cat-btn" data-sub="Love Story">❤️<br>Love</button>
            <button class="sub-cat-btn" data-sub="Drama">😢<br>Drama</button>
            <button class="sub-cat-btn" data-sub="Animation">🎨<br>Animation</button>
        </div>
    </div>

    <h2 class="section-title">TRENDING SASA</h2>
    <div class="movie-grid" id="movieGrid"></div>

    <div class="modal" id="videoModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <iframe class="video-frame" id="videoFrame" allowfullscreen></iframe>
            <div class="modal-info">
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-desc" id="modalDesc"></div>
                <button class="modal-buy" id="modalBuyBtn" style="display:none;">Nunua Sasa - Tsh <span id="modalPrice"></span></button>
            </div>
        </div>
    </div>

    <div class="login-modal" id="loginModal">
        <div class="login-content">
            <div class="login-title">🔒 Ingia Admin</div>
            <input type="password" class="login-input" id="passwordInput" placeholder="Weka Password">
            <button class="login-btn" onclick="checkPassword()">Ingia</button>
        </div>
    </div>

    <div class="admin-modal" id="adminModal">
        <div class="admin-content">
            <button class="close-btn" onclick="closeAdmin()">&times;</button>
            <div class="admin-title" id="adminFormTitle">Ongeza Movie Mpya 🎬</div>
            
            <input type="hidden" id="editIndex" value="">
            
            <div class="form-group">
                <label>Jina la Movie *</label>
                <input type="text" id="movieTitle" placeholder="Mfano: Yellow RECKONING Full Power">
            </div>

            <div class="form-group">
                <label>Link ya Thumbnail *</label>
                <input type="text" id="movieThumbnail" placeholder="https://i.postimg.cc/...">
            </div>

            <div class="form-group">
                <label>Link ya Video/Trailer</label>
                <input type="text" id="movieVideo" placeholder="https://streamable.com/e/...">
            </div>

            <div class="form-group">
                <label>Maelezo ya Movie</label>
                <textarea id="movieDesc" placeholder="Andika story fupi hapa..."></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Category Kuu</label>
                    <select id="movieMainCat">
                        <option value="Series">Series</option>
                        <option value="singo">Singo</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Category Ndogo</label>
                    <select id="movieSubCat">
                        <option value="Action">Action</option>
                        <option value="Love Story">Love Story</option>
                        <option value="Drama">Drama</option>
                        <option value="Animation">Animation</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Bei (Tsh)</label>
                    <input type="number" id="moviePrice" placeholder="0" value="0">
                </div>
                <div class="form-group">
                    <label>Link ya Payhip</label>
                    <input type="text" id="moviePayhip" placeholder="https://payhip.com/b/...">
                </div>
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="movieFree" checked>
                    <label for="movieFree">Ni Bure (Free)</label>
                </div>
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="movieFeatured">
                    <label for="movieFeatured">Weka Kwenye Banner Kuu</label>
                </div>
            </div>

            <div class="admin-buttons">
                <button class="btn-cancel" onclick="closeAdmin()">Ghairi</button>
                <button class="btn-save" id="saveBtn" onclick="saveMovie()">Hifadhi Movie</button>
            </div>

            <div class="movie-list">
                <div class="movie-list-title">Movie Zilizopo:</div>
                <div id="adminMovieList"></div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "ChilaguCinemaPro"; 
        let clickCount = 0;
        let clickTimer = null;

        let movies = JSON.parse(localStorage.getItem('chilaguMovies')) || [
            {
                title: "TRAILER: Yellow RECKONING Full Power",
                thumbnail: "https://i.postimg.cc/YSnrwTCg/file-000000007ed871f49b545ab627e53b0d.png",
                videoUrl: "https://streamable.com/e/02hbc4?",
                price: 0,
                isFree: true,
                mainCategory: "Series",
                subCategory: "Drama",
                featured: true,
                payhipLink: "",
                description: "Kisasi cha Binti, alie poteza familia yake kwa Mr Bad Ghost. The Yellow Reckoning imeanza."
            },
            {
                title: "MPANDA MNAZI KWA MKONO MMOJA",
                thumbnail: "https://i.postimg.cc/HLJg2GPL/file-0000000001e471f481a5cc83ddc746bd.png",
                videoUrl: "https://streamable.com/e/83261w?",
                price: 0,
                isFree: true,
                mainCategory: "singo",
                subCategory: "Animation",
                featured: true,
                payhipLink: "",
                description: "Mpanda Mnazi Kwa Mkono Mmoja - Animation kali ya Kitanzania."
            },
            {
                title: "Upcoming Animation",
                thumbnail: "https://i.postimg.cc/YSnrwTCg/file-000000007ed871f49b545ab627e53b0d.png",
                videoUrl: "",
                price: 5000,
                isFree: false,
                mainCategory: "Series",
                subCategory: "Animation",
                featured: false,
                payhipLink: "https://payhip.com/b/YOUR_LINK",
                description: "Hii ni animation ya kulipia. Lipia uone full movie."
            }
        ];

        let currentSlide = 0;
        let activeMainCat = 'all';
        let activeSubCat = 'all';
        let isAdmin = false;
        let editMode = false;

        document.getElementById('logo').addEventListener('click', () => {
            clickCount++;
            if (clickCount === 5) {
                showLogin();
                clickCount = 0;
            }
            clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { clickCount = 0; }, 2000);
        });

        function showLogin() {
            document.getElementById('loginModal').style.display = 'flex';
        }

        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            if (input === ADMIN_PASSWORD) {
                isAdmin = true;
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('fabUpload').style.display = 'flex';
                openAdmin();
                document.getElementById('passwordInput').value = '';
            } else {
                alert('Password sio sahihi!');
                document.getElementById('passwordInput').value = '';
            }
        }

        function saveToStorage() {
            localStorage.setItem('chilaguMovies', JSON.stringify(movies));
        }

        function renderHero() {
            const featured = movies.filter(m => m.featured);
            const slider = document.getElementById('heroSlider');
            if (featured.length === 0) {
                slider.innerHTML = '<div class="slide active" style="background:#222;display:flex;align-items:center;justify-content:center;"><div>Weka movie ya featured</div></div>';
                return;
            }

            slider.innerHTML = featured.map((movie, index) => `
                <div class="slide ${index === 0? 'active' : ''}" style="background-image: url('${movie.thumbnail}')">
                    <div class="slide-overlay">
                        <div class="slide-title">${movie.title}</div>
                        <div class="slide-desc">${movie.description}</div>
                        <div class="hero-buttons">
                            ${movie.isFree? 
                                `<button class="btn-watch" onclick='playMovie(${JSON.stringify(movie)})'>▶ Watch Now</button>
                                 <button class="btn-details" onclick='showDetails(${JSON.stringify(movie)})'>ℹ Details</button>` 
                                : 
                                `<button class="btn-buy" onclick="window.open('${movie.payhipLink}', '_blank')">💰 Nunua Sasa</button>
                                 <button class="btn-details" onclick='showDetails(${JSON.stringify(movie)})'>ℹ Details</button>`
                            }
                        </div>
                    </div>
                </div>
            `).join('');

            setInterval(() => {
                const slides = document.querySelectorAll('.slide');
                if (slides.length > 1) {
                    slides[currentSlide].classList.remove('active');
                    currentSlide = (currentSlide + 1) % slides.length;
                    slides[currentSlide].classList.add('active');
                }
            }, 4000);
        }

        function renderMovies() {
            const grid = document.getElementById('movieGrid');
            let filtered = movies;

            if (activeMainCat!== 'all') filtered = filtered.filter(m => m.mainCategory === activeMainCat);
            if (activeSubCat!== 'all') filtered = filtered.filter(m => m.subCategory === activeSubCat);

            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm) filtered = filtered.filter(m => m.title.toLowerCase().includes(searchTerm) || m.description.toLowerCase().includes(searchTerm));

            grid.innerHTML = filtered.map(movie => `
                <div class="movie-card" onclick='handleCardClick(${JSON.stringify(movie)})'>
                    ${!movie.isFree? '<div class="star-badge">★</div>' : ''}
                    <img src="${movie.thumbnail}" alt="${movie.title}" class="thumbnail">
                    <div class="card-info">
                        <div class="card-title">${movie.title}</div>
                    </div>
                </div>
            `).join('');
        }

        function handleCardClick(movie) {
            if (movie.isFree) {
                playMovie(movie);
            } else {
                window.open(movie.payhipLink, '_blank');
            }
        }

        function playMovie(movie) {
            document.getElementById('videoFrame').style.display = 'block';
            document.getElementById('videoFrame').src = movie.videoUrl;
            document.getElementById('modalTitle').textContent = movie.title;
            document.getElementById('modalDesc').textContent = movie.description;
            document.getElementById('modalBuyBtn').style.display = 'none';
            document.getElementById('videoModal').style.display = 'flex';
        }

        function showDetails(movie) {
            document.getElementById('videoFrame').style.display = 'none';
            document.getElementById('modalTitle').textContent = movie.title;
            document.getElementById('modalDesc').textContent = movie.description;
            
            if (!movie.isFree) {
                document.getElementById('modalBuyBtn').style.display = 'block';
                document.getElementById('modalPrice').textContent = movie.price;
                document.getElementById('modalBuyBtn').onclick = () => window.open(movie.payhipLink, '_blank');
            } else {
                document.getElementById('modalBuyBtn').style.display = 'none';
            }
            
            document.getElementById('videoModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('videoFrame').src = '';
            document.getElementById('videoModal').style.display = 'none';
        }

        function openAdmin() {
            if (!isAdmin) {
                showLogin();
                return;
            }
            editMode = false;
            document.getElementById('adminFormTitle').textContent = 'Ongeza Movie Mpya 🎬';
            document.getElementById('saveBtn').textContent = 'Hifadhi Movie';
            clearForm();
            renderAdminList();
            document.getElementById('adminModal').style.display = 'block';
        }

        function closeAdmin() {
            document.getElementById('adminModal').style.display = 'none';
            clearForm();
            editMode = false;
        }

        function clearForm() {
            document.getElementById('editIndex').value = '';
            document.getElementById('movieTitle').value = '';
            document.getElementById('movieThumbnail').value = '';
            document.getElementById('movieVideo').value = '';
            document.getElementById('movieDesc').value = '';
            document.getElementById('moviePrice').value = '0';
            document.getElementById('moviePayhip').value = '';
            document.getElementById('movieFree').checked = true;
            document.getElementById('movieFeatured').checked = false;
        }

        function saveMovie() {
            const title = document.getElementById('movieTitle').value.trim();
            const thumbnail = document.getElementById('movieThumbnail').value.trim();
            
            if (!title ||!thumbnail) {
                alert('Jaza Jina na Link ya Thumbnail!');
                return;
            }

            const movieData = {
                title: title,
                thumbnail: thumbnail,
                videoUrl: document.getElementById('movieVideo').value.trim(),
                description: document.getElementById('movieDesc').value.trim(),
                mainCategory: document.getElementById('movieMainCat').value,
                subCategory: document.getElementById('movieSubCat').value,
                price: parseInt(document.getElementById('moviePrice').value) || 0,
                payhipLink: document.getElementById('moviePayhip').value.trim(),
                isFree: document.getElementById('movieFree').checked,
                featured: document.getElementById('movieFeatured').checked
            };

            const editIndex = document.getElementById('editIndex').value;
            
            if (editMode && editIndex!== '') {
                movies[parseInt(editIndex)] = movieData;
                alert('Movie imehaririwa! ✅');
            } else {
                movies.push(movieData);
                alert('Movie imeongezwa! 🎬');
            }

            saveToStorage();
            renderHero();
            renderMovies();
            renderAdminList();
            clearForm();
            editMode = false;
            document.getElementById('adminFormTitle').textContent = 'Ongeza Movie Mpya 🎬';
            document.getElementById('saveBtn').textContent = 'Hifadhi Movie';
        }

        function editMovie(index) {
            const movie = movies[index];
            editMode = true;
            document.getElementById('editIndex').value = index;
            document.getElementById('adminFormTitle').textContent = 'Hariri Movie ✏️';
            document.getElementById('saveBtn').textContent = 'Hifadhi Mabadiliko';
            
            document.getElementById('movieTitle').value = movie.title;
            document.getElementById('movieThumbnail').value = movie.thumbnail;
            document.getElementById('movieVideo').value = movie.videoUrl;
            document.getElementById('movieDesc').value = movie.description;
            document.getElementById('movieMainCat').value = movie.mainCategory;
            document.getElementById('movieSubCat').value = movie.subCategory;
            document.getElementById('moviePrice').value = movie.price;
            document.getElementById('moviePayhip').value = movie.payhipLink;
            document.getElementById('movieFree').checked = movie.isFree;
            document.getElementById('movieFeatured').checked = movie.featured;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteMovie(index) {
            if (confirm('Una uhakika unataka kufuta movie hii?')) {
                movies.splice(index, 1);
                saveToStorage();
                renderHero();
                renderMovies();
                renderAdminList();
            }
        }

        function renderAdminList() {
            const list = document.getElementById('adminMovieList');
            list.innerHTML = movies.map((movie, index) => `
                <div class="admin-movie-item">
                    <div class="admin-movie-name">${movie.title}</div>
                    <div class="admin-movie-actions">
                        <button class="btn-edit" onclick="editMovie(${index})">Hariri</button>
                        <button class="btn-delete" onclick="deleteMovie(${index})">Futa</button>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('mainCats').addEventListener('click', (e) => {
            if (e.target.classList.contains('cat-btn')) {
                document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                activeMainCat = e.target.dataset.cat;
                renderMovies();
            }
        });

        document.getElementById('subCats').addEventListener('click', (e) => {
            if (e.target.classList.contains('sub-cat-btn')) {
                document.querySelectorAll('.sub-cat-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                activeSubCat = e.target.dataset.sub;
                renderMovies();
            }
        });

        document.getElementById('searchInput').addEventListener('input', renderMovies);
        document.getElementById('videoModal').addEventListener('click', (e) => { if (e.target.id === 'videoModal') closeModal(); });
        document.getElementById('adminModal').addEventListener('click', (e) => { if (e.target.id === 'adminModal') closeAdmin(); });
        document.getElementById('loginModal').addEventListener('click', (e) => { if (e.target.id === 'loginModal') document.getElementById('loginModal').style.display = 'none'; });
        
        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        renderHero();
        renderMovies();
    </script>
</body>
</html>
