<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MoMba - Movies On Mobile</title>
<style>
:root{--bg:#0a0a0f;--card:#141420;--accent:#ff2e63;--accent2:#00f2ea;--text:#fff;--muted:#aaa}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,system-ui;background:var(--bg);color:var(--text);padding-bottom:80px}
header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.9);backdrop-filter:blur(10px);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #222}
.logo{font-size:20px;font-weight:900;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.searchBox{flex:1;margin:0 12px}
.searchBox input{width:100%;padding:10px 14px;border-radius:20px;border:1px solid #333;background:#0f0f1a;color:var(--text);outline:none}
.searchBox input:focus{border-color:var(--accent)}
.btn{padding:8px 16px;border-radius:20px;border:none;background:var(--accent);color:#fff;font-weight:600;cursor:pointer}
.btn.ghost{background:transparent;border:1px solid #444}
.container{max-width:1200px;margin:0 auto;padding:16px}
.section{margin:24px 0}
.section h2{margin-bottom:12px;font-size:18px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.card{background:var(--card);border-radius:12px;overflow:hidden;cursor:pointer;transition:.2s;border:1px solid #222}
.card:hover{transform:translateY(-4px);border-color:var(--accent)}
.card img{width:100%;aspect-ratio:2/3;object-fit:cover}
.card .info{padding:8px}
.card .title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .meta{font-size:11px;color:var(--muted);margin-top:4px}
.badge{position:absolute;background:var(--accent);padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700}
.banner{position:relative;height:60vh;min-height:400px;border-radius:16px;overflow:hidden;margin-bottom:24px}
.banner img{width:100%;height:100%;object-fit:cover}
.banner .shade{position:absolute;inset:0;background:linear-gradient(180deg,transparent 0%,rgba(0,0,0,.8) 100%)}
.banner .content{position:absolute;bottom:0;left:0;right:0;padding:24px}
.banner h1{font-size:32px;margin-bottom:8px}
.banner p{color:#ddd;margin-bottom:12px;max-width:600px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal.active{display:flex}
.modal .box{background:var(--card);border-radius:16px;max-width:800px;width:100%;max-height:90vh;overflow-y:auto}
.modal .poster{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:16px 16px 0 0}
.modal .body{padding:20px}
.modal .title{font-size:24px;margin-bottom:8px}
.modal .desc{color:#ccc;margin:12px 0;line-height:1.6}
.player{width:100%;aspect-ratio:16/9;background:#000;border-radius:12px;overflow:hidden;margin:16px 0}
.player iframe{width:100%;height:100%;border:none}
.admin{position:fixed;inset:0;background:var(--bg);z-index:300;display:none;overflow-y:auto}
.admin.active{display:block}
.admin header{position:sticky}
.admin .wrap{max-width:900px;margin:0 auto;padding:20px}
.input-group{margin-bottom:16px}
.input-group label{display:block;margin-bottom:6px;font-size:13px;color:var(--muted)}
.input-group input,.input-group textarea,.input-group select{width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#0f0f1a;color:var(--text);outline:none}
.input-group textarea{min-height:80px;resize:vertical}
.movie-item{background:var(--card);padding:12px;border-radius:8px;margin-bottom:8px;border:1px solid #222}
.movie-item .row{display:flex;gap:8px;margin-top:8px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,.95);backdrop-filter:blur(10px);display:flex;justify-content:space-around;padding:8px 0;border-top:1px solid #222;z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;color:var(--muted);cursor:pointer}
.nav-item.active{color:var(--accent)}
@media(max-width:600px){.grid{grid-template-columns:repeat(3,1fr)}.banner h1{font-size:24px}}
.hidden{display:none!important}
</style>
</head>
<body>
<header>
<div class="logo">MoMba</div>
<div class="searchBox"><input type="text" id="search" placeholder="Tafuta movie..."></div>
<button class="btn ghost" onclick="toggleAdmin()">Admin</button>
</header>
<div class="container">
<div id="banner" class="banner hidden">
<img id="bannerImg" src="">
<div class="shade"></div>
<div class="content">
<h1 id="bannerTitle"></h1>
<p id="bannerDesc"></p>
<button class="btn" onclick="playBanner()">▶ Cheza Sasa</button>
</div>
</div>
<div class="section">
<h2>Movies Mpya</h2>
<div id="moviesGrid" class="grid"></div>
</div>
</div>
<div id="modal" class="modal" onclick="closeModal(event)">
<div class="box" onclick="event.stopPropagation()">
<img id="modalPoster" class="poster" src="">
<div class="body">
<div class="title" id="modalTitle"></div>
<div class="meta" id="modalMeta"></div>
<div class="desc" id="modalDesc"></div>
<div class="player"><iframe id="playerFrame" allowfullscreen></iframe></div>
<button class="btn" onclick="closeModal()">Funga</button>
</div>
</div>
</div>
<div id="admin" class="admin">
<header>
<div class="logo">Admin Panel</div>
<button class="btn ghost" onclick="toggleAdmin()">Funga</button>
</header>
<div class="wrap">
<h2>ONGEZA MOVIE</h2>
<div class="input-group"><label>Jina la Movie</label><input id="newTitle" placeholder="Avengers Endgame"></div>
<div class="input-group"><label>Thumbnail URL</label><input id="newThumb" placeholder="https://..."></div>
<div class="input-group"><label>Banner URL</label><input id="newBanner" placeholder="https://..."></div>
<div class="input-group"><label>Streamable Embed URL</label><input id="newStream" placeholder="https://streamable.com/e/xxx"></div>
<div class="input-group"><label>Bei TZS</label><input id="newPrice" type="number" placeholder="1000"></div>
<div class="input-group">
<label>Maelezo ya Movie - Banner Description</label>
<textarea id="newDesc" placeholder="Andika maelezo mafupi ya movie hapa"></textarea>
</div>
<button class="btn" onclick="addMovie()">Hifadhi Movie</button>
<h2 style="margin-top:32px">MANAGE MOVIES</h2>
<div id="adminList"></div>
</div>
</div>
<div class="bottom-nav">
<div class="nav-item active" onclick="scrollToTop()">🏠<span>Home</span></div>
<div class="nav-item" onclick="alert('Tafuta hapo juu')">🔍<span>Search</span></div>
<div class="nav-item" onclick="toggleAdmin()">⚙️<span>Admin</span></div>
</div><script>
let movies=JSON.parse(localStorage.getItem('momba_movies')||'[]');
let currentMovie=null;

function saveMovies(){localStorage.setItem('momba_movies',JSON.stringify(movies))}

function renderMovies(list=movies){
const grid=document.getElementById('moviesGrid');
grid.innerHTML='';
list.forEach(m=>{
grid.innerHTML+=`<div class="card" onclick="openModal(${m.id})">
<img src="${m.thumb}" loading="lazy">
<div class="info">
<div class="title">${m.title}</div>
<div class="meta">TZS ${m.price} • ⭐</div>
</div></div>`;
});
if(movies.length>0){
const b=movies[movies.length-1];
document.getElementById('banner').classList.remove('hidden');
document.getElementById('bannerImg').src=b.banner||b.thumb;
document.getElementById('bannerTitle').textContent=b.title;
document.getElementById('bannerDesc').textContent=b.desc||'';
}

function openModal(id){
currentMovie=movies.find(x=>x.id==id);
document.getElementById('modal').classList.add('active');
document.getElementById('modalPoster').src=currentMovie.banner||currentMovie.thumb;
document.getElementById('modalTitle').textContent=currentMovie.title;
document.getElementById('modalMeta').textContent=`Bei: TZS ${currentMovie.price}`;
document.getElementById('modalDesc').textContent=currentMovie.desc||'';
document.getElementById('playerFrame').src=currentMovie.stream;
}

function closeModal(e){if(!e||e.target.id=='modal')document.getElementById('modal').classList.remove('active')}

function playBanner(){if(movies.length>0)openModal(movies[movies.length-1].id)}

function scrollToTop(){window.scrollTo(0,0)}

document.getElementById('search').oninput=e=>{
const q=e.target.value.toLowerCase();
renderMovies(movies.filter(m=>m.title.toLowerCase().includes(q)));
}

function toggleAdmin(){
document.getElementById('admin').classList.toggle('active');
loadAdminData();
}

function addMovie(){
const m={
id:Date.now(),
title:document.getElementById('newTitle').value,
thumb:document.getElementById('newThumb').value,
banner:document.getElementById('newBanner').value,
stream:document.getElementById('newStream').value,
price:document.getElementById('newPrice').value,
desc:document.getElementById('newDesc').value
};
movies.push(m);saveMovies();renderMovies();loadAdminData();
['newTitle','newThumb','newBanner','newStream','newPrice','newDesc'].forEach(id=>document.getElementById(id).value='');
alert('Movie imehifadhiwa!');
}
function loadAdminData(){
const list=document.getElementById('adminList');
list.innerHTML='';
movies.forEach(m=>{
list.innerHTML+=`<div class="movie-item">
<strong>${m.title}</strong>
<div class="input-group"><label>Jina</label><input id="title${m.id}" value="${m.title}"></div>
<div class="input-group"><label>Thumbnail</label><input id="thumb${m.id}" value="${m.thumb}"></div>
<div class="input-group"><label>Banner</label><input id="banner${m.id}" value="${m.banner}"></div>
<div class="input-group"><label>Streamable</label><input id="stream${m.id}" value="${m.stream}"></div>
<div class="input-group"><label>Bei</label><input id="price${m.id}" type="number" value="${m.price}"></div>
<div class="input-group"><label>Maelezo ya Banner</label><textarea id="desc${m.id}">${m.desc||''}</textarea></div>
<div class="row">
<button class="btn" onclick="updateMovie(${m.id})">Update</button>
<button class="btn ghost" onclick="deleteMovie(${m.id})">Delete</button>
</div>
</div>`;
});
}

function updateMovie(id){
const m=movies.find(x=>x.id==id);
m.title=document.getElementById('title'+id).value;
m.thumb=document.getElementById('thumb'+id).value;
m.banner=document.getElementById('banner'+id).value;
m.stream=document.getElementById('stream'+id).value;
m.price=document.getElementById('price'+id).value;
m.desc=document.getElementById('desc'+id).value;
saveMovies();renderMovies();loadAdminData();
alert('Imeupdate!');
}

function deleteMovie(id){
if(confirm('Una uhakika?')){
movies=movies.filter(x=>x.id!=id);
saveMovies();renderMovies();loadAdminData();
}
}

renderMovies();
</script>
</body>
</html>
