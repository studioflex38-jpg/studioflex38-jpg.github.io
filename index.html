<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chilagu Legacy Cinema</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0A0A0F; color: #FFFFFF; padding-bottom: 80px; }
      .header { background: linear-gradient(135deg, #1A1A2E 0%, #8A2BE2 100%); padding: 20px; text-align: center; }
      .logo { font-size: 24px; font-weight: bold; color: #FFD700; }
      .tagline { font-size: 14px; color: #B0B0C3; margin-top: 5px; }
      .container { padding: 15px; }
      .category { margin-bottom: 30px; }
      .category-title { font-size: 20px; margin-bottom: 15px; color: #FFD700; border-left: 4px solid #8A2BE2; padding-left: 10px; }
      .subcategory-title { color: #B0B0C3; font-size: 16px; margin: 20px 0 10px 15px; }
      .episode-list { display: flex; flex-direction: column; gap: 12px; }
      .episode-item { background: #1A1A2E; border-radius: 12px; overflow: hidden; display: flex; cursor: pointer; border: 1px solid #2A2A3E; }
      .episode-thumb { width: 120px; height: 70px; object-fit: cover; }
      .episode-info { padding: 10px; flex: 1; }
      .episode-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
      .episode-desc { font-size: 13px; color: #B0B0C3; }
      .play-icon { display: flex; align-items: center; padding: 0 15px; font-size: 20px; }
      .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
      .modal.active { display: flex; }
      .modal-content { width: 95%; max-width: 900px; background: #1A1A2E; border-radius: 15px; overflow: hidden; }
      .modal-header { padding: 15px; background: #0A0A0F; display: flex; justify-content: space-between; align-items: center; }
      .close-btn { background: #FF4444; border: none; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 20px; }
      .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
      .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
      .video-controls { padding: 15px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
      .control-btn { background: #8A2BE2; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
      .paywall-modal.modal-content { text-align: center; padding: 30px; }
      .paywall-price { font-size: 32px; color: #00FF88; margin: 15px 0; }
      .pay-btn { background: linear-gradient(135deg, #00FF88 0%, #00CC6A 100%); color: #0A0A0F; border: none; padding: 15px 40px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🎬 CHILAGU LEGACY</div>
        <div class="tagline">Bongo Series & Movies</div>
    </div>

    <!-- HAPA NDIO APP INAJIJENGA AUTOMATIC -->
    <div class="container" id="app-container"></div>

    <!-- VIDEO PLAYER MODAL -->
    <div class="modal" id="playerModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="videoTitle">Inacheza...</div>
                <button class="close-btn" onclick="closePlayer()">×</button>
            </div>
            <div class="video-container">
                <iframe id="videoFrame" src="" allowfullscreen></iframe>
            </div>
            <div class="video-controls" id="videoControls">
                <button class="control-btn" id="nextEpisodeBtn" onclick="playNext()">⏭️ Endelea</button>
                <button class="control-btn" onclick="closePlayer()">✖️ Funga</button>
            </div>
        </div>
    </div>

    <!-- PAYWALL MODAL -->
    <div class="modal paywall-modal" id="paywallModal">
        <div class="modal-content">
            <div style="font-size: 22px; margin-bottom: 10px; color: #FFD700;" id="paywallTitle">Episode Imefungwa 🔒</div>
            <div>Unahitaji kulipia ili kutazama</div>
            <div class="paywall-price" id="paywallPrice">TSh 500</div>
            <button class="pay-btn" id="payNowBtn" onclick="goToPayment()">LIPA SASA</button>
            <br><br>
            <button class="control-btn" onclick="closePaywall()">Ghairi</button>
        </div>
    </div>

    <script>
        // ============================================
        // SEHEMU YA WEWE KUBADILISHA TU - ANZA HAPA
        // ============================================

        const CONTENT_DATABASE = [
            // LOVE AND DESTINY SERIES
            {
                id: 1,
                title: "Episode 1: Mwanzo",
                category: "Love and Destiny Series",
                subcategory: "Series",
                video_url: "https://streamable.com/e/WEKA_LINK_YAKO_HAPA",
                thumbnail: "https://i.postimg.cc/WEKA_PICHA.jpg",
                duration: "45 min",
                is_free: true,
                price: 0,
                payment_link: "",
                has_continuation: true,
                series_id: "love_destiny"
            },
            {
                id: 2,
                title: "Episode 2: Majonzi",
                category: "Love and Destiny Series",
                subcategory: "Series",
                video_url: "https://streamable.com/e/WEKA_LINK_YAKO_HAPA",
                thumbnail: "https://i.postimg.cc/WEKA_PICHA.jpg",
                duration: "48 min",
                is_free: false,
                price: 500,
                payment_link: "https://payhip.com/b/WEKA_LINK_YAKO",
                has_continuation: true,
                series_id: "love_destiny"
            },

            // SINGO MOVIE - COMEDY
            {
                id: 3,
                title: "MPANDA MNAZI KWA MKONO MMOJA",
                category: "Singo Movie",
                subcategory: "Comedy",
                video_url: "https://streamable.com/e/8326lw",
                thumbnail: "https://i.postimg.cc/1z9J8w3N/comedy-default.jpg",
                duration: "7 min",
                is_free: true,
                price: 0,
                payment_link: "",
                has_continuation: false,
                series_id: null
            }

            // ONGEZA JOB MPYA HAPA CHINI KAMA HIVI:
            /*
           ,{
                id: 4,
                title: "JINA LA MOVIE/COMEDY YAKO",
                category: "Singo Movie", // Au "Love and Destiny Series" au jipya
                subcategory: "Comedy", // Au "Action" au "Drama"
                video_url: "https://streamable.com/e/LINK_YAKO",
                thumbnail: "https://i.postimg.cc/PICHA_YAKO.jpg",
                duration: "10 min",
                is_free: true, // true = bure, false = lipia
                price: 0, // Weka 500, 2000 etc kama sio bure
                payment_link: "", // Weka link ya Payhip kama sio bure
                has_continuation: false, // true = ina miendelezo, false = imesimama
                series_id: null // Weka "love_destiny" kama ni series
            }
            */
        ];

        // ============================================
        // ISHA - USIGUSE CHINI YA HAPA
        // ============================================

        let currentPaymentUrl = '';
        let currentPlaylist = [];
        let currentIndex = 0;

        // JENGA APP AUTOMATIC
        function buildApp() {
            const container = document.getElementById('app-container');
            const categories = {};

            // Panga content kwa category
            CONTENT_DATABASE.forEach(item => {
                if (!categories[item.category]) {
                    categories[item.category] = {};
                }
                if (!categories[item.category][item.subcategory]) {
                    categories[item.category][item.subcategory] = [];
                }
                categories[item.category][item.subcategory].push(item);
            });

            // Tengeneza HTML
            let html = '';
            for (let catName in categories) {
                html += `<div class="category"><h2 class="category-title">${catName}</h2>`;

                for (let subName in categories[catName]) {
                    html += `<h3 class="subcategory-title">😂 ${subName}</h3><div class="episode-list">`;

                    categories[catName][subName].forEach(item => {
                        const icon = item.is_free? '▶️' : '🔒';
                        const priceText = item.is_free? '🆓 BURE' : `🔒 TSh ${item.price}`;
                        const clickAction = item.is_free
                           ? `playContent(${item.id})`
                            : `showPaywall('${item.title}', ${item.price}, '${item.payment_link}')`;

                        html += `
                            <div class="episode-item" onclick="${clickAction}">
                                <img src="${item.thumbnail}" class="episode-thumb">
                                <div class="episode-info">
                                    <div class="episode-title">${item.title}</div>
                                    <div class="episode-desc">${priceText} • ${item.duration}</div>
                                </div>
                                <div class="play-icon">${icon}</div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
                html += `</div>`;
            }
            container.innerHTML = html;
        }

        // CHEZA CONTENT
        function playContent(id) {
            const item = CONTENT_DATABASE.find(x => x.id === id);
            if (!item) return;

            document.getElementById('playerModal').classList.add('active');
            document.getElementById('videoTitle').textContent = item.title;
            document.getElementById('videoFrame').src = item.video_url + '?autoplay=1';

            // Tengeneza playlist kama ni series
            if (item.series_id && item.has_continuation) {
                currentPlaylist = CONTENT_DATABASE.filter(x => x.series_id === item.series_id);
                currentIndex = currentPlaylist.findIndex(x => x.id === id);
                document.getElementById('nextEpisodeBtn').style.display = 'inline-block';
                updateNextBtn();
            } else {
                currentPlaylist = [];
                document.getElementById('nextEpisodeBtn').style.display = 'none';
            }
        }

        // PAYWALL
        function showPaywall(title, price, paymentUrl) {
            currentPaymentUrl = paymentUrl;
            document.getElementById('paywallModal').classList.add('active');
            document.getElementById('paywallTitle').textContent = title;
            document.getElementById('paywallPrice').textContent = 'TSh ' + price;
        }

        function goToPayment() {
            window.open(currentPaymentUrl, '_blank');
            closePaywall();
        }

        function closePaywall() {
            document.getElementById('paywallModal').classList.remove('active');
        }

        // PLAYER CONTROLS
        function closePlayer() {
            document.getElementById('playerModal').classList.remove('active');
            document.getElementById('videoFrame').src = '';
        }

        function playNext() {
            if (currentPlaylist.length === 0) return;
            let nextIndex = currentIndex + 1;
            if (nextIndex >= currentPlaylist.length) {
                alert('Umemaliza series yote!');
                return;
            }
            let nextItem = currentPlaylist[nextIndex];
            if (!nextItem.is_free) {
                showPaywall(nextItem.title, nextItem.price, nextItem.payment_link);
                return;
            }
            playContent(nextItem.id);
        }

        function updateNextBtn() {
            let btn = document.getElementById('nextEpisodeBtn');
            if (currentIndex >= currentPlaylist.length - 1) {
                btn.textContent = '✅ Umemaliza';
                btn.disabled = true;
            } else {
                btn.textContent = '⏭️ Endelea';
                btn.disabled = false;
            }
        }

        // ANZISHA APP
        buildApp();
    </script>
</body>
</html>
