<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chilagu Legacy Cinema</title>
<style>
  :root { --bg: #0a0a0a; --card: #1a1a1a; --pink: #ff2d92; --purple: #a855f7; --airtel: #e60000; }
  body { margin: 0; font-family: Arial; background: var(--bg); color: #fff; }
  .header { padding: 20px 15px 10px; }
  .header h1 { margin: 0; font-size: 28px; font-weight: 800; }
  .header p { margin: 5px 0 15px; color: #ccc; font-size: 14px; }
  .dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 15px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #555; }
  .dot.active { background: var(--pink); }
  .search { margin: 0 15px 15px; position: relative; }
  .search input { width: 100%; padding: 12px 40px 12px 15px; border-radius: 25px; border: none; background: #222; color: #fff; font-size: 15px; box-sizing: border-box; }
  .search span { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); }
  .tabs { display: flex; gap: 10px; padding: 0 15px; overflow-x: auto; }
  .tab { padding: 10px 18px; border-radius: 20px; background: #222; font-size: 14px; white-space: nowrap; cursor: pointer; }
  .tab.active { background: linear-gradient(90deg, var(--pink), var(--purple)); font-weight: bold; }
  .cat-nav { display: flex; justify-content: space-around; padding: 20px 15px 10px; }
  .cat { text-align: center; cursor: pointer; }
  .cat .icon { width: 60px; height: 60px; border-radius: 50%; background: #222; display: flex; align-items: center; justify-content: center; margin: auto; font-size: 24px; }
  .cat.active .icon { background: linear-gradient(135deg, var(--pink), var(--purple)); box-shadow: 0 0 15px var(--pink); }
  .cat p { margin: 8px 0 0; font-size: 13px; }
  .section { padding: 20px 15px; }
  .section h2 { margin: 0 0 5px; font-size: 20px; }
  .sub { color: #00ffb3; font-size: 14px; margin-bottom: 15px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .card { background: var(--card); border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; }
  .card .thumb { width: 100%; height: 160px; background: #333; }
  .star { position: absolute; top: 8px; right: 8px; width: 26px; height: 26px; background: linear-gradient(135deg, var(--pink), var(--purple)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .price-tag { position: absolute; bottom: 35px; right: 8px; background: #000c; padding: 3px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; }
  .card p { margin: 0; padding: 10px; font-size: 14px; }
  .watched { padding: 20px 15px; color: #aaa; }
  
  /* POPUP YA AIRTEL MONEY */
  #paymentBox, #resultBox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; align-items: center; justify-content: center; }
  .pay-card { background: #1e1e1e; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
  .pay-card .airtel { font-size: 22px; color: var(--airtel); font-weight: bold; margin: 10px 0; }
  .pay-card .ref { font-size: 18px; color: #00ffb3; font-weight: bold; word-break: break-all; }
  .pay-card button { width: 100%; padding: 14px; margin-top: 12px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
  .check-btn { background: #00c853; color: #fff; }
</style>
</head>
<body>

<div class="header">
  <h1>The Equalizer</h1>
  <p>Haki kwa mkono wake.</p>
  <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot active"></span></div>
</div>

<div class="search">
  <input type="text" id="searchInput" placeholder="Tafuta movie hapa..." onkeyup="filterMovies()">
  <span>🔍</span>
</div>

<div class="tabs">
  <div class="tab active">📁 All Movies</div>
  <div class="tab">💻 Series</div>
  <div class="tab">📼 Singo</div>
</div>

<div class="cat-nav">
  <div class="cat active" onclick="filterCat('all')"><div class="icon">⚪</div><p>Zote</p></div>
  <div class="cat" onclick="filterCat('action')"><div class="icon">⚡</div><p>Action</p></div>
  <div class="cat" onclick="filterCat('love')"><div class="icon">❤️</div><p>Love</p></div>
  <div class="cat" onclick="filterCat('drama')"><div class="icon">⚪</div><p>Drama</p></div>
</div>

<div class="section">
  <h2>Trending Now🔥</h2>
  <div class="sub">Inaonyesha: <span id="count">4</span> / Jumla: <span id="total">14</span> 🔥</div>
  <div class="grid" id="homeGrid"></div>
</div>

<div class="watched">Watched ✓<br><br>Bado hujatazama movie</div>

<!-- POPUP YA MALIPO AIRTEL MONEY -->
<div id="paymentBox"><div class="pay-card">
  <h3>Lipa Airtel Money Ku Fungua</h3>
  <p>Tuma <b>Tsh <span id="amount">2000</span></b> kwa:</p>
  <p class="airtel">0686436004</p> 
  <p>Jina: CHILAGU M</p>
  <p>Andika Ref hii: <br><span class="ref" id="refCode"></span></p>
  <button class="check-btn" onclick="checkPayment()">Nimeshalipa - Angalia</button>
</div></div>
<div id="resultBox"></div>

<script>
// ========= KILA KITU KIMEWEKWA HAPA =========
const BOT_API_URL = "https://script.google.com/macros/s/AKfycbwE_84hlGHKhKXp2uvAB4RjxRI4bLqgADi1Lzws8G8GI5DwtcJxFGy_Tm6ADBaMCYGp/exec"; 
const AIRTEL_NUMBER = "0686436004"; 
// ============================================

let currentRef = "";
let selectedMovie = null;
let currentPrice = 0;
let activeCat = 'all';

// ========= HAPA NDO CONTROL PANEL YAKO YA BEI MZEE 👇 =========
// SHERIA: price: 0 = BURE. price: 1000, 2000, 5000 = INALIPWA + INAONYESHA NYOTA ★
const movies = [
  // 4 LIVE - WEKA price: 0 KWA BURE
  {id: 1, title: "Fast X", cat: "action", status: "live", price: 0, link: "https://drive.google.com/file/d/WEKA_LINK_HAPA/view"},
  {id: 2, title: "Love Again", cat: "love", status: "live", price: 0, link: "https://drive.google.com/file/d/WEKA_LINK_HAPA/view"},
  {id: 3, title: "Singo Mzito Ep1", cat: "drama", status: "live", price: 0, link: "https://drive.google.com/file/d/WEKA_LINK_HAPA/view"},
  {id: 4, title: "The Equalizer", cat: "action", status: "live", price: 0, link: "https://drive.google.com/file/d/WEKA_LINK_HAPA/view"},

  // 10 PRIVATE - WEKA price: 2000 AU CHOCHOTE. ZITAKUWA NA NYOTA ★
  {id: 5, title: "John Wick 4", cat: "action", price: 2000},
  {id: 6, title: "Dune 2", cat: "action", price: 1500}, // Mfano bei tofauti
  {id: 7, title: "Avatar 2", cat: "action", price: 2000},
  {id: 8, title: "Deadpool 3", cat: "action", price: 3000}, // Bei ghali
  {id: 9, title: "Titanic Love", cat: "love", price: 1000},  // Bei nafuu
  {id: 10, title: "After Love", cat: "love", price: 2000},
  {id: 11, title: "Singo Kali Ep2", cat: "drama", price: 2000},
  {id: 12, title: "Mapenzi Hard", cat: "drama", price: 2000},
  {id: 13, title: "Mission Impo", cat: "action", price: 2000},
  {id: 14, title: "Bongo Movie", cat: "drama", price: 2000},
];
// ============================================================

function loadMovies() {
  const grid = document.getElementById("homeGrid");
  grid.innerHTML = "";
  let filtered = movies.filter(m => 
    (activeCat === 'all' || m.cat === activeCat) &&
    m.title.toLowerCase().includes(document.getElementById("searchInput").value.toLowerCase())
  );
  document.getElementById("count").innerText = filtered.length;
  document.getElementById("total").innerText = movies.length;
  filtered.forEach(m => {
    const div = document.createElement("div");
    div.className = "card";
    let star = m.price > 0 ? '<div class="star">★</div>' : ''; // Nyota ikiwa inalipwa
    let tag = m.price > 0 ? `<div class="price-tag">Tsh ${m.price}</div>` : ''; // Tag ya bei
    div.innerHTML = `<div class="thumb"></div> ${star} ${tag} <p>${m.title}</p>`;
    div.onclick = () => openMovie(m);
    grid.appendChild(div);
  });
}

function openMovie(m) {
  if(m.price === 0){ // KAMA NI BURE
    window.open(m.link, "_blank");
  } else { // KAMA INALIPWA
    selectedMovie = m;
    currentPrice = m.price;
    currentRef = "CHILAGU_" + Math.random().toString(36).substr(2, 9).toUpperCase();
    document.getElementById("amount").innerText = currentPrice; // Weka bei hapa
    document.getElementById("refCode").innerText = currentRef;
    document.getElementById("paymentBox").style.display = "flex";
  }
}

async function checkPayment() {
  const resultBox = document.getElementById("resultBox");
  resultBox.style.display = "flex";
  resultBox.innerHTML = `<div class="pay-card">⏳ Tunakagua Tsh ${currentPrice} ya Airtel...<br><br><button onclick="document.getElementById('resultBox').style.display='none'">Funga</button></div>`;
  try {
    const res = await fetch(BOT_API_URL + "?ref=" + currentRef);
    const data = await res.json();
    if (data.paid === true) {
      resultBox.innerHTML = `<div class="pay-card">✅ Malipo ya Tsh ${currentPrice} yamepatikana!<br><br><button class="check-btn" onclick="alert('Tuma link ya ${selectedMovie.title} kwa admin'); document.getElementById('paymentBox').style.display='none'; document.getElementById('resultBox').style.display='none'">Sawa</button></div>`;
    } else {
      resultBox.innerHTML = `<div class="pay-card">❌ Bado hatujapata Tsh ${currentPrice}<br>Ref: ${currentRef}<br><br><button onclick="document.getElementById('resultBox').style.display='none'">Jaribu Tena</button></div>`;
    }
  } catch (err) {
    resultBox.innerHTML = `<div class="pay-card">⚠️ Mtandao umekatika</div>`;
  }
}

function filterCat(cat) {
  activeCat = cat;
  document.querySelectorAll(".cat").forEach(c => c.classList.remove("active"));
  event.currentTarget.classList.add("active");
  loadMovies();
}
function filterMovies() { loadMovies(); }
loadMovies();
</script>
</body>
</html>
